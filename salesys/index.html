<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#e0e5ec">
<title>Kai's 戰情室</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#e0e5ec;
  --card:#e0e5ec;
  --card-border:transparent;
  --accent:#3dba7a;--accent-dark:#2ea06a;--accent-light:#d5f0e3;
  --text:#2d3436;--text2:#636e72;--text3:#a0a8b0;
  --nm-light:rgba(255,255,255,.7);
  --nm-dark:rgba(163,177,198,.6);
  --nm-out:6px 6px 12px var(--nm-dark), -6px -6px 12px var(--nm-light);
  --nm-out-sm:3px 3px 6px var(--nm-dark), -3px -3px 6px var(--nm-light);
  --nm-out-lg:8px 8px 16px var(--nm-dark), -8px -8px 16px var(--nm-light);
  --nm-in:inset 3px 3px 6px var(--nm-dark), inset -3px -3px 6px var(--nm-light);
  --nm-in-sm:inset 2px 2px 4px var(--nm-dark), inset -2px -2px 4px var(--nm-light);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --r:18px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
body{display:flex;flex-direction:column;padding-top:var(--safe-top)}

.header{display:flex;align-items:center;gap:10px;padding:14px 16px 10px;flex-shrink:0}
.header-logo{width:40px;height:40px;border-radius:13px;background:linear-gradient(135deg,#3dba7a,#2ea06a);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:19px;color:#fff;box-shadow:3px 3px 8px var(--nm-dark),-3px -3px 8px var(--nm-light)}
.header-text h1{font-size:18px;font-weight:700}
.header-text p{font-size:11px;color:var(--text3);margin-top:1px}
.header-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.header-date{font-size:12px;color:var(--text3);text-align:right}
.header-avatar{width:40px;height:40px;border-radius:50%;overflow:hidden;box-shadow:var(--nm-out-sm)}
.header-avatar svg{width:100%;height:100%}

.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 14px 16px;-webkit-overflow-scrolling:touch}
.main::-webkit-scrollbar{display:none}

/* KPI — neumorphic raised */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:10px 0 16px}
.kpi-card{background:var(--bg);border-radius:var(--r);padding:16px 12px;box-shadow:var(--nm-out);position:relative;overflow:hidden;transition:box-shadow .2s}
.kpi-card:active{box-shadow:var(--nm-in)}
.kpi-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.kpi-card:nth-child(1)::after{background:linear-gradient(90deg,#3dba7a,#2ea06a)}
.kpi-card:nth-child(2)::after{background:linear-gradient(90deg,#2563eb,#60a5fa)}
.kpi-card:nth-child(3)::after{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.kpi-value{font-size:26px;font-weight:800;margin-bottom:4px}
.kpi-card:nth-child(1) .kpi-value{color:var(--accent)}
.kpi-card:nth-child(2) .kpi-value{color:#2563eb}
.kpi-card:nth-child(3) .kpi-value{color:#f59e0b}
.kpi-label{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px}

.section-title{font-size:14px;font-weight:600;color:var(--text2);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.section-bar{width:3px;height:16px;border-radius:2px;background:var(--accent)}
.section-count{font-size:12px;color:var(--text3);margin-left:4px}

/* Agent Cards — neumorphic */
.agent-card{background:var(--bg);border-radius:var(--r);padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;box-shadow:var(--nm-out);cursor:pointer;transition:box-shadow .2s;-webkit-tap-highlight-color:transparent}
.agent-card:active{box-shadow:var(--nm-in)}
.agent-avatar{position:relative;flex-shrink:0}
.agent-avatar .av-circle{width:52px;height:52px;border-radius:50%;overflow:hidden;background:#d0d5dc;box-shadow:var(--nm-out-sm)}
.agent-avatar .av-circle svg{width:100%;height:100%}
.agent-avatar .status-dot{position:absolute;bottom:2px;right:2px;width:13px;height:13px;border-radius:50%;border:2.5px solid var(--bg);background:var(--accent);box-shadow:0 0 6px rgba(61,186,122,.5)}
.agent-info{flex:1;min-width:0}
.agent-name{font-size:16px;font-weight:600}
.agent-role{font-size:13px;color:var(--text2);margin-top:2px}
.chat-btn{width:42px;height:42px;border-radius:50%;background:var(--bg);border:none;color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--nm-out-sm);transition:box-shadow .15s}
.chat-btn:active{box-shadow:var(--nm-in-sm)}

/* Bottom Nav — neumorphic */
.bottom-nav{flex-shrink:0;background:var(--bg);display:flex;padding:6px 12px calc(6px + var(--safe-bot));box-shadow:6px -6px 12px var(--nm-dark),-6px -6px 12px var(--nm-light)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;cursor:pointer;color:var(--text3);font-size:10px;font-weight:500;border:none;background:none;-webkit-tap-highlight-color:transparent;transition:all .2s;border-radius:14px;margin:2px}
.nav-item.active{color:var(--accent);box-shadow:var(--nm-in-sm)}
.nav-item .nav-icon{font-size:20px;height:22px;display:flex;align-items:center;justify-content:center}

.page{display:block}
.page.active{display:block}
.section-divider{height:1px;background:linear-gradient(90deg,transparent,var(--nm-dark),transparent);margin:26px 0 6px;opacity:.5}
.empty-state{text-align:center;color:var(--text3);font-size:14px;padding:32px 16px;background:var(--bg);border-radius:var(--r);box-shadow:var(--nm-in-sm)}

/* ===== 產出頁面（Agent 方塊入口 + 報告列表） ===== */
.agent-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:16px}
.agent-tile{border-radius:20px;padding:20px 16px;cursor:pointer;box-shadow:var(--nm-out);transition:box-shadow .2s;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;min-height:110px;display:flex;flex-direction:column;justify-content:flex-end}
.agent-tile:active{box-shadow:var(--nm-in)}
.agent-tile-icon{font-size:28px;margin-bottom:8px}
.agent-tile-name{font-size:18px;font-weight:800;color:var(--text)}
.agent-tile-role{font-size:11px;color:var(--text2);margin-top:2px}
.agent-tile-count{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--text2)}
.agent-tile-arrow{position:absolute;bottom:14px;right:14px;font-size:18px;color:var(--text3);opacity:.5}

.output-back-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.output-back-btn{width:36px;height:36px;border-radius:50%;background:var(--bg);border:none;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--nm-out-sm)}
.output-back-btn:active{box-shadow:var(--nm-in-sm)}
.output-agent-label{font-size:17px;font-weight:700}
.output-date-group{font-size:12px;font-weight:700;color:var(--text3);margin:16px 0 8px;text-transform:uppercase;letter-spacing:.3px}

.news-card{background:var(--bg);border-radius:18px;margin-bottom:12px;box-shadow:var(--nm-out);overflow:hidden;cursor:pointer;transition:box-shadow .2s;-webkit-tap-highlight-color:transparent;position:relative}
.news-card:active{box-shadow:var(--nm-in)}
.news-top{display:flex;align-items:center;gap:8px;padding:14px 16px 0}
.news-urgency{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;text-transform:uppercase}
.news-urgency.urgent{background:#fef2f2;color:#dc2626}
.news-urgency.normal{background:#eff6ff;color:#2563eb}
.news-urgency.low{background:#f5f5f0;color:var(--text3)}
.news-time{font-size:12px;color:var(--text3);margin-left:auto}
.news-headline{font-size:17px;font-weight:800;line-height:1.4;padding:8px 16px 4px;color:var(--text);letter-spacing:-.2px}
.news-summary{font-size:14px;color:var(--text2);line-height:1.6;padding:0 16px 6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-tags{display:flex;gap:6px;padding:0 16px 14px;flex-wrap:wrap}
.news-tag{font-size:11px;padding:3px 9px;border-radius:8px;font-weight:600}
.news-arrow{position:absolute;right:14px;bottom:14px;font-size:15px;color:var(--text3);opacity:.4}

/* ===== 報告詳情（Neumorphic 雜誌閱讀體驗） ===== */
.report-overlay{position:fixed;inset:0;z-index:1100;background:var(--bg);transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column}
.report-overlay.open{transform:translateY(0)}
.report-header{display:flex;align-items:center;gap:10px;padding:calc(14px + var(--safe-top)) 16px 14px;background:var(--bg);flex-shrink:0;box-shadow:0 4px 8px var(--nm-dark)}
.report-back{width:38px;height:38px;border-radius:50%;background:var(--bg);border:none;color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--nm-out-sm)}
.report-back:active{box-shadow:var(--nm-in-sm)}
.report-hdr-title{flex:1;font-size:15px;font-weight:600;color:var(--text2)}
.report-body{flex:1;overflow-y:auto;padding:0;-webkit-overflow-scrolling:touch}
.report-body::-webkit-scrollbar{display:none}
.report-hero{padding:24px 20px 20px;background:var(--bg);margin:12px 16px;border-radius:20px;box-shadow:var(--nm-out)}
.report-hero-headline{font-size:24px;font-weight:800;line-height:1.35;color:var(--text);letter-spacing:-.3px;margin-bottom:14px}
.report-hero-meta{display:flex;align-items:center;gap:10px;padding-top:14px;border-top:1px solid rgba(163,177,198,.3)}
.report-hero-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;box-shadow:var(--nm-out-sm)}
.report-hero-agent{font-size:15px;font-weight:600;color:var(--text)}
.report-hero-role{font-size:13px;color:var(--text3)}
.report-hero-time{font-size:13px;color:var(--text3);margin-left:auto}
.report-content{padding:8px 16px 32px}
.report-content p{font-size:16px;line-height:1.8;color:var(--text);margin-bottom:16px;padding:0 4px}
.report-content .rpt-section{font-size:13px;font-weight:700;color:var(--accent-dark);margin:24px 0 12px;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:8px;padding-bottom:8px;border-bottom:2px solid var(--accent-light)}
.report-content .rpt-item{background:var(--bg);padding:14px 16px;border-radius:16px;font-size:15px;line-height:1.7;color:var(--text);margin-bottom:10px;box-shadow:var(--nm-out-sm)}
.report-content .rpt-highlight{background:var(--bg);padding:18px 18px;border-radius:18px;margin:14px 0;font-size:16px;line-height:1.7;border-left:4px solid var(--accent);box-shadow:var(--nm-out)}
.report-content .rpt-number{font-size:28px;font-weight:800;color:var(--accent);display:inline-block;margin:4px 0;letter-spacing:-.5px}

/* Task */
.task-item{background:var(--bg);border-radius:var(--r);padding:14px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;box-shadow:var(--nm-out)}
.task-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--text3);flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:12px;box-shadow:var(--nm-in-sm)}
.task-check.done{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:none}
.task-title{font-size:14px;font-weight:500}
.task-meta{font-size:11px;color:var(--text2);margin-top:3px;display:flex;gap:8px}
.task-tag{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500}
.task-tag.urgent{background:#fef2f2;color:#dc2626}
.task-tag.normal{background:#eff6ff;color:#2563eb}
.task-tag.low{background:#f5f5f4;color:var(--text2)}

/* Opportunity */
.opp-card{background:var(--bg);border-radius:var(--r);padding:14px;margin-bottom:10px;border-left:4px solid var(--accent);box-shadow:var(--nm-out)}
.opp-company{font-size:15px;font-weight:600}
.opp-amount{font-size:20px;font-weight:800;color:var(--accent);margin:4px 0}
.opp-stage{display:inline-block;font-size:11px;background:var(--accent-light);color:var(--accent-dark);padding:3px 10px;border-radius:6px;font-weight:500}
.opp-detail{font-size:12px;color:var(--text2);margin-top:6px}

.page-header{font-size:20px;font-weight:700;margin:8px 0 16px;display:flex;align-items:center;gap:8px}

.quick-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:10px 0}
.quick-card{background:var(--bg);border-radius:var(--r);padding:14px;cursor:pointer;transition:box-shadow .2s;box-shadow:var(--nm-out)}
.quick-card:active{box-shadow:var(--nm-in)}
.quick-icon{font-size:24px;margin-bottom:6px}
.quick-label{font-size:13px;font-weight:600}
.quick-desc{font-size:11px;color:var(--text2);margin-top:3px}

/* Chat Overlay — neumorphic */
.chat-overlay{position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;background:var(--bg);transform:translateX(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);will-change:transform}
.chat-overlay.open{transform:translateX(0)}
.chat-header{display:flex;align-items:center;gap:10px;padding:calc(10px + var(--safe-top)) 12px 10px;background:linear-gradient(135deg,#3dba7a,#2ea06a);color:#fff;flex-shrink:0;box-shadow:0 4px 12px rgba(46,160,106,.35)}
.chat-back{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.chat-back:active{background:rgba(255,255,255,.25)}
.chat-hdr-avatar{width:38px;height:38px;border-radius:50%;overflow:hidden;border:2px solid rgba(255,255,255,.3);box-shadow:0 2px 6px rgba(0,0,0,.2)}
.chat-hdr-avatar svg{width:100%;height:100%}
.chat-hdr-info{flex:1}
.chat-hdr-name{font-size:16px;font-weight:600}
.chat-hdr-role{font-size:11px;opacity:.85}
.chat-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch;background:var(--bg)}
.chat-messages::-webkit-scrollbar{display:none}
.chat-msg{max-width:82%;display:flex;flex-direction:column}
.chat-msg.agent{align-self:flex-start}
.chat-msg.user{align-self:flex-end}
.chat-bubble{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.55;word-break:break-word}
.chat-msg.agent .chat-bubble{background:var(--bg);border-top-left-radius:2px;box-shadow:var(--nm-out-sm)}
.chat-msg.user .chat-bubble{background:linear-gradient(135deg,#3dba7a,#2ea06a);color:#fff;border-top-right-radius:2px;box-shadow:3px 3px 8px var(--nm-dark)}
.chat-time{font-size:10px;color:var(--text3);margin-top:3px;padding:0 4px}
.chat-msg.user .chat-time{text-align:right}
.chat-msg.user .chat-time::after{content:' ✓✓';color:var(--accent)}
.chat-suggestions{padding:6px 14px;display:flex;gap:8px;flex-wrap:wrap;background:var(--bg)}
.sug-btn{background:var(--bg);border:none;border-radius:20px;padding:8px 16px;font-size:12px;color:var(--accent-dark);cursor:pointer;white-space:nowrap;box-shadow:var(--nm-out-sm);font-weight:500}
.sug-btn:active{box-shadow:var(--nm-in-sm)}
.chat-input-bar{display:flex;align-items:center;gap:8px;padding:8px 12px calc(8px + var(--safe-bot));background:var(--bg);flex-shrink:0}
.chat-input{flex:1;background:var(--bg);border:none;border-radius:22px;padding:10px 16px;font-size:14px;color:var(--text);outline:none;font-family:inherit;box-shadow:var(--nm-in)}
.chat-input::placeholder{color:var(--text3)}
.chat-input:focus{box-shadow:var(--nm-in),0 0 0 2px rgba(61,186,122,.2)}
.chat-send{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#3dba7a,#2ea06a);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:3px 3px 8px var(--nm-dark),-2px -2px 6px var(--nm-light);transition:box-shadow .15s}
.chat-send:active{box-shadow:1px 1px 4px var(--nm-dark)}
.typing-indicator{display:flex;gap:4px;padding:8px 12px;align-items:center;background:var(--bg);border-radius:12px;border-top-left-radius:2px;box-shadow:var(--nm-out-sm)}
.typing-indicator span{width:7px;height:7px;border-radius:50%;background:var(--text3);animation:typing 1.4s infinite}
.typing-indicator span:nth-child(2){animation-delay:.2s}
.typing-indicator span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

.toast{position:fixed;top:calc(20px + var(--safe-top));left:50%;transform:translateX(-50%) translateY(-80px);background:var(--bg);color:var(--text);padding:10px 20px;border-radius:14px;font-size:13px;z-index:2000;transition:transform .3s;border:none;box-shadow:var(--nm-out-lg)}

/* ===== 通知系統 ===== */
.notif-btn{position:relative;width:38px;height:38px;border-radius:50%;background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:var(--nm-out-sm);transition:box-shadow .15s}
.notif-btn:active{box-shadow:var(--nm-in-sm)}
.notif-badge{position:absolute;top:2px;right:2px;min-width:16px;height:16px;border-radius:8px;background:#dc2626;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;box-shadow:0 1px 3px rgba(220,38,38,.4)}
.notif-badge:empty{display:none}
.nav-badge{position:absolute;top:4px;right:50%;transform:translateX(12px);width:8px;height:8px;border-radius:50%;background:#dc2626;box-shadow:0 0 4px rgba(220,38,38,.5)}
.nav-item{position:relative}

.notif-panel{position:fixed;inset:0;z-index:1200;background:var(--bg);transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column}
.notif-panel.open{transform:translateY(0)}
.notif-header{display:flex;align-items:center;gap:10px;padding:calc(14px + var(--safe-top)) 16px 14px;background:var(--bg);flex-shrink:0;box-shadow:0 4px 8px var(--nm-dark)}
.notif-close{width:36px;height:36px;border-radius:50%;background:var(--bg);border:none;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--nm-out-sm)}
.notif-close:active{box-shadow:var(--nm-in-sm)}
.notif-title{flex:1;font-size:17px;font-weight:700}
.notif-clear{font-size:13px;color:var(--accent);font-weight:600;cursor:pointer;background:none;border:none}
.notif-list{flex:1;overflow-y:auto;padding:12px 14px;-webkit-overflow-scrolling:touch}
.notif-list::-webkit-scrollbar{display:none}
.notif-item{background:var(--bg);border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:var(--nm-out-sm);display:flex;gap:12px;align-items:flex-start;cursor:pointer;transition:box-shadow .15s}
.notif-item:active{box-shadow:var(--nm-in-sm)}
.notif-item.unread{border-left:3px solid var(--accent)}
.notif-dot-wrap{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:var(--nm-in-sm)}
.notif-body{flex:1;min-width:0}
.notif-body-title{font-size:14px;font-weight:600;margin-bottom:2px}
.notif-body-text{font-size:13px;color:var(--text2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.notif-body-time{font-size:11px;color:var(--text3);margin-top:4px}
.notif-empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px}

.push-toast{position:fixed;top:calc(12px + var(--safe-top));left:12px;right:12px;background:var(--bg);border-radius:16px;padding:14px 16px;z-index:2100;box-shadow:var(--nm-out-lg);transform:translateY(-120%);transition:transform .35s cubic-bezier(.32,.72,0,1);display:flex;gap:12px;align-items:center;cursor:pointer}
.push-toast.show{transform:translateY(0)}

    avatarSvg:'<svg viewBox="0 0 200 200"><defs><clipPath id="cC3"><circle cx="100" cy="100" r="100"/></clipPath><linearGradient id="cS2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a4d2e"/><stop offset="100%" stop-color="#0f3320"/></linearGradient></defs><g clip-path="url(#cC3)"><rect width="200" height="200" fill="#d5ece2"/><ellipse cx="100" cy="210" rx="80" ry="60" fill="url(#cS2)"/><path d="M60 155 L80 140 100 155 120 140 140 155 140 210 60 210Z" fill="url(#cS2)"/><path d="M80 140 L100 155 120 140 120 170 80 170Z" fill="#fff"/><polygon points="100,170 94,145 106,145" fill="#2563eb"/><ellipse cx="100" cy="88" rx="42" ry="48" fill="#d4a06a"/><ellipse cx="100" cy="100" rx="12" ry="8" fill="#c08a52"/><ellipse cx="100" cy="95" rx="4.5" ry="3" fill="#a8743e"/><ellipse cx="82" cy="82" rx="7" ry="5.5" fill="#fff"/><ellipse cx="118" cy="82" rx="7" ry="5.5" fill="#fff"/><circle cx="83" cy="82" r="3.5" fill="#1a1a1a"/><circle cx="119" cy="82" r="3.5" fill="#1a1a1a"/><circle cx="84" cy="81" r="1.5" fill="#fff"/><circle cx="120" cy="81" r="1.5" fill="#fff"/><path d="M73 76 Q82 72 91 76" stroke="#1a1a1a" stroke-width="2.5" fill="none"/><path d="M109 76 Q118 72 127 76" stroke="#1a1a1a" stroke-width="2.5" fill="none"/><path d="M85 108 Q100 120 115 108" stroke="#8a5a30" stroke-width="2.5" fill="none"/><path d="M88 109 Q100 117 112 109" fill="#c0706a" opacity=".35"/><ellipse cx="58" cy="90" rx="8" ry="12" fill="#c08a52"/><ellipse cx="142" cy="90" rx="8" ry="12" fill="#c08a52"/><path d="M58 48 Q62 28 100 24 Q138 28 142 48 Q138 40 130 38 Q122 44 100 42 Q78 44 70 38 Q62 40 58 48 Z" fill="#1a1a1a"/></g></svg>',
    greeting:'老闆好！我是 Cash，負責財務與成本管控。需要看報表嗎？',
    suggestions:[],
    responses:{}
  },
  sterling:{name:'Sterling',role:'商務參謀',color:'#a0aec0',
    avatarSvg:'<svg viewBox="0 0 200 200"><defs><clipPath id="cS3"><circle cx="100" cy="100" r="100"/></clipPath><linearGradient id="sS2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4a5568"/><stop offset="100%" stop-color="#2d3748"/></linearGradient></defs><g clip-path="url(#cS3)"><rect width="200" height="200" fill="#e2e6ea"/><ellipse cx="100" cy="210" rx="80" ry="60" fill="url(#sS2)"/><path d="M60 155 L80 140 100 155 120 140 140 155 140 210 60 210Z" fill="url(#sS2)"/><path d="M80 140 L100 155 120 140 120 170 80 170Z" fill="#f0f0f0"/><polygon points="100,170 94,145 106,145" fill="#d69e2e"/><ellipse cx="100" cy="88" rx="42" ry="48" fill="#fce4c8"/><ellipse cx="100" cy="100" rx="12" ry="8" fill="#ecd0a8"/><ellipse cx="100" cy="95" rx="4" ry="2.5" fill="#d4b48a"/><ellipse cx="82" cy="82" rx="7" ry="5.5" fill="#fff"/><ellipse cx="118" cy="82" rx="7" ry="5.5" fill="#fff"/><circle cx="83" cy="82" r="3.5" fill="#4a6741"/><circle cx="119" cy="82" r="3.5" fill="#4a6741"/><circle cx="84" cy="81" r="1.5" fill="#fff"/><circle cx="120" cy="81" r="1.5" fill="#fff"/><path d="M73 76 Q82 72 91 76" stroke="#a08030" stroke-width="2.2" fill="none"/><path d="M109 76 Q118 72 127 76" stroke="#a08030" stroke-width="2.2" fill="none"/><path d="M90 110 Q100 116 110 110" stroke="#c0846d" stroke-width="2" fill="none"/><ellipse cx="58" cy="90" rx="8" ry="12" fill="#ecd0a8"/><ellipse cx="142" cy="90" rx="8" ry="12" fill="#ecd0a8"/><path d="M55 48 Q60 20 100 16 Q140 20 145 48 L142 46 Q138 26 100 22 Q62 26 58 46 Z" fill="#c9a64e"/><path d="M58 48 Q62 36 74 34 L70 48 Z" fill="#c9a64e"/><path d="M142 48 Q138 36 126 34 L130 48 Z" fill="#c9a64e"/></g></svg>',
    greeting:'老闆好！我是 Sterling，負責商務開發。有新商機嗎？',
    suggestions:[],
    responses:{}
  }
};

var currentAgent=null, chatHistories={};

/* 單頁模式：產出區在載入時直接渲染 */

/* ===== Output Page: Agent Grid → Report List ===== */
var URGENCY_ORDER={urgent:0,normal:1,low:2};
var URGENCY_LABEL={urgent:'急件',normal:'一般',low:'例行'};
var TILE_COLORS={wayne:'linear-gradient(135deg,#dce4f2,#c8d4ea)',king:'linear-gradient(135deg,#e2dfe8,#d4d0de)',cash:'linear-gradient(135deg,#d5ece2,#c4e2d4)',sterling:'linear-gradient(135deg,#dde5ea,#cdd7df)'};
var TILE_ICONS={wayne:'👔',king:'👥',cash:'💰',sterling:'🎯'};

function showOutputGrid(){
  var c=document.getElementById('outputContent');
  var agents=['wayne','king','cash','sterling'];
  c.innerHTML='<div class="page-header">📄 Agent 產出報告</div><div class="agent-grid">'
    +agents.map(function(id){
      var a=AGENTS[id];
      var cnt=REPORTS.filter(function(r){return r.agent===id;}).length;
      var urgCnt=REPORTS.filter(function(r){return r.agent===id&&r.urgency==='urgent';}).length;
      return '<div class="agent-tile" style="background:'+TILE_COLORS[id]+'" onclick="showAgentReports(\''+id+'\')">'
        +'<div class="agent-tile-count">'+cnt+'</div>'
        +'<div class="agent-tile-icon">'+TILE_ICONS[id]+'</div>'
        +'<div class="agent-tile-name">'+a.name+'</div>'
        +'<div class="agent-tile-role">'+a.role+(urgCnt?' · '+urgCnt+' 急件':'')+'</div>'
        +'<div class="agent-tile-arrow">›</div>'
        +'</div>';
    }).join('')+'</div>';
}

function showAgentReports(agentId){
  var a=AGENTS[agentId];
  var reports=REPORTS.filter(function(r){return r.agent===agentId;});
  reports.sort(function(a,b){
    if(a.date!==b.date) return a.date>b.date?-1:1;
    if(URGENCY_ORDER[a.urgency]!==URGENCY_ORDER[b.urgency]) return URGENCY_ORDER[a.urgency]-URGENCY_ORDER[b.urgency];
    return a.time>b.time?-1:1;
  });
  var grouped={};
  reports.forEach(function(r){
    var dk=r.date;
    if(!grouped[dk]) grouped[dk]=[];
    grouped[dk].push(r);
  });
  var dates=Object.keys(grouped).sort().reverse();
  var c=document.getElementById('outputContent');
  var html='<div class="output-back-row"><button class="output-back-btn" onclick="showOutputGrid()">‹</button><div class="output-agent-label" style="color:'+a.color+'">'+a.name+' 的報告</div></div>';
  dates.forEach(function(dk){
    var parts=dk.split('-');
    var label=parseInt(parts[1])+'月'+parseInt(parts[2])+'日';
    var today=new Date();
    var tStr=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
    if(dk===tStr) label='今天 '+label;
    html+='<div class="output-date-group">'+label+'</div>';
    grouped[dk].forEach(function(r){
      html+='<div class="news-card" onclick="openReport('+r.id+')">'
        +'<div class="news-top"><span class="news-urgency '+r.urgency+'">'+URGENCY_LABEL[r.urgency]+'</span><div class="news-time">'+r.time+'</div></div>'
        +'<div class="news-headline">'+r.headline+'</div>'
        +'<div class="news-summary">'+r.summary+'</div>'
        +'<div class="news-tags">'+r.tags.map(function(t){return '<span class="news-tag" style="background:'+r.color+'18;color:'+r.color+'">'+t+'</span>';}).join('')+'</div>'
        +'<div class="news-arrow">›</div>'
        +'</div>';
    });
  });
  c.innerHTML=html;
}

function openReport(id){
  var r=REPORTS.find(function(x){return x.id===id;});
  if(!r)return;
  document.getElementById('reportTitle').textContent=AGENTS[r.agent].name+' 報告';
  document.getElementById('reportBody').innerHTML=
    '<div class="report-hero">'
    +'<div class="report-hero-headline">'+r.headline+'</div>'
    +'<div class="report-hero-meta"><div class="report-hero-dot" style="background:'+r.color+'"></div><div><div class="report-hero-agent">'+AGENTS[r.agent].name+'</div><div class="report-hero-role">'+AGENTS[r.agent].role+'</div></div><div class="report-hero-time">'+r.time+'</div></div>'
    +'</div>'
    +'<div class="report-content">'+r.detail+'</div>';
  document.getElementById('reportOverlay').classList.add('open');
  document.getElementById('reportBody').scrollTop=0;
}
function closeReport(){document.getElementById('reportOverlay').classList.remove('open');}

/* ===== Chat ===== */
function openChat(agentId,autoMsg){
  currentAgent=agentId;
  var agent=AGENTS[agentId];
  document.getElementById('chatHdrName').textContent=agent.name;
  document.getElementById('chatHdrRole').textContent=agent.role;
  document.getElementById('chatHdrAvatar').innerHTML=agent.avatarSvg;
  document.querySelector('.chat-input').placeholder='向 '+agent.name+' 說...';
  if(!chatHistories[agentId]) chatHistories[agentId]=[{role:'agent',text:agent.greeting,time:getTime()}];
  renderMessages();renderSuggestions();
  document.getElementById('chatOverlay').classList.add('open');
  if(autoMsg) setTimeout(function(){sendUserMessage(autoMsg);},400);
}
function closeChat(){document.getElementById('chatOverlay').classList.remove('open');currentAgent=null;}

function renderMessages(){
  var c=document.getElementById('chatMessages'),msgs=chatHistories[currentAgent]||[];
  c.innerHTML=msgs.map(function(m){return '<div class="chat-msg '+m.role+'"><div class="chat-bubble">'+m.text.replace(/\n/g,'<br>')+'</div><div class="chat-time">'+m.time+'</div></div>';}).join('');
  requestAnimationFrame(function(){c.scrollTop=c.scrollHeight;});
}
function renderSuggestions(){
  var a=AGENTS[currentAgent],c=document.getElementById('chatSuggestions');
  c.innerHTML=a.suggestions.map(function(s){return '<button class="sug-btn" onclick="sendUserMessage(\''+s.replace(/'/g,"\\'")+'\')">'+s+'</button>';}).join('');
}
function getTime(){var d=new Date(),h=d.getHours(),m=d.getMinutes();return (h<12?'上午':'下午')+(h%12||12).toString().padStart(2,'0')+':'+(m<10?'0':'')+m;}
function sendMessage(){var i=document.getElementById('chatInput'),t=i.value.trim();if(!t)return;i.value='';sendUserMessage(t);}
function sendUserMessage(text){
  if(!currentAgent)return;
  var agent=AGENTS[currentAgent];
  chatHistories[currentAgent].push({role:'user',text:text,time:getTime()});
  renderMessages();
  document.getElementById('chatSuggestions').innerHTML='';
  var mc=document.getElementById('chatMessages'),td=document.createElement('div');
  td.className='chat-msg agent';
  td.innerHTML='<div class="typing-indicator"><span></span><span></span><span></span></div>';
  mc.appendChild(td);mc.scrollTop=mc.scrollHeight;
  setTimeout(function(){
    td.remove();
    var resp=agent.responses[text]||generateResponse(text,agent);
    chatHistories[currentAgent].push({role:'agent',text:resp,time:getTime()});
    renderMessages();renderSuggestions();
  },800+Math.random()*1200);
}
function generateResponse(text,agent){
  var l=text.toLowerCase();
  if(l.indexOf('你好')>=0||l.indexOf('嗨')>=0||l.indexOf('hi')>=0||l.indexOf('在嗎')>=0||l.indexOf('hello')>=0)
    return '在的！老闆好～ 我是 '+agent.name+'，隨時為您服務！';
  if(l.indexOf('謝謝')>=0||l.indexOf('辛苦')>=0) return '不客氣！有需要隨時叫我。';
  return '收到！請提供相關資料，我立刻幫您處理。';
}
document.getElementById('chatInput').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);}

/* ===== 通知系統 ===== */
var NOTIF_TYPES={report:'📄',chat:'💬',task:'⚡',system:'🔔'};
var notifications=[];
var notifIdCounter=0;

var INITIAL_NOTIFS=[];

INITIAL_NOTIFS.forEach(function(n){
  n.id=++notifIdCounter;
  notifications.push(n);
});

var PUSH_POOL=[];
var pushPoolIdx=0;

function updateNotifBadge(){
  var cnt=notifications.filter(function(n){return n.unread;}).length;
  var badge=document.getElementById('notifBadge');
  badge.textContent=cnt>0?cnt:'';
}

function renderNotifList(){
  var list=document.getElementById('notifList');
  if(notifications.length===0){list.innerHTML='<div class="notif-empty">🔔 沒有通知</div>';return;}
  list.innerHTML=notifications.map(function(n){
    var icon=NOTIF_TYPES[n.type]||'🔔';
    return '<div class="notif-item'+(n.unread?' unread':'')+'" onclick="handleNotifClick('+n.id+')">'
      +'<div class="notif-dot-wrap" style="background:'+(n.agent&&AGENTS[n.agent]?AGENTS[n.agent].color+'18':'var(--bg)')+'">'+icon+'</div>'
      +'<div class="notif-body"><div class="notif-body-title">'+n.title+'</div><div class="notif-body-text">'+n.text+'</div><div class="notif-body-time">'+n.time+'</div></div>'
      +'</div>';
  }).join('');
}

function toggleNotifPanel(){
  var panel=document.getElementById('notifPanel');
  panel.classList.toggle('open');
  if(panel.classList.contains('open')) renderNotifList();
}

function handleNotifClick(id){
  var n=notifications.find(function(x){return x.id===id;});
  if(!n)return;
  n.unread=false;
  updateNotifBadge();
  toggleNotifPanel();
  if(n.action){
    if(n.action.type==='report'){
      var r=REPORTS.find(function(x){return x.id===n.action.id;});
      if(r){showAgentReports(r.agent);}
      var out=document.getElementById('pageOutput');
      if(out) out.scrollIntoView({behavior:'smooth',block:'start'});
      setTimeout(function(){openReport(n.action.id);},300);
    }else if(n.action.type==='page'){
      var sec=document.getElementById(n.action.id);
      if(sec) sec.scrollIntoView({behavior:'smooth',block:'start'});
    }else if(n.action.type==='chat'){
      openChat(n.agent);
    }
  }
}

function clearAllNotifs(){
  notifications.forEach(function(n){n.unread=false;});
  updateNotifBadge();renderNotifList();
  showToast('已全部標為已讀');
}

function showPushToast(notif){
  var icon=NOTIF_TYPES[notif.type]||'🔔';
  document.getElementById('pushToastIcon').textContent=icon;
  document.getElementById('pushToastTitle').textContent=notif.title;
  document.getElementById('pushToastText').textContent=notif.text;
  var toast=document.getElementById('pushToast');
  toast.onclick=function(){toast.classList.remove('show');handleNotifClick(notif.id);};
  toast.classList.add('show');
  setTimeout(function(){toast.classList.remove('show');},4000);
}

function simulatePush(){
  if(!PUSH_POOL.length) return;
  var template=PUSH_POOL[pushPoolIdx%PUSH_POOL.length];
  pushPoolIdx++;
  var n={id:++notifIdCounter,type:template.type,agent:template.agent,title:template.title,text:template.text,time:getTime(),unread:true,action:template.type==='chat'?{type:'chat'}:{type:'page',id:'pageOutput'}};
  notifications.unshift(n);
  updateNotifBadge();
  showPushToast(n);
  var next=25000+Math.random()*35000;
  setTimeout(simulatePush,next);
}

showOutputGrid();
updateNotifBadge();
</script>
