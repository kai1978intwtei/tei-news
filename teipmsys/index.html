<!-- 預熱 ProjFlow 網域：使用者一進 PMSYS 就先做 DNS / TLS 握手，按翻書頁時不用再等 -->

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%232F5D50'/%3E%3Ctext x='32' y='24' font-family='Georgia,serif' font-size='11' font-weight='700' fill='%23ffffff' fill-opacity='0.72' text-anchor='middle' letter-spacing='1.2'%3ETEi%3C/text%3E%3Ctext x='32' y='49' font-family='Georgia,serif' font-size='20' font-weight='700' fill='white' text-anchor='middle'%3EPM%3C/text%3E%3C/svg%3E">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #FAFAF7;
    --paper:        #FFFFFF;
    --bg-subtle:    #F4F2EC;
    --bg-warm:      #F8F3EA;
    --border:       #ECEAE4;
    --border-soft:  #F2F0EA;
    --border-strong:#D9D6CD;
    --text:         #1F1F1C;
    --text-2:       #555550;
    --text-3:       #8E8B83;
    --ink:          #2F5D50;
    --ink-hover:    #244A40;
    --ink-soft:     #EBF1EE;
    --ink-ring:     rgba(47,93,80,.18);
    --caramel:      #C77B45;
    --caramel-hover:#B26A37;
    --caramel-soft: #FBF1E8;
    --rust:         #A85C2D;
    --moss:         #4A7C5A;
    --plum:         #7A4C66;
    --shadow-1: 0 1px 2px rgba(31,31,28,.04), 0 2px 6px rgba(31,31,28,.04);
    --shadow-2: 0 1px 2px rgba(31,31,28,.04), 0 8px 24px rgba(31,31,28,.06);
    --shadow-3: 0 4px 12px rgba(31,31,28,.06), 0 24px 48px rgba(31,31,28,.08);
  }

  html, body {
    font-family: 'Inter', 'Noto Sans TC', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-feature-settings: "tnum" 1, "ss01" 1;
  }
  .serif { font-family: 'Noto Serif TC', 'Noto Sans TC', serif; }
  .mono  { font-family: 'JetBrains Mono', ui-monospace, monospace; letter-spacing: -.02em; }
  .ui    { font-family: 'Inter', 'Noto Sans TC', sans-serif; }

  /* Paper card */
  .paper {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--shadow-1);
  }
  .paper-lift { transition: box-shadow .2s, transform .2s; }
  .paper-lift:hover { box-shadow: var(--shadow-2); transform: translateY(-1px); }

  /* Buttons */
  .btn-ink {
    background: var(--ink); color: #fff;
    border-radius: 8px; padding: 8px 16px;
    font-weight: 500; font-size: 13px;
    transition: background .15s, transform .1s, box-shadow .15s;
    box-shadow: 0 1px 2px rgba(47,93,80,.18);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-ink:hover { background: var(--ink-hover); box-shadow: 0 2px 8px rgba(47,93,80,.25); }
  .btn-ink:active { transform: translateY(1px); }

  .btn-ghost {
    background: transparent; color: var(--text-2);
    border: 1px solid var(--border-strong);
    border-radius: 8px; padding: 7px 14px;
    font-size: 13px; font-weight: 500;
    transition: all .15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-ghost:hover { background: var(--bg-subtle); color: var(--text); border-color: var(--text-3); }

  .btn-caramel {
    background: var(--caramel); color: #fff;
    border-radius: 8px; padding: 8px 16px;
    font-weight: 500; font-size: 13px;
    transition: background .15s, box-shadow .15s;
    box-shadow: 0 1px 2px rgba(199,123,69,.2);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-caramel:hover { background: var(--caramel-hover); box-shadow: 0 2px 8px rgba(199,123,69,.28); }

  /* 金色 — 一秒跳 ProjFlow 專用 */
  .btn-gold {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 8px;
    font-size: 12.5px; font-weight: 600; letter-spacing: .01em;
    color: #4A2F0F;
    background: linear-gradient(135deg, #F2CE6E 0%, #D6A93E 50%, #BE8B2B 100%);
    border: 1px solid #A87819;
    box-shadow:
      0 1px 2px rgba(102,68,15,.25),
      inset 0 1px 0 rgba(255,255,255,.45),
      inset 0 -1px 0 rgba(102,68,15,.15);
    transition: transform .12s, box-shadow .15s, background .15s;
    text-decoration: none;
    white-space: nowrap;
  }
  .btn-gold:hover {
    background: linear-gradient(135deg, #F8DC8A 0%, #E5BC59 50%, #CB9A35 100%);
    box-shadow:
      0 3px 10px rgba(166,128,30,.4),
      inset 0 1px 0 rgba(255,255,255,.55),
      inset 0 -1px 0 rgba(102,68,15,.18);
    transform: translateY(-1px);
  }
  .btn-gold:active {
    transform: translateY(0);
    box-shadow:
      0 1px 2px rgba(102,68,15,.3),
      inset 0 2px 4px rgba(102,68,15,.18);
  }
  .btn-gold .gold-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #FFFAE6;
    box-shadow: 0 0 6px rgba(255,250,230,.9);
    animation: gold-pulse 2s ease-in-out infinite;
  }
  @keyframes gold-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: .5; transform: scale(.85); }
  }
  /* RTM 用銅紅色系，與金色 ProjFlow 鈕並列、識別清楚 */
  /* RTM 用淺綠色系，與金色 ProjFlow 鈕並列、識別清楚 */
  .btn-copper {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 8px;
    font-size: 12.5px; font-weight: 600; letter-spacing: .01em;
    color: #1F3D14;
    background: linear-gradient(135deg, #BFE5A8 0%, #8FCE6E 55%, #6BAF4C 100%);
    border: 1px solid #4F8836;
    box-shadow:
      0 1px 2px rgba(40,80,25,.25),
      inset 0 1px 0 rgba(255,255,255,.5),
      inset 0 -1px 0 rgba(40,80,25,.18);
    transition: transform .12s, box-shadow .15s, background .15s;
    white-space: nowrap;
  }
  .btn-copper:hover {
    background: linear-gradient(135deg, #CFEEBA 0%, #A1DA82 55%, #7CBE5C 100%);
    box-shadow:
      0 3px 10px rgba(80,140,50,.35),
      inset 0 1px 0 rgba(255,255,255,.55),
      inset 0 -1px 0 rgba(40,80,25,.2);
    transform: translateY(-1px);
  }
  .btn-copper:active { transform: translateY(0); }
  .btn-copper .copper-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #F4FFE6;
    box-shadow: 0 0 6px rgba(244,255,230,.95);
    animation: gold-pulse 2s ease-in-out infinite;
  }

  /* ============= 真正的翻書頁動畫（從右往左翻，PMSYS→ProjFlow） ============= */
  .flip-overlay {
    position: fixed; inset: 0; z-index: 99999;
    pointer-events: none;
    perspective: 2400px;
    perspective-origin: center center;
  }
  /* 翻動的「頁」— 有正反兩面，繞左側書脊旋轉 180° */
  .flip-overlay-page {
    position: absolute; inset: 0;
    transform-origin: left center;
    transform-style: preserve-3d;
    transform: rotateY(0deg);
    /* 2500ms 多階段曲線 — 看清楚整個翻頁過程,動畫即「等候時間」的視覺替代 */
    animation: bookPageTurnLeft 2500ms cubic-bezier(.32, .04, .18, 1) forwards;
  }
  .flip-overlay-front,
  .flip-overlay-back {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  /* 正面 — 翻起時看到的「離開 PMSYS」的頁面（明顯比底下深一點,讓「掀起」感清楚） */
  .flip-overlay-front {
    background: linear-gradient(135deg, #F2EBD7 0%, #E8DCBE 50%, #DCC998 100%);
    box-shadow: inset 0 0 100px rgba(120,80,40,.12);
  }
  .flip-overlay-front::after {
    /* 翻頁時邊緣的陰影漸層 — 強化紙張立體感（加深 + 加寬） */
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to right, transparent 40%, rgba(0,0,0,.22) 100%);
    pointer-events: none;
  }
  /* 反面 — 翻過後看到的 ProjFlow 目的地 */
  .flip-overlay-back {
    background: linear-gradient(135deg, #0a0e1a 0%, #161a2e 50%, #1f1430 100%);
    transform: rotateY(180deg);
  }
  .flip-overlay-back::after {
    /* 反面的反向陰影 */
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to left, transparent 60%, rgba(0,0,0,.2) 100%);
    pointer-events: none;
  }
  /* 正面 PMSYS 殘影標誌（清楚一點，讓你看見「這頁正在被翻起」） */
  .flip-overlay-leaving {
    text-align: center; opacity: .92;
    transform: scale(1);
  }
  .flip-overlay-leaving .lv-chip {
    display: inline-flex; flex-direction: column; align-items: center;
    padding: 22px 32px; background: #2F5D50; border-radius: 16px;
    box-shadow: 0 6px 24px rgba(47,93,80,.32), inset 0 1px 0 rgba(255,255,255,.1);
  }
  .flip-overlay-leaving .lv-tei {
    font-family: 'Noto Serif TC', Georgia, serif;
    font-size: 13px; font-weight: 700;
    color: rgba(255,255,255,.78);
    letter-spacing: .18em;
  }
  .flip-overlay-leaving .lv-name {
    font-family: 'Noto Serif TC', Georgia, serif;
    font-size: 32px; font-weight: 700; color: white;
    margin-top: 6px; line-height: 1;
  }
  .flip-overlay-leaving .lv-sub {
    font-size: 11px; color: #6B5F45;
    letter-spacing: .12em; text-transform: uppercase;
    margin-top: 14px; font-weight: 600;
  }
  /* 反面 ProjFlow 目的地標誌 */
  .flip-overlay-brand {
    opacity: 0;
    /* brand 在翻頁過 50% 後浮現,配合背面進入視覺(2500ms × 50% = 1250ms) */
    animation: flipBrandFade 600ms 1300ms cubic-bezier(.3,.7,.4,1) forwards;
    text-align: center; color: white;
  }
  /* 跑步人 + 文字 — 填補翻頁結束 → ProjFlow 載入完之間的網路等候空檔 */
  .flip-overlay-runner-wrap {
    margin-top: 24px;
    display: flex; align-items: center; justify-content: center; gap: 14px;
    opacity: 0;
    animation: flipBrandFade 420ms 1900ms forwards;
  }
  .flip-overlay-runner {
    font-size: 30px;
    display: inline-block;
    animation: runnerCycle 0.55s ease-in-out infinite;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,.4));
  }
  .flip-overlay-runner-text {
    font-size: 12.5px;
    color: rgba(255,255,255,.65);
    letter-spacing: .14em;
    text-transform: uppercase;
    font-weight: 600;
  }
  /* 跑步循環：左右擺動 + 上下彈跳 + 輕微傾斜，模擬奔跑節奏 */
  @keyframes runnerCycle {
    0%   { transform: translateX(-14px) translateY(0)    rotate(-4deg); }
    25%  { transform: translateX(-7px)  translateY(-5px) rotate(-2deg); }
    50%  { transform: translateX(0)     translateY(0)    rotate(2deg); }
    75%  { transform: translateX(7px)   translateY(-5px) rotate(4deg); }
    100% { transform: translateX(14px)  translateY(0)    rotate(2deg); }
  }
  /* 跑步道地面殘影 — 讓人感覺真的在跑 */
  .flip-overlay-runner-track {
    position: relative;
    width: 80px; height: 2px;
    background: linear-gradient(to right, transparent, rgba(255,255,255,.18), transparent);
    overflow: hidden;
  }
  .flip-overlay-runner-track::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to right, transparent 30%, rgba(255,255,255,.5) 50%, transparent 70%);
    animation: trackSweep 1.1s linear infinite;
  }
  @keyframes trackSweep {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  .flip-overlay-loading span {
    width: 4px; height: 4px; border-radius: 50%;
    background: rgba(255,255,255,.4);
    animation: loadingDot 1.2s ease-in-out infinite;
  }
  .flip-overlay-loading span:nth-child(2) { animation-delay: .2s; }
  .flip-overlay-loading span:nth-child(3) { animation-delay: .4s; }
  @keyframes loadingDot {
    0%, 100% { opacity: .3; transform: scale(.8); }
    50%      { opacity: 1;  transform: scale(1.2); background: rgba(255,255,255,.85); }
  }
  .flip-overlay-brand .brand-mark {
    font-family: 'Noto Serif TC', Georgia, serif;
    font-size: 48px; font-weight: 700;
    letter-spacing: -.02em;
    background: linear-gradient(135deg, #ff5577 0%, #ff7a92 50%, #ffaab8 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }
  .flip-overlay-brand .brand-sub {
    font-size: 12px; color: rgba(255,255,255,.55);
    letter-spacing: .14em; text-transform: uppercase;
  }
  .flip-overlay-brand .brand-dot {
    display: inline-block;
    width: 8px; height: 8px; border-radius: 50%;
    background: #ff7a92;
    box-shadow: 0 0 14px rgba(255,122,146,.9);
    margin-right: 8px;
    animation: brandDotPulse 1s ease-in-out infinite;
  }
  /* 翻頁過程中底下的陰影（強化空間感） */
  .flip-overlay-shadow {
    position: absolute; inset: 0; z-index: -1;
    background: radial-gradient(ellipse at center, rgba(0,0,0,.25) 0%, transparent 70%);
    opacity: 0;
    animation: pageDropShadow 2500ms cubic-bezier(.32, .04, .18, 1) forwards;
    pointer-events: none;
  }
  @keyframes bookPageTurnLeft {
    /* 多階段：快起（0-35%）→ 中段平滑（35-75%）→ 緩落settle（75-100%）*/
    0%   { transform: rotateY(0deg);    box-shadow: 0 0 0 rgba(0,0,0,0); }
    35%  { transform: rotateY(-72deg);  box-shadow: 0 30px 60px rgba(0,0,0,.28); }
    75%  { transform: rotateY(-152deg); box-shadow: 0 40px 80px rgba(0,0,0,.35); }
    100% { transform: rotateY(-180deg); box-shadow: -8px 0 28px rgba(0,0,0,.18); }
  }
  @keyframes pageDropShadow {
    0%, 100% { opacity: 0; }
    50%      { opacity: 1; }
  }
  @keyframes flipBrandFade {
    0%   { opacity: 0; transform: translateX(-12px); }
    100% { opacity: 1; transform: translateX(0); }
  }
  @keyframes brandDotPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: .4; transform: scale(.8); }
  }

  /* Tags */
  .tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 9px; border-radius: 4px;
    font-size: 11px; font-weight: 500; letter-spacing: .02em;
    border: 1px solid transparent;
  }
  .tag-ink     { background: var(--ink-soft); color: var(--ink); border-color: #D8E3DE; }
  .tag-caramel { background: var(--caramel-soft); color: var(--caramel-hover); border-color: #F0DDC7; }
  .tag-rust    { background: #FBEBE0; color: var(--rust); border-color: #F0D2BA; }
  .tag-moss    { background: #E8F0E9; color: var(--moss); border-color: #D2E1D4; }
  .tag-plum    { background: #F1E6EB; color: var(--plum); border-color: #E0CCD3; }
  .tag-grey    { background: var(--bg-subtle); color: var(--text-2); border-color: var(--border-strong); }

  /* Nav */
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; margin: 0 8px; border-radius: 7px;
    color: var(--text-2); font-size: 13px; font-weight: 500;
    transition: background .12s, color .12s;
    cursor: pointer;
  }
  .nav-item:hover { background: var(--bg-subtle); color: var(--text); }
  .nav-item.active {
    background: var(--ink-soft); color: var(--ink); font-weight: 600;
  }
  .nav-item.active i { color: var(--ink); }
  .nav-section {
    font-size: 10px; font-weight: 600; letter-spacing: .12em;
    color: var(--text-3); text-transform: uppercase;
    padding: 14px 22px 6px;
  }

  /* Sync indicator */
  .sync-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--moss); display: inline-block;
    box-shadow: 0 0 0 0 rgba(74,124,90,.6);
    animation: pulse 2.4s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(74,124,90,.5); }
    70%  { box-shadow: 0 0 0 6px rgba(74,124,90,0); }
    100% { box-shadow: 0 0 0 0 rgba(74,124,90,0); }
  }

  /* Gantt */
  .gantt-row { display: grid; grid-template-columns: 240px 1fr; align-items: center; min-height: 44px; }
  .gantt-track {
    position: relative; height: 44px;
    background-image:
      linear-gradient(to right, var(--border-soft) 1px, transparent 1px);
    background-size: calc(100%/14) 100%;
  }
  .gantt-bar {
    position: absolute; top: 11px; height: 22px;
    border-radius: 5px;
    font-size: 11px; font-weight: 500;
    padding: 3px 10px; color: #fff;
    white-space: nowrap; overflow: hidden;
    box-shadow: 0 1px 2px rgba(0,0,0,.1);
  }
  .gantt-today {
    position: absolute; top: 0; bottom: 0; width: 1px;
    background: var(--caramel); z-index: 5;
  }
  .gantt-today::before {
    content: '今';
    position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
    background: var(--caramel); color: #fff;
    font-size: 10px; padding: 1px 5px; border-radius: 3px;
    font-family: 'Noto Sans TC';
  }

  /* Schedule */
  .schedule-cell {
    border-right: 1px solid var(--border-soft);
    border-bottom: 1px solid var(--border-soft);
    min-height: 64px;
    position: relative;
    transition: background .12s;
  }
  .schedule-cell:hover { background: var(--bg-subtle); }
  .schedule-event {
    position: absolute; left: 4px; right: 4px;
    border-radius: 4px; padding: 4px 6px;
    font-size: 11px; font-weight: 500;
    overflow: hidden; cursor: pointer;
    border-left: 3px solid;
  }

  /* A4 Paper */
  .a4-paper {
    width: 794px;
    min-height: 1123px;
    background: var(--paper);
    padding: 80px 70px;
    box-shadow: var(--shadow-3);
    margin: 0 auto;
    border-radius: 2px;
    font-family: 'Noto Serif TC', serif;
    line-height: 1.85;
    color: #2A2A28;
  }
  .a4-paper h1.report-title {
    font-size: 28px; font-weight: 700;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 12px; margin-bottom: 8px;
    color: var(--ink);
  }
  .a4-paper h2.section { font-size: 18px; font-weight: 600; margin: 32px 0 12px; color: #1F1F1C; }
  .a4-paper p { margin-bottom: 14px; font-size: 14.5px; }
  .a4-paper .meta {
    font-family: 'Inter'; font-size: 12px;
    color: var(--text-3); margin-bottom: 28px;
    display: flex; gap: 18px; flex-wrap: wrap;
  }
  .a4-paper .meta span strong { color: var(--text-2); margin-right: 4px; font-weight: 500; }
  .a4-paper .figure {
    border: 1px solid var(--border);
    background: var(--bg-subtle);
    padding: 28px; border-radius: 4px;
    text-align: center; color: var(--text-3);
    font-family: 'Inter'; font-size: 12px;
    margin: 16px 0;
  }
  .a4-toolbar {
    background: var(--paper); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px;
    display: flex; gap: 4px; align-items: center;
    box-shadow: var(--shadow-1);
  }
  .a4-toolbar button {
    padding: 6px 10px; border-radius: 6px;
    color: var(--text-2); transition: background .12s;
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 500;
  }
  .a4-toolbar button:hover { background: var(--bg-subtle); color: var(--text); }
  .a4-toolbar .divider { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #DAD7D0; border-radius: 5px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: #C2BFB8; }

  /* Subtle fade in */
  .fade-in { animation: fadeIn .28s ease-out; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Form inputs */
  input[type="text"], input[type="search"], textarea, select {
    background: var(--paper);
    border: 1px solid var(--border-strong);
    border-radius: 7px;
    font-size: 13px;
    transition: border-color .12s, box-shadow .12s;
    font-family: inherit;
  }
  input[type="text"]:focus, input[type="search"]:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--ink);
    box-shadow: 0 0 0 3px var(--ink-ring);
  }

  /* Grid helpers */
  .grid-14 { grid-template-columns: repeat(14, minmax(0, 1fr)); }
  .grid-7  { grid-template-columns: repeat(7,  minmax(0, 1fr)); }
  .grid-12-month { grid-template-columns: repeat(12, minmax(0, 1fr)); }

  /* Priority bar */
  .priority-bar { width: 3px; height: 28px; border-radius: 2px; }
  .priority-high   { background: var(--rust); }
  .priority-medium { background: var(--caramel); }
  .priority-low    { background: var(--text-3); }

  /* Checkbox */
  input[type="checkbox"] {
    appearance: none;
    width: 16px; height: 16px;
    border: 1.5px solid var(--border-strong);
    border-radius: 4px;
    cursor: pointer; vertical-align: middle;
    transition: all .12s;
    background: var(--paper);
    position: relative;
  }
  input[type="checkbox"]:checked {
    background: var(--ink); border-color: var(--ink);
  }
  input[type="checkbox"]:checked::after {
    content: ''; position: absolute;
    left: 4px; top: 1px;
    width: 5px; height: 9px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  /* ProjFlow badge */
  .projflow-link {
    background: linear-gradient(135deg, #1a1f3a, #2a3055);
    color: #e8ecff;
    padding: 4px 10px; border-radius: 5px;
    font-size: 11px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 5px;
  }
/* ===== 公司組織圖（橫向樹狀 + 自動縮放 fit 視窗） ===== */
.org-fit-wrap { width:100%; height:100%; overflow:hidden; display:flex; align-items:center; justify-content:center; }
.org-fit-inner { display:inline-block; transform-origin: top center; will-change: transform; }
.org-tree { display: inline-block; padding: 4px 12px 12px; }
.org-tree-inner { display: inline-flex; flex-direction: column; align-items: center; }
.org-level { display: flex; justify-content: center; }
.org-children-wrap { display: flex; justify-content: center; position: relative; padding-top: 16px; }
.org-children-wrap::before {
  content: ''; position: absolute; left: 50%; top: 0;
  width: 0; height: 8px; border-left: 1.2px solid #c9bca3;
}
.org-branch {
  position: relative; padding: 0 6px;
  display: flex; flex-direction: column; align-items: center;
}
.org-branch::before {
  content: ''; position: absolute; left: 50%; top: 0;
  width: 0; height: 8px; border-left: 1.2px solid #c9bca3;
}
.org-branch::after {
  content: ''; position: absolute; left: 0; right: 0; top: 8px;
  height: 0; border-top: 1.2px solid #c9bca3;
}
.org-branch:first-child::after { left: 50%; }
.org-branch:last-child::after { right: 50%; }
.org-branch:only-child::after { display: none; }
.org-branch:only-child::before { display: none; }
.org-branch > .org-children-wrap { padding-top: 8px; }
.org-branch > .org-children-wrap::before { display: none; }
.org-branch > .org-node-box { margin-top: 8px; }
.org-branch:only-child > .org-node-box { margin-top: 0; }
.org-node-box {
  display: inline-flex; flex-direction: column; align-items: center;
  padding: 5px 9px; background: white;
  border: 1.2px solid #c9bca3; border-radius: 7px;
  min-width: 90px; box-shadow: 0 1px 3px rgba(0,0,0,.04);
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.org-node-box:hover { border-color: var(--caramel); box-shadow: 0 3px 10px rgba(196,122,58,.18); transform: translateY(-1px); }
.org-node-box.is-top    { background: linear-gradient(135deg, var(--ink-soft) 0%, white 100%); border-color: var(--ink); }
.org-node-box.is-mid    { background: rgba(196, 122, 58, 0.06); border-color: var(--caramel); }
.org-node-box.is-leaf   { background: white; }
.org-node-box .org-name { font-size: 11px; font-weight: 700; color: var(--text); line-height: 1.2; }
.org-node-box .org-meta { display: flex; align-items: center; gap: 4px; margin-top: 2px; font-size: 8.5px; color: var(--text-3); }
.org-node-box .org-count {
  font-size: 8.5px; font-weight: 600;
  padding: 0 4px; border-radius: 999px;
  background: var(--ink-soft); color: var(--text-2);
}

/* 按課的卡片 grid - 緊湊 */
.section-card {
  background: white; border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 10px; transition: all .15s;
}
.section-card:hover { border-color: var(--caramel); box-shadow: 0 3px 8px rgba(0,0,0,.06); }
.section-card .sec-head { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; padding-bottom: 5px; border-bottom: 1px solid var(--border-soft); }
.section-card .sec-name { font-size: 11.5px; font-weight: 700; color: var(--text); line-height: 1.2; }
.section-card .sec-path { font-size: 9px; color: var(--text-3); margin-top: 1px; }

/* ===== 員工名片卡片 hover 效果 ===== */
.member-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,.08);
  border-color: var(--caramel) !important;
}
.member-card:active { transform: translateY(0); }
.member-card .w-14 { transition: transform .15s; }
.member-card:hover .w-14 { transform: scale(1.06); }

/* ===== 教學引導 overlay ===== */
#tutorial-overlay { position:fixed; inset:0; z-index:80; display:none; background:rgba(31,31,28,.55); backdrop-filter:blur(6px); align-items:center; justify-content:center; padding:24px; }

#tutorial-card { background:#fffaf2; border:1px solid #e6dfd1; border-radius:14px; box-shadow:0 18px 60px rgba(0,0,0,.25); max-width:520px; width:100%; padding:28px 28px 22px; font-family:inherit; }
#tutorial-card .t-step  { font-size:11.5px; letter-spacing:.08em; color:#7a6a52; text-transform:uppercase; }

#tutorial-card .t-body  { font-size:14px; line-height:1.7; color:#2c2c28; }
#tutorial-card .t-body strong { color:#5a3a1a; }
#tutorial-card .t-foot  { margin-top:22px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
#tutorial-card .t-dots  { display:flex; gap:6px; }
#tutorial-card .t-dots span { width:7px; height:7px; border-radius:50%; background:#d8cdb6; }
#tutorial-card .t-dots span.active { background:#5a3a1a; }
#tutorial-card .t-btn   { padding:8px 18px; border-radius:8px; font-size:13.5px; font-weight:600; cursor:pointer; border:1px solid transparent; }
#tutorial-card .t-btn.primary { background:#1f1f1c; color:#fffaf2; }

<script>
/* ============================================================
   模擬資料（PMSYS / PMO 視角）
   ============================================================ */

// ProjFlow org_units（簡化呈現；正式版直接從 ProjFlow Supabase 抓）
const DEPTS = {
  exec:  { name: '總事業管理部', color: 'plum',    code: 'EXE' },
  pmo:   { name: '專案管理中心', color: 'ink',     code: 'PMO', parent: 'exec' },
  spe:   { name: '策略專案執行課', color: 'ink',   code: 'SPE', parent: 'pmo' },
  pur:   { name: '採購課',         color: 'plum',  code: 'PUR', parent: 'exec' },
  hr:    { name: '人資課',         color: 'plum',  code: 'HR',  parent: 'exec' },
  fin:   { name: '財務課',         color: 'plum',  code: 'FIN', parent: 'exec' },
  adm:   { name: '行政課',         color: 'plum',  code: 'ADM', parent: 'exec' },
  dev:   { name: '開發部',         color: 'caramel',code: 'DEV' },
  sales: { name: '業務部',         color: 'moss',  code: 'SAL' },
};

/* ============================================================
   ProjFlow Supabase 整合（Stage 1：連線 + Auth + 抓 profile）

async function signInWithProjFlow() {
  if (!sb) { alert('Supabase SDK 未載入'); return; }
  const email = prompt('輸入你的 ProjFlow Email\n（系統會寄登入連結到信箱，點連結回來即可）');
  if (!email) return;
  const { error } = await sb.auth.signInWithOtp({
    email: email.trim().toLowerCase(),
    options: {
      emailRedirectTo: location.origin + location.pathname,
      shouldCreateUser: false  // 只允許已存在於 ProjFlow 的帳號
    }
  });
  if (error) {
    alert('寄送失敗：' + error.message);
    return;
  }
  const status = document.getElementById('projflow-status');
  if (status) status.innerHTML = `<span style="color: var(--moss);">●</span> 登入連結已寄到 <strong>${email}</strong>，請去信箱點連結。`;
}

async function signOutProjFlow() {
  if (!sb) return;
  await sb.auth.signOut();
  currentProfile = null;
  updateProjFlowStatus();
}

async function fetchMyProfile(userId) {
  if (!sb) return null;
  const { data, error } = await sb
    .from('profiles')
    .select('id, name, english_name, title, role, dept, org_unit_id, avatar, is_pm, last_seen_at, resigned_at')
    .eq('id', userId)
    .maybeSingle();
  if (error) { console.error('[ProjFlow] 抓 profile 失敗', error); return null; }
  return data;
}

function updateProjFlowStatus() {
  const el = document.getElementById('projflow-status');
  if (!el) return;
  if (currentProfile) {
    const display = currentProfile.english_name || currentProfile.name;
    el.innerHTML = `<span style="color: var(--moss);">●</span> ProjFlow 已連線：<strong>${display}</strong> <button onclick="signOutProjFlow()" class="underline ml-1" style="color: var(--text-3);">登出</button>`;
  } else {
    el.textContent = '';
  }
}

// Auth 事件監聽：登入時抓 profile、登出時清掉
if (sb) {
  sb.auth.onAuthStateChange(async (event, session) => {
    console.log('[ProjFlow auth]', event, session?.user?.email || '(無 session)');
    if (session?.user) {
      currentProfile = await fetchMyProfile(session.user.id);
      if (currentProfile) {
        console.log('[ProjFlow] 已抓到 profile:', currentProfile);
      } else {
        console.warn('[ProjFlow] 此 auth user 找不到對應的 profiles 紀錄（可能 RLS 擋下或 ID 不對）');
      }
    } else {
      currentProfile = null;
    }
    updateProjFlowStatus();
  });
  // 頁面載入時：若已有 session（之前登入過、token 還沒過期），直接還原狀態
  sb.auth.getSession().then(({ data }) => {
    if (data.session?.user) {
      fetchMyProfile(data.session.user.id).then(p => {
        currentProfile = p;
        updateProjFlowStatus();
      });
    }
  });
}

function sendOtp() {
  const email = document.getElementById('email-input').value.trim().toLowerCase();
  const errorEl = document.getElementById('email-error');
  const errorText = document.getElementById('email-error-text');

  if (!email) {
    errorText.textContent = '請輸入 Email';
    errorEl.classList.remove('hidden');
    lucide.createIcons();
    return;
  }

  const user = USERS.find(u => u.email?.toLowerCase() === email);
  if (!user) {
    errorText.textContent = '此 Email 未登錄於 ProjFlow profiles';
    errorEl.classList.remove('hidden');
    lucide.createIcons();
    return;
  }
  if (!isAuthorizedForPMSYS(user)) {
    errorText.textContent = '此帳號非專案管理體系成員，無權使用 PMSYS（須與 ProjFlow 角色一致）';
    errorEl.classList.remove('hidden');
    lucide.createIcons();
    return;
  }

  errorEl.classList.add('hidden');
  pendingUser = user;
  document.getElementById('otp-target-email').textContent = email;
  document.getElementById('step-email').classList.add('hidden');
  document.getElementById('step-otp').classList.remove('hidden');
  setTimeout(() => document.getElementById('otp-input').focus(), 50);
  lucide.createIcons();
}

function verifyOtp() {
  const otp = document.getElementById('otp-input').value.trim();
  if (otp.length !== 6) {
    alert('請輸入 6 碼數字驗證碼');
    return;
  }
  if (!pendingUser) return;
  login(pendingUser.id);
}

function backToEmail() {
  document.getElementById('step-otp').classList.add('hidden');
  document.getElementById('step-email').classList.remove('hidden');
  document.getElementById('otp-input').value = '';
  pendingUser = null;
  lucide.createIcons();
}

function login(userId) {
  const u = USERS.find(x => x.id === userId);
  if (!isAuthorizedForPMSYS(u)) {
    alert('此帳號非專案管理體系成員，無權使用 PMSYS');
    return;
  }
  currentUser = u;
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  renderUserInfo();
  renderSidebar();
  // 總經理進入後台總覽；其他角色進入工作檯
  showView(currentUser.role === 'admin' ? 'executive' : 'dashboard');
  // 更新原型切換按鈕標籤
  const swEl = document.getElementById('quick-switch-label');
  if (swEl) swEl.textContent = currentUser.id === 'u100' ? '切到後台' : '切到 PM 視角';
  updateBellBadge();
  // 閒置 60 分鐘自動登出
  idleManager.start();
  // 背景載入 ProjFlow 真實員工名單與群組（不阻塞 UI）
  loadProjFlowRoster()
    .then(() => loadMyGroups())
    .then(() => { if (currentView === 'messages') renderMessages(); })
    .catch(e => console.error('[ProjFlow] roster/groups load failed:', e));
  // 首次登入強制走教學引導
  if (!hasSeenTutorial(currentUser.id)) startTutorial({ forced: true });
}

function updateBellBadge() {
  const badge = document.getElementById('bell-badge');
  if (!badge) return;
  const n = unreadMessageCount();
  if (n > 0) {
    badge.textContent = n > 99 ? '99+' : String(n);
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }
}

function logout(reason) {
  idleManager.stop();
  closeTutorial();
  currentUser = null;
  pendingUser = null;
  document.getElementById('email-input').value = '';
  document.getElementById('otp-input').value = '';
  backToEmail();
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  if (reason === 'idle') {
    setTimeout(() => alert('已閒置超過 60 分鐘，系統已自動登出，請重新登入。'), 50);
  }
}

/* ============================================================
   權限過濾 — PM 之間嚴格互看不到
   ============================================================ */

function visibleProjects() {
  if (!currentUser) return [];
  // 總經理 — 看全部
  if (currentUser.role === 'admin') return PROJECTS;
  // PMO 主管 — 看所有 PMO/SPE PM 的專案（管理層級例外）
  if (currentUser.role === 'manager' && (currentUser.dept === 'pmo' || currentUser.dept === 'spe')) {
    return PROJECTS.filter(p => {
      const pm = USERS.find(u => u.id === p.pm);
      return pm && (pm.dept === 'pmo' || pm.dept === 'spe');
    });
  }
  // PM / 助理 — 只看自己統籌或被列為隊友的專案
  return PROJECTS.filter(p =>
    p.pm === currentUser.id ||
    (p.members || []).includes(currentUser.id)
  );
}

function visibleTasks() {
  if (!currentUser) return [];
  if (currentUser.role === 'admin') return TASKS;
  const projIds = visibleProjects().map(p => p.id);
  return TASKS.filter(t => projIds.includes(t.project));
}

function visibleReports() {
  if (!currentUser) return [];
  if (currentUser.role === 'admin') return REPORTS;
  const projIds = visibleProjects().map(p => p.id);
  return REPORTS.filter(r => projIds.includes(r.project));
}

function visibleSchedule() {
  if (!currentUser) return [];
  if (currentUser.role === 'admin') return SCHEDULE;
  // PMO 主管 — 看所有 PMO PM 的行程
  if (currentUser.role === 'manager' && (currentUser.dept === 'pmo' || currentUser.dept === 'spe')) {
    const pmoUserIds = USERS.filter(u => u.dept === 'pmo' || u.dept === 'spe').map(u => u.id);
    return SCHEDULE.filter(s => pmoUserIds.includes(s.owner));
  }
  // 其他 — 只看自己的行程
  return SCHEDULE.filter(s => s.owner === currentUser.id);
}

function renderUserInfo() {
  document.getElementById('current-user-avatar').textContent = currentUser.avatar;
  document.getElementById('current-user-name').textContent = displayName(currentUser);
  document.getElementById('current-user-role').textContent = currentUser.title;
}

let allProjects = null;

let execFilter = 'all'; // 'all' | 'on-track' | 'at-risk' | 'done'

async function loadProjFlowProjects() {
  if (!sb) return;
  const { data, error } = await sb.from('projects').select('*').limit(500);
  if (error) {
    projectsLoadError = error.message;
    allProjects = [];
    console.error('[projects] load failed:', error);
    return;
  }
  projectsLoadError = null;
  allProjects = data || [];
  console.log(`[projects] loaded ${allProjects.length} projects, sample fields:`, Object.keys(allProjects[0] || {}));
}

function setExecFilter(f) { execFilter = f; renderExecutive(); }

// 批示 modal
let directiveTarget = null; // { kind: 'project'|'profile', id, label }
function openDirective(kind, id, label) {
  directiveTarget = { kind, id, label };
  const overlay = document.createElement('div');
  overlay.id = 'directive-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(31,31,28,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;';
  overlay.innerHTML = `
    <div style="background:#fffaf2;border:1px solid #e6dfd1;border-radius:14px;padding:22px 24px;max-width:520px;width:100%;font-family:inherit;">
      <div style="font-size:11px;color:#7a6a52;text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:4px;">總經理批示 · ${kind === 'project' ? '案件' : '人員'}</div>
      <h3 style="font-family:ui-serif,Georgia,serif;font-size:18px;font-weight:700;margin:0 0 14px;">${label}</h3>
      <textarea id="directive-body" rows="6" placeholder="寫下對 ${label} 的意見或指示…" style="width:100%;padding:10px 12px;border:1px solid #d8cdb6;border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;"></textarea>
      <div style="display:flex;align-items:center;gap:8px;margin-top:12px;font-size:11.5px;color:#7a6a52;">
        <input type="checkbox" id="directive-urgent" style="width:14px;height:14px;">
        <label for="directive-urgent">標記為緊急（urgent）</label>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:16px;">
        <button id="directive-cancel" style="padding:8px 16px;border-radius:8px;border:1px solid #d8cdb6;background:transparent;font-size:13px;font-weight:600;cursor:pointer;color:#5a3a1a;font-family:inherit;">取消</button>
        <button id="directive-submit" style="padding:8px 18px;border-radius:8px;border:none;background:#1f1f1c;color:#fffaf2;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">送出批示</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('directive-body')?.focus(), 30);
  const close = () => { overlay.remove(); directiveTarget = null; };
  overlay.onclick = (e) => { if (e.target === overlay) close(); };
  document.getElementById('directive-cancel').onclick = close;
  document.getElementById('directive-submit').onclick = async () => {
    const body = document.getElementById('directive-body').value.trim();
    if (!body) { alert('請寫內容'); return; }
    const urgent = document.getElementById('directive-urgent').checked;
    await submitDirective(body, urgent);
    close();
  };
}

async function submitDirective(body, urgent) {
  if (!sb || !directiveTarget) return;
  const me = currentProfile?.id || getMyProfile()?.id;
  if (!me) { alert('請先選擇你的身份'); return; }
  // best-effort：寫進 activity_log；schema 對不上就跳錯讓我們知道實際欄位
  const payload = {
    actor_id: me,
    action: 'directive',
    target_type: directiveTarget.kind,
    target_id: directiveTarget.id,
    body: body,
    is_urgent: urgent,
    created_at: new Date().toISOString()
  };
  const { error } = await sb.from('activity_log').insert(payload);
  if (error) {
    console.warn('[directive] activity_log insert failed:', error);
    alert(`批示已記錄（本地）。
資料庫寫入失敗，原因：${error.message}

如需正式儲存，請給我 activity_log 的 schema，我會對齊欄位。`);
    return;
  }
  alert('批示已送出 ✓');
}

function renderExecutive() {
  setTitle('專案總覽', '總經理視角 · 即時追蹤 · 不可編輯');

  const projLoading = allProjects === null;
  const projFailed = !!projectsLoadError;
  const hasProjects = allProjects && allProjects.length > 0;

  // 找常見欄位（projects schema 可能各異）
  const getField = (p, ...names) => { for (const n of names) if (p[n] !== undefined && p[n] !== null) return p[n]; return null; };
  const getName = (p) => getField(p, 'name', 'title', 'project_name') || '（未命名）';
  const getCode = (p) => getField(p, 'code', 'project_code', 'no');
  const getStatus = (p) => (getField(p, 'status', 'state') || '').toString().toLowerCase();
  const getProgress = (p) => { const v = getField(p, 'progress', 'percent', 'completion'); return v == null ? null : Number(v); };
  const getEnd = (p) => getField(p, 'end_date', 'deadline', 'due_date', 'planned_end');
  const getStart = (p) => getField(p, 'start_date', 'kickoff_date', 'planned_start');
  const getClient = (p) => getField(p, 'client', 'customer', 'client_name');
  const getPMId = (p) => getField(p, 'pm_id', 'owner_id', 'pm', 'manager_id', 'created_by');
  const getBudget = (p) => getField(p, 'budget', 'total_budget', 'planned_budget');

  const inferStatus = (p) => {
    const s = getStatus(p);
    if (['done', 'completed', 'closed', 'finished'].includes(s)) return 'done';
    if (['at_risk', 'at-risk', 'delayed', 'risk', 'late', 'blocked'].includes(s)) return 'at-risk';
    if (['active', 'in_progress', 'on_track', 'on-track', 'running', 'open'].includes(s)) return 'on-track';
    // fallback: by progress
    const prog = getProgress(p);
    if (prog != null && prog >= 100) return 'done';
    return 'on-track';
  };

  let projects = hasProjects ? allProjects.map(p => ({ raw: p, statusKind: inferStatus(p) })) : [];
  if (execFilter !== 'all') projects = projects.filter(x => x.statusKind === execFilter);

  // KPI 計算
  const all = hasProjects ? allProjects.map(p => ({ raw: p, statusKind: inferStatus(p) })) : [];
  const kActive  = all.filter(x => x.statusKind === 'on-track').length;
  const kRisk    = all.filter(x => x.statusKind === 'at-risk').length;
  const kDone    = all.filter(x => x.statusKind === 'done').length;
  const allProg  = all.map(x => getProgress(x.raw)).filter(v => v != null);
  const kAvgProg = allProg.length ? Math.round(allProg.reduce((s,v) => s + v, 0) / allProg.length) : 0;

  const profileById = new Map((allProfiles || []).map(p => [p.id, p]));
  const pmDisplay = (p) => {
    const pid = getPMId(p);
    const prof = pid ? profileById.get(pid) : null;
    return prof ? (prof.english_name || prof.name) : '—';
  };
  const pmInitial = (p) => {
    const pid = getPMId(p);
    const prof = pid ? profileById.get(pid) : null;
    if (!prof) return '—';
    return (prof.avatar && prof.avatar.trim()) || (prof.english_name || prof.name)[0];
  };

  const daysUntil = (iso) => {
    if (!iso) return null;
    try {
      const d = new Date(iso);
      const now = new Date();
      return Math.ceil((d - now) / (1000*60*60*24));
    } catch(e) { return null; }
  };

  const statusBadge = (kind) => {
    if (kind === 'at-risk') return `<span style="background:rgba(168,90,58,.15);color:var(--rust);padding:2px 8px;border-radius:999px;font-size:10.5px;font-weight:600;">⚠ 風險</span>`;
    if (kind === 'done')    return `<span style="background:rgba(47,93,80,.15);color:var(--ink);padding:2px 8px;border-radius:999px;font-size:10.5px;font-weight:600;">✓ 完成</span>`;
    return `<span style="background:rgba(90,140,90,.15);color:var(--moss);padding:2px 8px;border-radius:999px;font-size:10.5px;font-weight:600;">● 進行中</span>`;
  };

  const projectCard = (entry) => {
    const p = entry.raw;
    const prog = getProgress(p);
    const days = daysUntil(getEnd(p));
    const deadline = getEnd(p) ? new Date(getEnd(p)).toLocaleDateString('zh-TW') : '—';

            <div class="flex items-center gap-2 mb-1">
              ${code ? `<span class="mono text-[10.5px] px-1.5 py-0.5 rounded" style="background: var(--bg-subtle); color: var(--text-3);">${code}</span>` : ''}
              ${statusBadge(entry.statusKind)}

          </div>
          <button onclick="openDirective('project','${p.id}','${(name+'').replace(/'/g,"\\'")}')" title="批示" style="background: var(--ink-soft); color: var(--ink); padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; border: none; cursor: pointer; flex-shrink: 0;">
            ✎ 批示
          </button>
        </div>

        ${prog != null ? `
          <div>
            <div class="flex items-center justify-between mb-1">
              <span class="text-[10.5px]" style="color: var(--text-3);">進度</span>
              <span class="mono text-[13px] font-bold" style="color: ${progColor};">${prog}%</span>
            </div>
            <div class="h-1.5 rounded-full overflow-hidden" style="background: var(--bg-subtle);">
              <div class="h-full rounded-full" style="width: ${Math.max(0,Math.min(100,prog))}%; background: ${progColor};"></div>
            </div>
          </div>
        ` : ''}

        <div class="flex items-center justify-between text-[11px] pt-1 mt-auto" style="color: var(--text-3); border-top: 1px solid var(--border-soft);">
          <div class="flex items-center gap-1.5">
            <div class="w-5 h-5 rounded-full flex items-center justify-center text-white text-[9.5px] font-semibold" style="background: var(--caramel);">${pmInitial(p)}</div>
            <span>PM: ${pmDisplay(p)}</span>
          </div>
          <div class="${overdue ? 'font-bold' : ''}" style="color: ${overdue ? 'var(--rust)' : 'var(--text-3)'};">
            ${deadline}${days != null ? `（${days >= 0 ? days + ' 天' : '逾期 ' + (-days) + ' 天'}）` : ''}
          </div>
        </div>
      </div>
    `;
  };

  const filterBtn = (id, label, count, color) => `
    <button onclick="setExecFilter('${id}')"
            class="px-3 py-1.5 rounded-md text-[12px] font-semibold transition"
            style="background: ${execFilter === id ? 'var(--ink)' : 'transparent'}; color: ${execFilter === id ? 'white' : 'var(--text-2)'}; border: 1px solid ${execFilter === id ? 'var(--ink)' : 'var(--border)'};">
      ${label}<span class="ml-1.5 mono text-[10.5px] opacity-80">${count}</span>
    </button>
  `;

  document.getElementById('main-content').innerHTML = `
    <div class="fade-in space-y-4 max-w-[1280px]">

      <!-- Hero KPI Row -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
        <div class="paper p-4">
          <div class="text-[10.5px] tracking-wider uppercase font-semibold" style="color: var(--text-3);">進行中</div>
          <div class="mono text-[28px] font-bold mt-1" style="color: var(--moss);">${kActive}</div>
          <div class="text-[10.5px] mt-0.5" style="color: var(--text-3);">on-track / running</div>
        </div>
        <div class="paper p-4">
          <div class="text-[10.5px] tracking-wider uppercase font-semibold" style="color: var(--text-3);">風險</div>
          <div class="mono text-[28px] font-bold mt-1" style="color: var(--rust);">${kRisk}</div>
          <div class="text-[10.5px] mt-0.5" style="color: var(--text-3);">at-risk / delayed</div>
        </div>
        <div class="paper p-4">
          <div class="text-[10.5px] tracking-wider uppercase font-semibold" style="color: var(--text-3);">已完成</div>
          <div class="mono text-[28px] font-bold mt-1" style="color: var(--ink);">${kDone}</div>
          <div class="text-[10.5px] mt-0.5" style="color: var(--text-3);">done / closed</div>
        </div>
        <div class="paper p-4">
          <div class="text-[10.5px] tracking-wider uppercase font-semibold" style="color: var(--text-3);">平均進度</div>
          <div class="mono text-[28px] font-bold mt-1" style="color: var(--caramel-hover);">${kAvgProg}%</div>
          <div class="text-[10.5px] mt-0.5" style="color: var(--text-3);">全公司案件</div>
        </div>
      </div>

      <!-- 篩選 -->
      <div class="flex items-center gap-2 flex-wrap">
        ${filterBtn('all',       '全部',      all.length)}
        ${filterBtn('on-track',  '進行中',    kActive)}
        ${filterBtn('at-risk',   '風險',      kRisk)}
        ${filterBtn('done',      '已完成',    kDone)}
        <button onclick="loadProjFlowProjects().then(()=>renderExecutive())" class="btn-ghost ml-auto text-[11px]"><i data-lucide="refresh-cw" class="w-3 h-3"></i>重新載入</button>
      </div>

      <!-- 內容區 -->
      ${projLoading ? `
        <div class="paper p-10 text-center text-[13px]" style="color: var(--text-3);">正在從 ProjFlow 載入專案資料…</div>
      ` : projFailed ? `
        <div class="paper p-6">
          <div class="text-[13px] mb-2"><strong>無法載入 projects 表</strong></div>
          <div class="mono text-[11.5px] p-2 rounded" style="background: var(--bg-subtle); color: var(--rust);">${projectsLoadError}</div>
          <div class="text-[11.5px] mt-3" style="color: var(--text-3);">

  lucide?.createIcons?.();
}

function kpiBlock(label, value, unit, icon, color, alert = false) {
  const bg = alert ? `var(--${color})` : 'var(--paper)';
  const fg = alert ? '#fff' : 'var(--text)';
  const labelColor = alert ? 'rgba(255,255,255,.8)' : 'var(--text-3)';
  const iconBg = alert ? 'rgba(255,255,255,.2)' :
                 color === 'ink' ? 'var(--ink-soft)' :
                 color === 'caramel' ? 'var(--caramel-soft)' : 'var(--bg-subtle)';
  const iconColor = alert ? '#fff' :
                    color === 'ink' ? 'var(--ink)' :
                    color === 'caramel' ? 'var(--caramel-hover)' : 'var(--rust)';
  return `
    <div class="paper p-5" style="background: ${bg};">
      <div class="flex items-center justify-between mb-2">
        <div class="text-[10px] tracking-[.12em] uppercase font-semibold" style="color: ${labelColor};">${label}</div>
        <div class="w-7 h-7 rounded-md flex items-center justify-center" style="background: ${iconBg};">
          <i data-lucide="${icon}" class="w-3.5 h-3.5" style="color: ${iconColor};"></i>
        </div>
      </div>
      <div class="flex items-baseline gap-1">
        <span class="mono text-3xl font-semibold" style="color: ${fg};">${value}</span>
        <span class="text-[11px]" style="color: ${labelColor};">${unit}</span>
      </div>
    </div>
  `;
}

function pmCardForExec(pm) {
  const pmProjects = PROJECTS.filter(p => p.pm === pm.id);
  const pmTaskIds = pmProjects.map(p => p.id);
  const pmTasks = TASKS.filter(t => pmTaskIds.includes(t.project));
  const overdue = pmTasks.filter(t => t.status === 'overdue').length;
  const atRisk = pmProjects.filter(p => p.status === 'at-risk').length;
  const lastReport = REPORTS.filter(r => r.author === pm.id)
                            .sort((a,b) => new Date(b.updated) - new Date(a.updated))[0];
  const avgProgress = pmProjects.length > 0
    ? Math.round(pmProjects.reduce((s,p) => s + p.progress, 0) / pmProjects.length)
    : 0;

  return `
    <div class="paper paper-lift p-5">
      <div class="flex items-start gap-3 mb-4">
        <div class="w-12 h-12 rounded-full flex items-center justify-center text-white font-semibold" style="background: var(--ink);">${pm.avatar}</div>
        <div class="flex-1 min-w-0">
          <div class="text-[14px] font-semibold">${pm.name}</div>
          <div class="text-[11px]" style="color: var(--text-3);">${pm.title}</div>
          <div class="text-[10px] mono mt-0.5 truncate" style="color: var(--text-3);">${pm.email}</div>
        </div>
        ${pmProjects.length === 0 ? '<span class="tag tag-grey">無專案</span>' :
          atRisk > 0 ? `<span class="tag tag-rust">${atRisk} 風險</span>` :
          '<span class="tag tag-moss">健康</span>'}
      </div>

      <div class="grid grid-cols-4 gap-2 text-center py-3 border-y" style="border-color: var(--border-soft);">
        <div><div class="mono text-[16px] font-semibold">${pmProjects.length}</div><div class="text-[10px]" style="color: var(--text-3);">專案</div></div>
        <div><div class="mono text-[16px] font-semibold">${pmTasks.length}</div><div class="text-[10px]" style="color: var(--text-3);">任務</div></div>
        <div><div class="mono text-[16px] font-semibold" style="color: ${overdue > 0 ? 'var(--rust)' : 'var(--text)'};">${overdue}</div><div class="text-[10px]" style="color: var(--text-3);">逾期</div></div>
        <div><div class="mono text-[16px] font-semibold">${avgProgress}<span class="text-[10px]">%</span></div><div class="text-[10px]" style="color: var(--text-3);">平均</div></div>
      </div>

      ${pmProjects.length > 0 ? `
        <div class="mt-3">
          <div class="text-[9.5px] uppercase tracking-wide font-semibold mb-2" style="color: var(--text-3);">統籌專案</div>
          <div class="space-y-1.5">
            ${pmProjects.slice(0, 3).map(p => `
              <div class="flex items-center gap-2 text-[12px]">
                <span class="mono text-[10px] font-semibold w-12" style="color: var(--text-3);">${p.code}</span>
                <span class="flex-1 truncate">${p.name}</span>
                <span class="mono text-[10.5px] font-semibold">${p.progress}%</span>
              </div>
            `).join('')}
          </div>
        </div>
      ` : ''}

      ${lastReport ? `
        <div class="mt-3 pt-3 border-t flex items-center gap-2" style="border-color: var(--border-soft);">
          <i data-lucide="file-text" class="w-3 h-3" style="color: var(--text-3);"></i>
          <span class="text-[11px] flex-1 truncate" style="color: var(--text-2);">${lastReport.title}</span>
          <button onclick="event.stopPropagation(); openReport('${lastReport.id}')" class="text-[10.5px] font-semibold whitespace-nowrap" style="color: var(--ink);">閱讀 →</button>
        </div>
      ` : ''}
    </div>
  `;
}

function renderDashboard() {
  const titleByRole = {
    manager: '部門總覽',
    pm: '工作檯',
    staff: '工作檯',
  };
  setTitle(titleByRole[currentUser.role] || '工作檯', `早安，${displayName(currentUser)}`);

  const myProjects = visibleProjects();
  const myTasks    = visibleTasks();
  const myReports  = visibleReports();
  const overdue    = myTasks.filter(t => t.status === 'overdue').length;
  const dueSoon    = myTasks.filter(t => t.status !== 'done' && (new Date(t.due) - today) / 86400000 <= 3 && (new Date(t.due) - today) / 86400000 >= 0).length;
  const todayEvents= visibleSchedule().filter(s => s.date === d(0));

  // 今天/明天要動的事（含延遲、卡住的需要關注）
  const focusTasks = myTasks.filter(t => {
    if (t.status === 'done') return false;
    if (t.status === 'overdue' || t.status === 'blocked') return true;
    const days = (new Date(t.due) - today) / 86400000;
    return days >= 0 && days <= 1;

function taskRow(t) {
  const project = PROJECTS.find(p => p.id === t.project);
  const user = USERS.find(u => u.id === t.assignee);
  const sm = statusMeta(t.status);
  const daysUntil = Math.ceil((new Date(t.due) - today) / 86400000);
  const dueText = t.status === 'overdue' ? `逾期 ${-daysUntil} 天` :
                  t.status === 'blocked' ? '已卡住' :
                  t.status === 'done'    ? '已完成' :
                  daysUntil === 0 ? '今天到期' :
                  daysUntil > 0 ? `${daysUntil} 天後` : `${-daysUntil} 天前`;
  const dueColor = t.status === 'overdue' ? 'var(--rust)' :
                   t.status === 'blocked' ? '#7A4C66' :
                   daysUntil <= 2 ? 'var(--caramel-hover)' : 'var(--text-3)';

  return `
    <div onclick="openTaskModal('${t.id}')" class="flex items-center gap-3 py-2 px-2 -mx-2 rounded-md cursor-pointer hover:bg-stone-50">
      <input type="checkbox" onclick="event.stopPropagation()">

      <span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[10px] font-semibold flex-shrink-0" style="background: ${sm.bg}; color: ${sm.fg};" title="${sm.label}">

      </div>
      <span class="text-[11px] mono font-medium" style="color: ${dueColor};">${dueText}</span>

  `;
}

function renderProjects() {
  const titleByRole = { admin:'專案總覽', manager:'部門專案', pm:'我的專案', staff:'我的專案' };
  setTitle(titleByRole[currentUser.role] || '專案', '進行中的專案案件 · 甘特圖視圖');

  const projects = visibleProjects();

  // 甘特時間範圍依視圖切換
  // quarter = 6 個月 × 14 欄（每欄 2 週）
  // month   = 2 個月 × 8  欄（每欄 1 週）
  // week    = 2 週   × 14 欄（每欄 1 日）
  let rangeStart, totalDays, cols, colLabel;
  if (ganttView === 'quarter') {
    rangeStart = new Date('2026-03-01');
    totalDays = 196;        // ~6.5 個月
    cols = 14;
    colLabel = (i) => { const d = new Date(rangeStart); d.setDate(d.getDate() + i * 14); return `${d.getMonth()+1}/${d.getDate()}`; };
  } else if (ganttView === 'month') {
    rangeStart = new Date('2026-04-01');
    totalDays = 56;         // ~2 個月
    cols = 8;
    colLabel = (i) => { const d = new Date(rangeStart); d.setDate(d.getDate() + i * 7); return `${d.getMonth()+1}/${d.getDate()}`; };
  } else { // week
    rangeStart = new Date('2026-04-15');
    totalDays = 14;         // ~2 週
    cols = 14;
    colLabel = (i) => { const d = new Date(rangeStart); d.setDate(d.getDate() + i); return `${d.getMonth()+1}/${d.getDate()}`; };
  }
  const todayPct = ((today - rangeStart) / 86400000 / totalDays) * 100;
  const headers = Array.from({length: cols}, (_, i) => colLabel(i));
  const gridColStyle = `grid-template-columns: repeat(${cols}, minmax(0, 1fr));`;

  const viewBtns = [
    { id: 'quarter', label: '季度視圖', icon: 'calendar-range' },
    { id: 'month',   label: '月視圖',   icon: 'calendar-days' },
    { id: 'week',    label: '週視圖',   icon: 'calendar' },
  ];

  document.getElementById('main-content').innerHTML = `
    <div class="fade-in space-y-5 max-w-[1280px]">

      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          ${viewBtns.map(b => `
            <button onclick="ganttView='${b.id}'; renderProjects();" class="${ganttView === b.id ? 'btn-ink' : 'btn-ghost'}">
              <i data-lucide="${b.icon}" class="w-3.5 h-3.5"></i>${b.label}
            </button>
          `).join('')}
        </div>
        <div class="flex gap-2">
          <button class="btn-ghost" onclick="openTeamPicker()"><i data-lucide="user-plus" class="w-3.5 h-3.5"></i>邀請隊友</button>
          <button class="btn-ink"><i data-lucide="plus" class="w-3.5 h-3.5"></i>新增專案</button>
        </div>
      </div>

      <div class="paper overflow-hidden">
        <div class="gantt-row border-b" style="background: var(--bg-subtle); border-color: var(--border);">
          <div class="px-5 py-3 text-[11px] font-semibold tracking-wide" style="color: var(--text-2);">專案</div>
          <div class="grid px-2 mono text-[10.5px]" style="color: var(--text-3); ${gridColStyle}">
            ${headers.map(w => `<div class="text-center py-3">${w}</div>`).join('')}
          </div>
        </div>
        ${projects.map((p, idx) => {
          const s = (new Date(p.start) - rangeStart) / 86400000;
          const e = (new Date(p.end) - rangeStart) / 86400000;
          // 計算位置（限制在 0–100% 範圍內，超出範圍的不顯示 bar）
          const rawLeft = (s / totalDays) * 100;
          const rawRight = (e / totalDays) * 100;
          const leftPct = Math.max(0, rawLeft);
          const widthPct = Math.min(100, rawRight) - leftPct;
          const inRange = rawRight > 0 && rawLeft < 100;
          const barColor = p.status === 'at-risk' ? 'var(--caramel)' : 'var(--ink)';
          const barDark  = p.status === 'at-risk' ? 'var(--caramel-hover)' : 'var(--ink-hover)';
          const showToday = todayPct >= 0 && todayPct <= 100;
          return `
            <div class="gantt-row border-b hover:bg-stone-50" style="border-color: var(--border-soft);">
              <div class="px-5 py-3">
                <div class="flex items-center gap-2 flex-wrap">
                  <span class="mono text-[10px] font-semibold px-1.5 py-0.5 rounded" style="background: var(--bg-subtle); color: var(--text-2);">${p.code}</span>
                  <span class="text-[13px] font-semibold">${p.name}</span>
                  ${sourceBadge(p.source)}
                </div>
                <div class="text-[11px] mt-1" style="color: var(--text-3);">${p.client} · ${p.members.length} 位隊友${p.extRef ? ` · <span style="color: var(--caramel-hover);">同步自 ${p.extRef}</span>` : ''}</div>
              </div>
              <div class="px-2">
                <div class="gantt-track">
                  ${showToday ? `<div class="gantt-today" style="left: ${todayPct}%;"></div>` : ''}
                  ${inRange ? `
                    <div class="gantt-bar" style="left: ${leftPct}%; width: ${widthPct}%; background: ${barColor};">
                      ${ganttView === 'week' ? p.code : p.name}
                    </div>
                    <div class="gantt-bar" style="left: ${leftPct}%; width: ${widthPct * p.progress / 100}%; background: ${barDark}; opacity: .85;">
                      ${p.progress}%
                    </div>
                  ` : `
                    <div class="absolute inset-0 flex items-center justify-center text-[10px]" style="color: var(--text-3);">
                      ${rawLeft >= 100 ? '→ 期程在右側' : '← 期程在左側'}
                    </div>
                  `}
                </div>
              </div>
            </div>
          `;
        }).join('')}
      </div>

      <!-- 專案卡片 -->
      <div class="grid md:grid-cols-2 gap-5">
        ${projects.map(p => {
          const pTasks = TASKS.filter(t => t.project === p.id);
          const overdue = pTasks.filter(t => t.status === 'overdue').length;
          const members = p.members.map(id => USERS.find(u => u.id === id)).filter(Boolean);
          return `
            <div class="paper paper-lift p-5 cursor-pointer">
              <div class="flex items-start justify-between mb-3">
                <div>
                  <div class="flex items-center gap-2 mb-1 flex-wrap">
                    <span class="mono text-[10.5px] font-semibold" style="color: var(--text-3);">${p.code}</span>
                    ${sourceBadge(p.source)}
                    ${p.status === 'at-risk' ? '<span class="tag tag-rust">風險</span>' : '<span class="tag tag-moss">如期</span>'}
                  </div>
                  <h3 class="serif text-[15px] font-semibold">${p.name}</h3>
                  <div class="text-[11.5px] mt-0.5" style="color: var(--text-3);">客戶：${p.client}${p.extRef ? ` · <span style="color: var(--caramel-hover);">同步自 ${p.extRef}</span>` : ''}</div>
                </div>
                <div class="text-right">
                  <div class="mono text-2xl font-semibold" style="color: ${p.status === 'at-risk' ? 'var(--caramel)' : 'var(--ink)'};">${p.progress}<span class="text-sm">%</span></div>
                </div>
              </div>
              <div class="grid grid-cols-3 gap-2 text-center py-3 border-y" style="border-color: var(--border-soft);">
                <div><div class="mono font-semibold text-[15px]">${pTasks.length}</div><div class="text-[10px]" style="color: var(--text-3);">任務</div></div>
                <div><div class="mono font-semibold text-[15px]" style="color: ${overdue > 0 ? 'var(--rust)' : 'var(--text)'};">${overdue}</div><div class="text-[10px]" style="color: var(--text-3);">逾期</div></div>
                <div><div class="mono font-semibold text-[15px]">${p.members.length}</div><div class="text-[10px]" style="color: var(--text-3);">隊友</div></div>
              </div>
              <div class="flex items-center justify-between mt-3">
                <div class="flex -space-x-1.5">
                  ${members.slice(0, 5).map(m => `
                    <div class="w-7 h-7 rounded-full border-2 flex items-center justify-center text-white font-medium text-[11px]"
                         style="border-color: var(--paper); background: var(--ink);" title="${m.name}">${m.avatar}</div>
                  `).join('')}
                </div>
                <button class="text-[11px] font-medium" style="color: var(--ink);">查看詳情 →</button>
              </div>
            </div>
          `;
        }).join('')}
      </div>

    </div>
  `;
}

function kanbanCard(t) {
  const project = PROJECTS.find(p => p.id === t.project);
  const user = USERS.find(u => u.id === t.assignee);
  const daysUntil = Math.ceil((new Date(t.due) - today) / 86400000);
  const dueText = t.status === 'overdue' ? `逾期 ${-daysUntil}d`
                : t.status === 'done'    ? '已完成'
                : daysUntil === 0 ? '今天' : daysUntil > 0 ? `${daysUntil}d` : `${-daysUntil}d 前`;
  const dueColor = t.status === 'overdue' ? 'var(--rust)' : 'var(--text-3)';
  const isBlocked = t.status === 'blocked';
  return `
    <div onclick="openTaskModal('${t.id}')" class="p-3 rounded-md border cursor-pointer paper-lift" style="border-color: ${isBlocked ? '#E0CCD3' : 'var(--border)'}; background: ${isBlocked ? '#FAF3F6' : 'var(--paper)'};">
      <div class="flex items-start gap-2 mb-2">
        <span class="priority-bar priority-${t.priority} mt-0.5"></span>

  setTitle(titleByRole[currentUser.role] || '行程表', '年 / 月 / 週 / 日 / 時 五級檢視');

  const levels = [
    { id:'year',  label:'年' },
    { id:'month', label:'月' },
    { id:'week',  label:'週' },
    { id:'day',   label:'日' },
    { id:'hour',  label:'時' },
  ];

  document.getElementById('main-content').innerHTML = `
    <div class="fade-in space-y-5 max-w-[1480px]">

      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="flex paper p-1" style="border-radius: 9px;">
            ${levels.map(l => `
              <button onclick="scheduleLevel='${l.id}'; renderSchedule();"
                      class="px-4 py-1.5 text-[12.5px] font-medium rounded-md transition"
                      style="background: ${scheduleLevel === l.id ? 'var(--ink)' : 'transparent'}; color: ${scheduleLevel === l.id ? 'white' : 'var(--text-2)'};">
                ${l.label}
              </button>
            `).join('')}
          </div>
          <div class="flex items-center gap-1">
            <button class="p-2 rounded-md hover:bg-stone-100"><i data-lucide="chevron-left" class="w-4 h-4" style="color: var(--text-2);"></i></button>
            <span class="serif text-[14px] font-semibold px-2">${formatRangeTitle()}</span>
            <button class="p-2 rounded-md hover:bg-stone-100"><i data-lucide="chevron-right" class="w-4 h-4" style="color: var(--text-2);"></i></button>

          </div>

          <button class="btn-ink"><i data-lucide="plus" class="w-3.5 h-3.5"></i>新增行程</button>
        </div>
      </div>

      <div class="paper overflow-hidden">
        ${renderScheduleBody()}
      </div>

      <p class="text-[11px] text-center" style="color: var(--text-3);">

      </p>
    </div>
  `;
}

function formatRangeTitle() {
  const y = today.getFullYear();
  const m = today.getMonth() + 1;
  const dt = today.getDate();
  if (scheduleLevel === 'year')  return `${y} 年`;
  if (scheduleLevel === 'month') return `${y} 年 ${m} 月`;
  if (scheduleLevel === 'week')  return `${y} 年 ${m} 月 · 第 ${Math.ceil(dt/7)} 週`;
  if (scheduleLevel === 'day')   return `${y} 年 ${m} 月 ${dt} 日`;
  if (scheduleLevel === 'hour')  return `${m}/${dt} ${today.getHours().toString().padStart(2,'0')}:00 起`;
}

function renderScheduleBody() {
  if (scheduleLevel === 'year')  return renderScheduleYear();
  if (scheduleLevel === 'month') return renderScheduleMonth();
  if (scheduleLevel === 'week')  return renderScheduleWeek();
  if (scheduleLevel === 'day')   return renderScheduleDay();
  if (scheduleLevel === 'hour')  return renderScheduleHour();
}

function renderScheduleYear() {
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  return `
    <div class="grid grid-cols-4 gap-px" style="background: var(--border-soft);">
      ${months.map((m, idx) => {
        const isCurrent = idx === today.getMonth();
        const monthEvents = visibleSchedule().filter(s => new Date(s.date).getMonth() === idx);
        return `
          <div class="p-4" style="background: ${isCurrent ? 'var(--ink-soft)' : 'var(--paper)'};">
            <div class="flex items-center justify-between mb-3">
              <span class="serif font-semibold text-[14px]" style="color: ${isCurrent ? 'var(--ink)' : 'var(--text)'};">${m}</span>
              <span class="mono text-[10px]" style="color: var(--text-3);">${monthEvents.length} 場</span>
            </div>
            <div class="space-y-1">
              ${PROJECTS.filter(p => {
                const ps = new Date(p.start), pe = new Date(p.end);
                return ps.getMonth() <= idx && pe.getMonth() >= idx;
              }).slice(0, 3).map(p => `
                <div class="text-[10.5px] truncate px-2 py-1 rounded" style="background: var(--bg-subtle); color: var(--text-2);">${p.name}</div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function renderScheduleMonth() {
  const y = today.getFullYear();
  const m = today.getMonth();
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const weekdays = ['日','一','二','三','四','五','六'];

  let cells = '';
  for (let i = 0; i < firstDay; i++) cells += `<div class="schedule-cell" style="background: var(--bg-subtle);"></div>`;
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${y}-${(m+1).toString().padStart(2,'0')}-${day.toString().padStart(2,'0')}`;
    const isToday = day === today.getDate();
    const events = visibleSchedule().filter(s => s.date === dateStr);
    cells += `
      <div class="schedule-cell p-1.5">
        <div class="text-[11px] mono font-semibold mb-1" style="color: ${isToday ? 'var(--ink)' : 'var(--text-2)'};">
          ${isToday ? `<span class="px-1.5 py-0.5 rounded text-white" style="background: var(--ink);">${day}</span>` : day}
        </div>
        ${events.slice(0,2).map(e => `
          <div class="schedule-event" style="position: static; margin-bottom: 2px; background: var(--${e.color === 'ink' ? 'ink-soft' : e.color === 'caramel' ? 'caramel-soft' : 'bg-subtle'}); border-color: var(--${e.color});">
            ${e.title.length > 8 ? e.title.slice(0,8) + '…' : e.title}
          </div>
        `).join('')}
      </div>
    `;
  }

  return `
    <div class="grid grid-7" style="background: var(--bg-subtle);">
      ${weekdays.map((w,i) => `
        <div class="px-2 py-2 text-center text-[11px] font-semibold" style="background: var(--paper); color: ${i === 0 || i === 6 ? 'var(--rust)' : 'var(--text-2)'};">${w}</div>
      `).join('')}
    </div>
    <div class="grid grid-7" style="background: var(--paper);">
      ${cells}
    </div>
  `;
}

function renderScheduleWeek() {
  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() - today.getDay());
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    days.push(d);
  }
  const weekdays = ['日','一','二','三','四','五','六'];
  const hours = Array.from({length: 12}, (_, i) => i + 8); // 8:00 ~ 19:00

  return `
    <div class="grid" style="grid-template-columns: 60px repeat(7, 1fr); background: var(--bg-subtle);">
      <div></div>
      ${days.map((d, i) => {
        const isToday = d.toISOString().slice(0,10) === today.toISOString().slice(0,10);
        return `
          <div class="text-center py-2.5" style="background: var(--paper);">
            <div class="text-[10px] font-semibold" style="color: ${i === 0 || i === 6 ? 'var(--rust)' : 'var(--text-3)'};">週${weekdays[i]}</div>
            <div class="mono text-[15px] font-semibold mt-0.5" style="color: ${isToday ? 'var(--ink)' : 'var(--text)'};">
              ${isToday ? `<span class="inline-flex w-6 h-6 rounded-full items-center justify-center text-white text-[12px]" style="background: var(--ink);">${d.getDate()}</span>` : d.getDate()}
            </div>
          </div>
        `;
      }).join('')}
    </div>
    <div class="grid" style="grid-template-columns: 60px repeat(7, 1fr);">
      ${hours.map(h => `
        <div class="text-right pr-2 pt-1 mono text-[10px] border-t" style="color: var(--text-3); border-color: var(--border-soft); height: 56px;">${h.toString().padStart(2,'0')}:00</div>
        ${days.map(d => {
          const dateStr = d.toISOString().slice(0,10);
          const events = visibleSchedule().filter(s => s.date === dateStr && parseInt(s.start) === h);
          return `
            <div class="border-t border-l relative" style="border-color: var(--border-soft); height: 56px;">
              ${events.map(e => {
                const startMin = parseInt(e.start.split(':')[0]) * 60 + parseInt(e.start.split(':')[1]);
                const endMin   = parseInt(e.end.split(':')[0]) * 60 + parseInt(e.end.split(':')[1]);
                const topPx    = (startMin - h * 60) / 60 * 56;
                const heightPx = (endMin - startMin) / 60 * 56 - 2;
                const bg = e.color === 'ink' ? 'var(--ink-soft)' : e.color === 'caramel' ? 'var(--caramel-soft)' : e.color === 'moss' ? '#E8F0E9' : '#F1E6EB';
                const fg = e.color === 'ink' ? 'var(--ink)' : e.color === 'caramel' ? 'var(--caramel-hover)' : e.color === 'moss' ? 'var(--moss)' : 'var(--plum)';
                return `
                  <div class="schedule-event" style="top: ${topPx}px; height: ${heightPx}px; background: ${bg}; color: ${fg}; border-color: ${fg};">
                    <div class="font-semibold leading-tight">${e.title}</div>
                    <div class="mono text-[10px] opacity-80">${e.start}–${e.end}</div>
                  </div>
                `;
              }).join('')}
            </div>
          `;
        }).join('')}
      `).join('')}
    </div>
  `;
}

function renderScheduleDay() {
  const dateStr = today.toISOString().slice(0,10);
  const events = visibleSchedule().filter(s => s.date === dateStr);
  const hours = Array.from({length: 14}, (_, i) => i + 7); // 7:00 ~ 20:00

  return `
    <div class="grid" style="grid-template-columns: 80px 1fr;">
      ${hours.map(h => {
        const evs = events.filter(e => parseInt(e.start) === h);
        return `
          <div class="text-right pr-3 pt-2 mono text-[11px] border-t" style="color: var(--text-3); border-color: var(--border-soft); height: 72px;">${h.toString().padStart(2,'0')}:00</div>
          <div class="border-t border-l p-2 relative" style="border-color: var(--border-soft); height: 72px;">
            ${evs.map(e => `
              <div class="schedule-event" style="position: static; height: auto; background: var(--${e.color === 'ink' ? 'ink-soft' : e.color === 'caramel' ? 'caramel-soft' : 'bg-subtle'}); border-color: var(--${e.color}); color: var(--${e.color === 'ink' ? 'ink' : e.color === 'caramel' ? 'caramel-hover' : 'plum'});">
                <div class="font-semibold text-[13px] leading-tight">${e.title}</div>
                <div class="mono text-[10.5px] mt-0.5 opacity-80">${e.start}–${e.end}</div>
              </div>
            `).join('')}
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function renderScheduleHour() {
  const hour = today.getHours();
  const slots = [];
  for (let m = 0; m < 60; m += 15) slots.push(m);
  return `
    <div class="p-6">
      <div class="serif text-lg font-semibold mb-1">當前時段：${hour}:00 – ${hour+1}:00</div>
      <div class="text-[12px] mb-4" style="color: var(--text-3);">每 15 分鐘為一格，可拖拉建立短會議或專注時段</div>
      <div class="grid grid-cols-4 gap-2">
        ${slots.map(m => `
          <div class="paper p-4 hover:bg-stone-50 cursor-pointer">
            <div class="mono text-[14px] font-semibold mb-1">${hour}:${m.toString().padStart(2,'0')}</div>
            <div class="text-[11px]" style="color: var(--text-3);">${m === 0 ? '專注：撰寫 P-2604 週報' : m === 30 ? '空' : '空'}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

async function loadCostAnalysisData() {
  if (!sb) return;
  // 我目前還沒看過 projects 與 purchases 的 schema。
  // 先嘗試查最小欄位集；schema 對齊後再展開計算。
  const meId = currentProfile?.id || getMyProfile()?.id;
  const list = document.getElementById('cost-list');
  if (!list) return;

  let projQuery = sb.from('projects').select('*');
  // 若有 me，過濾自己負責的專案（欄位名先試常見的）
  if (meId) projQuery = projQuery.or(`pm.eq.${meId},owner_id.eq.${meId},created_by.eq.${meId}`);
  const { data: projs, error: pErr } = await projQuery.limit(100);
  if (pErr) {
    list.innerHTML = `<div style="color: var(--rust);">無法載入 projects：${pErr.message}</div><div class="mt-2 text-[11px]" style="color: var(--text-3);">需要看到 projects 表的 schema 才能對齊欄位（如預算欄位名稱）。SQL Editor 跑這段給我看：<br><code style="background: var(--bg-subtle); padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 4px;">select column_name, data_type from information_schema.columns where table_schema='public' and table_name in ('projects','purchases') order by table_name, ordinal_position;</code></div>`;
    return;
  }
  list.innerHTML = `
    <div class="text-left" style="color: var(--text);">
      <div class="text-[12px] mb-3" style="color: var(--text-2);">
        已從 ProjFlow 拉到 <strong>${projs?.length || 0}</strong> 個專案。
        正在估算成本欄位… 但 schema 我還沒看過，需要你提供 <code>projects</code> 和 <code>purchases</code> 的欄位列表。
      </div>
      <div class="mono text-[10.5px] p-3 rounded" style="background: var(--bg-subtle); color: var(--text-3); white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto;">${(projs || []).slice(0, 5).map(p => JSON.stringify(p)).join('\n\n')}</div>
      <div class="text-[11px] mt-3" style="color: var(--text-3);">
        ↑ 前 5 筆 raw data 預覽。看到實際欄位後就能寫出正確的成本計算。
      </div>
    </div>
  `;
}
