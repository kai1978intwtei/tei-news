function renderTeammates() {
  setTitle('公司組織圖', '即時來自 ProjFlow profiles + org_units');

  const loading = allProfiles === null;
  const failed = !!projflowLoadError;
  const hasData = allProfiles && allOrgUnits && allProfiles.length > 0;

  const unitsById = hasData ? new Map(allOrgUnits.map(u => [u.id, u])) : new Map();
  const childrenOf = (id) => hasData ? allOrgUnits.filter(u => u.parent_id === id) : [];
  const topUnits = hasData ? allOrgUnits.filter(u => !u.parent_id) : [];

  const profilesByUnit = new Map();
  if (hasData) {
    allProfiles.forEach(p => {
      if (!p.org_unit_id) return;
      if (!profilesByUnit.has(p.org_unit_id)) profilesByUnit.set(p.org_unit_id, []);
      profilesByUnit.get(p.org_unit_id).push(p);
    });
  }

  const allDescendantUnits = (rootId) => {
    const out = new Set();
    const queue = [rootId];
    while (queue.length) {
      const id = queue.shift();
      out.add(id);
      childrenOf(id).forEach(c => queue.push(c.id));
    }
    return out;
  };

  // 部門色彩 palette
  const palette = ['#d96d6d', '#3aa99b', '#d4a534', '#8b6cb8', '#d68a3a', '#4f8fc4', '#62a665', '#c66996', '#7b8a99'];
  const iconForDept = ['briefcase', 'briefcase', 'briefcase', 'briefcase', 'briefcase', 'briefcase'];

  const memberRow = (p, showRoleBadge) => {
    const display = p.english_name || p.name;
    const initial = (p.avatar && p.avatar.trim()) || display[0] || '?';
    const bg = p.role === 'admin' ? 'var(--plum)' : p.is_pm ? 'var(--caramel)' : 'var(--ink)';
    const badge = showRoleBadge && p.is_pm ? '<span class="ml-1.5 mono text-[8.5px] px-1.5 py-0.5 rounded-full" style="background:var(--caramel-soft);color:var(--caramel-hover);">PM</span>' :
                  showRoleBadge && p.role === 'admin' ? '<span class="ml-1.5 mono text-[8.5px] px-1.5 py-0.5 rounded-full" style="background:var(--plum);color:white;">總經理</span>' : '';
    return `
      <button onclick="openChatWithReal('${p.id}')" class="flex items-center gap-2 py-1.5 w-full text-left hover:bg-stone-50 rounded px-1 -mx-1 transition">
        <div class="w-7 h-7 rounded-full flex items-center justify-center text-white text-[11px] font-semibold flex-shrink-0" style="background:${bg};">${initial}</div>
        <div class="flex-1 min-w-0">
          <div class="text-[12.5px] font-semibold leading-tight flex items-center">${display}${badge}</div>
          <div class="text-[10px]" style="color: var(--text-3);">${p.title || ''}</div>
        </div>
      </button>
    `;
  };

  const courseBlock = (course) => {
    const members = profilesByUnit.get(course.id) || [];
    return `
      <div class="border-t pt-2.5 mt-2.5" style="border-color: var(--border-soft);">
        <div class="flex items-center gap-2 mb-1.5">
          <i data-lucide="folder" class="w-3 h-3" style="color: var(--text-3);"></i>
          <span class="text-[12px] font-semibold">${course.name}</span>
          <span class="mono text-[9.5px] px-1.5 rounded" style="background: var(--bg-subtle); color: var(--text-3);">${course.code || ''}</span>
        </div>
        ${members.length > 0 ? `
          <div>${members.map(p => memberRow(p, true)).join('')}</div>
          <div class="text-[10px] mt-1 flex items-center gap-1" style="color: var(--text-3);">
            <i data-lucide="users" class="w-2.5 h-2.5"></i>本課編制 ${members.length} 人
          </div>
        ` : `
          <div class="text-[10.5px] py-1.5 italic" style="color: var(--text-3);">本課目前無編制</div>
        `}
      </div>
    `;
  };

  const deptCard = (dept, i) => {
    const color = palette[i % palette.length];
    const courses = childrenOf(dept.id);
    const directMembers = profilesByUnit.get(dept.id) || [];
    const allDesc = allDescendantUnits(dept.id);
    const totalMembers = allProfiles.filter(p => allDesc.has(p.org_unit_id)).length;
    const head = directMembers.find(p => p.is_pm) || directMembers[0];

    // 跨功能 tags（heuristic：底下任一課含 PM → PMO 專案；含「成本/財務/會計」字眼 → CC 成本）
    const hasPM = [...allDesc].some(uid => (profilesByUnit.get(uid) || []).some(p => p.is_pm));
    const courseNames = courses.map(c => c.name + (c.code||'')).join('|') + (dept.name || '');
    const hasCost = /成本|財務|會計|預算|cost|finance|account/i.test(courseNames);
    const tags = [];
    if (hasPM)   tags.push({ label: 'PMO 專案', color: 'var(--ink)' });
    if (hasCost) tags.push({ label: 'CC 成本',  color: 'var(--caramel-hover)' });

    return `
      <div class="paper p-4 overflow-hidden flex flex-col" style="border-top: 3px solid ${color}; min-height: 240px;">
        <!-- Header -->
        <div class="flex items-start gap-3 mb-3">
          <div class="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0" style="background:${color}22; color:${color};">
            <i data-lucide="briefcase" class="w-5 h-5"></i>
          </div>
          <div class="flex-1 min-w-0">
            <div class="serif text-[14.5px] font-semibold leading-tight">${dept.name}</div>
            <div class="text-[10.5px] mt-0.5" style="color: var(--text-3);">${dept.code || ''} · ${totalMembers} 人 · ${courses.length} 課</div>
          </div>
          <div class="flex items-center gap-1 flex-shrink-0">
            <button class="p-1 rounded hover:bg-stone-50" title="檢視批示" style="color: var(--text-3);"><i data-lucide="clipboard-list" class="w-3.5 h-3.5"></i></button>
            <button class="p-1 rounded hover:bg-stone-50" title="展開" style="color: var(--text-3);"><i data-lucide="chevron-down" class="w-3.5 h-3.5"></i></button>
          </div>
        </div>

        <!-- 跨功能 tags -->
        ${tags.length > 0 ? `
          <div class="flex flex-wrap gap-1.5 mb-2">
            ${tags.map(t => `<span class="text-[10px] px-2 py-0.5 rounded-full font-semibold" style="background: ${t.color}1a; color: ${t.color};">▌ ${t.label}</span>`).join('')}
          </div>
        ` : ''}

        <!-- Dept Head 顯式行 -->
        <div class="pb-2 mb-2 border-b" style="border-color: var(--border-soft);">
          ${head ? `
            <div class="text-[10px] tracking-wider uppercase font-semibold mb-1" style="color: var(--text-3);">Dept Head</div>
            ${memberRow(head, true)}
          ` : `
            <div class="text-[10.5px] flex items-center gap-1" style="color: var(--text-3);">
              <i data-lucide="user-x" class="w-3 h-3"></i>Dept Head：<span class="italic">待指派</span>
            </div>
          `}
        </div>

        <!-- 部直屬其他成員 -->
        ${directMembers.length > 1 && head ? `
          <div class="mb-1">
            ${directMembers.filter(p => p.id !== head.id).map(p => memberRow(p, true)).join('')}
          </div>
        ` : ''}

        <!-- 各課 -->
        ${courses.length === 0 && directMembers.length === 0 ? `
          <div class="text-[11px] py-2 text-center italic flex-1 flex items-center justify-center" style="color: var(--text-3);">此部目前無編制</div>
        ` : courses.length === 0 ? `
          <div class="text-[10.5px] py-1.5 italic" style="color: var(--text-3);">此部門目前無課級單位</div>
        ` : courses.map(courseBlock).join('')}
      </div>
    `;
  };

  const rootCard = (u) => {
    const head = (profilesByUnit.get(u.id) || [])[0];
    const headDisplay = head ? (head.english_name || head.name) : '—';
    const headInitial = head ? ((head.avatar && head.avatar.trim()) || headDisplay[0]) : '?';
    const headBg = head?.role === 'admin' ? 'var(--plum)' : 'var(--ink)';
    const allDesc = allDescendantUnits(u.id);
    const totalMembers = allProfiles.filter(p => allDesc.has(p.org_unit_id)).length;
    const directChildren = childrenOf(u.id).length;
    return `
      <div class="paper px-6 py-4 mx-auto max-w-[440px] text-center" style="border: 1.5px solid var(--ink); box-shadow: 0 4px 16px rgba(47,93,80,.12);">
        <div class="flex items-center justify-center gap-2 mb-1">
          <i data-lucide="crown" class="w-4 h-4" style="color: var(--ink);"></i>
          <span class="serif text-[17px] font-bold">${u.name}</span>
          <span class="mono text-[10.5px] px-1.5 py-0.5 rounded" style="background: var(--ink-soft); color: var(--text-2);">${u.code || ''}</span>
        </div>
        ${head ? `
          <div class="inline-flex items-center gap-2 mt-2">
            <div class="w-10 h-10 rounded-full flex items-center justify-center text-white text-[14px] font-semibold" style="background: ${headBg};">${headInitial}</div>
            <div class="text-left">
              <div class="text-[13px] font-semibold">${headDisplay}</div>
              <div class="text-[10.5px]" style="color: var(--text-3);">${head.title || 'GM / CEO'}</div>
            </div>
          </div>
        ` : ''}
        <div class="text-[11px] mt-3" style="color: var(--text-3);">編制 <strong style="color: var(--text);">${totalMembers}</strong> 人 · <strong style="color: var(--text);">${directChildren}</strong> 部門</div>
      </div>
      <div class="flex justify-center my-3">
        <div style="width:0;height:24px;border-left: 1.5px solid #c9bca3;"></div>
      </div>
    `;
  };

  const root = topUnits[0];
  const secondLevel = root ? childrenOf(root.id) : [];

  document.getElementById('main-content').innerHTML = `
    <div class="fade-in max-w-[1280px]">
      <div class="flex items-center justify-between mb-4">
        <div class="text-[12.5px] font-semibold" style="color: var(--text-2);">
          ${loading ? '載入中…' : failed ? '<span style="color:var(--rust)">載入失敗</span>' : `${allOrgUnits.length} 個單位 · ${allProfiles.length} 人`}
        </div>
        <button onclick="syncProjFlowAndReload()" class="btn-ghost text-[11px]"><i data-lucide="refresh-cw" class="w-3 h-3"></i>同步</button>
      </div>
      ${loading ? `<div class="paper p-10 text-center text-[13px]" style="color: var(--text-3);">正在從 ProjFlow 載入…</div>`
        : failed ? `<div class="paper p-6"><div class="mono text-[11.5px] p-2 rounded" style="background: var(--bg-subtle); color: var(--rust);">${projflowLoadError}</div></div>`
        : !hasData ? `<div class="paper p-10 text-center text-[13px]" style="color: var(--text-3);">ProjFlow 無資料</div>`
        : !root ? `<div class="paper p-10 text-center text-[13px]" style="color: var(--text-3);">找不到頂層部門</div>`
        : `
          ${rootCard(root)}
          <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-3">
            ${secondLevel.map(deptCard).join('')}
          </div>
        `}
    </div>
  `;
  lucide?.createIcons?.();
}

function renderChatRoster() {
  const me = currentProfile?.id || currentUser?.id;

  // 載入狀態 / 錯誤訊息頭部包裝
  const wrap = (statusLine, body) => `
    <div class="paper p-4">
      <div class="flex items-center justify-between mb-3">
        <h3 class="serif font-semibold text-[14px] flex items-center gap-2">
          <i data-lucide="users-round" class="w-4 h-4"></i>聊天名單
        </h3>
        <div class="text-[11px] flex items-center gap-1.5" style="color: var(--text-3);">${statusLine}</div>
      </div>
      ${body}
    </div>
  `;

  // 1) 還沒載入完 → 顯示 loading
  if (allProfiles === null) {
    return wrap(`<span class="sync-dot"></span>正在從 ProjFlow 載入員工名單…`, `
      <div class="text-center py-8 text-[12px]" style="color: var(--text-3);">載入中…</div>
    `);
  }

  // 2) 載入失敗 → 顯示原因
  if (projflowLoadError) {
    return wrap(`<span style="color: var(--rust);">●</span> 載入失敗`, `
      <div class="text-[12px] py-4" style="color: var(--text-2);">
        <div class="mb-2"><strong>無法從 ProjFlow 載入員工名單</strong></div>
        <div class="mono text-[11px] mb-2 p-2 rounded" style="background: var(--bg-subtle); color: var(--rust);">${projflowLoadError}</div>
        <div style="color: var(--text-3);">最可能原因：RLS policy 擋下匿名查詢。需要從登入頁用「用 ProjFlow 帳號登入」做 Supabase magic link 驗證後才能讀取。</div>
      </div>
    `);
  }

  // 3) 真資料載入成功 → 用真實 profiles + org_units 分組
  const unitsById = new Map(allOrgUnits.map(u => [u.id, u]));
  const eligible = p => p && p.id !== me && p.role !== 'admin';
  const profiles = allProfiles.filter(eligible);

  // 找 profile 所屬最頂層的部
  const findTopAncestor = (unitId) => {
    let cur = unitsById.get(unitId);
    while (cur?.parent_id) cur = unitsById.get(cur.parent_id);
    return cur;
  };

  // 按部分組（頂層 org_unit 為單位）
  const deptMap = new Map();
  profiles.forEach(p => {
    const top = findTopAncestor(p.org_unit_id);
    if (!top) return;
    if (!deptMap.has(top.id)) deptMap.set(top.id, { unit: top, members: [] });
    deptMap.get(top.id).members.push(p);
  });
  const byDept = [...deptMap.values()].sort((a, b) => a.unit.name.localeCompare(b.unit.name));

  // 按課分組（profile 直接歸屬的 unit）
  const sectionMap = new Map();
  profiles.forEach(p => {
    const u = unitsById.get(p.org_unit_id);
    if (!u || !u.parent_id) return; // 跳過頂層（已歸入按部）
    if (!sectionMap.has(u.id)) sectionMap.set(u.id, { unit: u, members: [] });
    sectionMap.get(u.id).members.push(p);
  });
  const bySection = [...sectionMap.values()].sort((a, b) => a.unit.name.localeCompare(b.unit.name));

  const pill = (p) => {
    const display = p.english_name || p.name;
    const initial = (p.avatar && p.avatar.trim()) || (p.english_name?.[0] || p.name?.[0] || '?');
    return `
      <button onclick="openChatWithReal('${p.id}')"
              class="flex items-center gap-1.5 px-2 py-1 rounded-full transition hover:shadow-sm border"
              style="background: white; border-color: var(--border);"
              title="${display}${p.title ? ' · ' + p.title : ''}">
        <span class="w-5 h-5 rounded-full flex items-center justify-center text-white text-[9.5px] font-semibold" style="background: var(--ink);">${initial}</span>
        <span class="text-[11.5px] font-medium" style="color: var(--text);">${display}</span>
      </button>
    `;
  };

  const statusLine = `<span style="color: var(--moss);">●</span> 來源：ProjFlow profiles · ${profiles.length} 人 · 點對象開始對話`;

  if (byDept.length === 0 && bySection.length === 0) {
    return wrap(statusLine, `
      <div class="text-center py-8 text-[12px]" style="color: var(--text-3);">
        ProjFlow profiles 表是空的，或全部都是 admin / 你自己。
      </div>
    `);
  }

  return wrap(statusLine, `
    <div class="space-y-3">
      <div>
        <div class="text-[11px] uppercase tracking-wider font-semibold mb-2" style="color: var(--caramel-hover);">▌ 按部門</div>
        <div class="space-y-1.5">

// 點真實 ProjFlow profile：原型階段顯示提示（聊天送收 Stage 3 接 chat_messages）
/* ============================================================
   Stage 3：真實聊天 — 讀寫 ProjFlow chat_messages + Realtime
   ============================================================ */
let realChatActive = false;
let realChatMe = null;
let realChatTarget = null;
let realChatChannelId = null;
let realChatMessages = [];
let realChatSub = null;
let realChatReadsSub = null;     // 訂閱 chat_reads 變更（已讀回執 realtime）
let realChatPeerReadAt = null;   // 對方上次讀到哪（ISO 時間）
let realChatReplyingTo = null;   // 正在回覆哪則訊息（{id, body, sender_id}）
let realChatReactions = [];      // 當前頻道訊息的 emoji 反應 [{message_id, user_id, emoji}]
let realChatReactSub = null;     // 訂閱 chat_message_reactions realtime
let realChatReactPickerFor = null; // 哪則訊息正打開 emoji picker（message_id）

const QUICK_EMOJIS = ['👍','❤️','😂','🎉','🙌','👀','🔥'];

/* ============================================================
   Stage 6：群組聊天 — chat_channels(kind='group') + chat_channel_members
   ============================================================ */
let realChatKind = 'dm';        // 'dm' | 'group'
let realChatGroup = null;       // group mode 時的 channel 物件 {id, name, kind, created_by}
let realChatGroupMemberIds = [];// group mode 時的所有成員 user_id
let myGroups = [];              // 我加入的群組 [{channel, memberIds: []}]

async function loadMyGroups() {
  if (!sb) return;
  const me = getMyProfile();
  if (!me) { myGroups = []; return; }
  // 我加入的所有頻道
  const { data: memberships, error: e1 } = await sb.from('chat_channel_members')
    .select('channel_id').eq('user_id', me.id);
  if (e1) { console.warn('[group] load memberships failed:', e1); myGroups = []; return; }
  const ids = (memberships || []).map(m => m.channel_id);
  if (!ids.length) { myGroups = []; return; }
  // 只挑群組類型的
  const { data: channels, error: e2 } = await sb.from('chat_channels')
    .select('id, name, kind, created_at, created_by')
    .eq('kind', 'group').in('id', ids).order('updated_at', { ascending: false });
  if (e2) { console.warn('[group] load channels failed:', e2); myGroups = []; return; }
  // 抓所有群組的成員
  const { data: allMembers } = await sb.from('chat_channel_members')
    .select('channel_id, user_id').in('channel_id', (channels || []).map(c => c.id));
  myGroups = (channels || []).map(c => ({
    channel: c,
    memberIds: (allMembers || []).filter(m => m.channel_id === c.id).map(m => m.user_id)
  }));
}

async function createGroupChat(name, memberIds) {
  const me = getMyProfile();
  if (!me) { alert('請先選擇你的身份'); return null; }
  if (!name?.trim()) { alert('請輸入群組名稱'); return null; }
  const allMemberIds = [...new Set([me.id, ...memberIds])];
  // 建立 channel
  const { data: ch, error: e1 } = await sb.from('chat_channels')
    .insert({ kind: 'group', name: name.trim(), created_by: me.id })
    .select('id, name, kind, created_at, created_by').single();
  if (e1) { alert('建立群組失敗：' + e1.message); return null; }
  // 加 members
  const memberRows = allMemberIds.map(uid => ({
    channel_id: ch.id, user_id: uid,
    role: uid === me.id ? 'owner' : 'member'
  }));
  const { error: e2 } = await sb.from('chat_channel_members').insert(memberRows);
  if (e2) { console.warn('[group] add members partial failure:', e2); }
  await loadMyGroups();
  await openGroupChat(ch.id);
  return ch;
}

async function openGroupChat(channelId) {
  const me = getMyProfile();
  if (!me) { me = await pickMyIdentity(); if (!me) return; }
  // 拿 channel 資料
  const { data: ch, error } = await sb.from('chat_channels')
    .select('id, name, kind, created_at, created_by').eq('id', channelId).single();
  if (error) { alert('讀取群組失敗：' + error.message); return; }
  // 拿成員
  const { data: members } = await sb.from('chat_channel_members')
    .select('user_id').eq('channel_id', channelId);
  realChatGroupMemberIds = (members || []).map(m => m.user_id);
  // 拿歷史訊息
  const { data: msgs, error: e2 } = await sb.from('chat_messages')
    .select('id, channel_id, sender_id, body, created_at, reply_to_id')
    .eq('channel_id', channelId)
    .order('created_at', { ascending: true }).limit(200);
  if (e2) { alert('讀取訊息失敗：' + e2.message); return; }

  realChatActive = true;
  realChatKind = 'group';
  realChatMe = me;
  realChatTarget = null;
  realChatGroup = ch;
  realChatChannelId = channelId;
  realChatMessages = msgs || [];
  realChatReplyingTo = null;
  chatPartnerId = null;
  activeMessageId = null;

  await markChannelAsRead(channelId, me.id);
  realChatPeerReadAt = null; // 群組不顯示單一對方已讀

  // 訂閱訊息
  if (realChatSub) { sb.removeChannel(realChatSub); realChatSub = null; }
  realChatSub = sb.channel(`ch-${channelId}`)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'chat_messages',
      filter: `channel_id=eq.${channelId}`
    }, (payload) => {
      if (!realChatMessages.find(m => m.id === payload.new.id)) {
        realChatMessages.push(payload.new);
        if (currentView === 'messages') renderMessages();
        if (payload.new.sender_id !== realChatMe.id) {
          markChannelAsRead(channelId, realChatMe.id);
        }
      }
    }).subscribe();

  // 訂閱反應
  await loadReactions(realChatMessages.map(m => m.id));
  if (realChatReactSub) { sb.removeChannel(realChatReactSub); realChatReactSub = null; }
  realChatReactSub = sb.channel(`reacts-${channelId}`)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'chat_message_reactions' }, (payload) => {
      const row = payload.new || payload.old;
      if (!row) return;
      if (!realChatMessages.find(m => m.id === row.message_id)) return;
      if (payload.eventType === 'INSERT') {
        if (!realChatReactions.find(r => r.message_id === row.message_id && r.user_id === row.user_id && r.emoji === row.emoji))
          realChatReactions.push(row);
      } else if (payload.eventType === 'DELETE') {
        realChatReactions = realChatReactions.filter(r =>
          !(r.message_id === row.message_id && r.user_id === row.user_id && r.emoji === row.emoji));
      }
      if (currentView === 'messages') renderMessages();
    }).subscribe();

  renderMessages();
  setTimeout(() => {
    const sc = document.getElementById('real-chat-thread-scroll');
    if (sc) sc.scrollTop = sc.scrollHeight;
    document.getElementById('real-chat-composer')?.focus();
  }, 50);
}

/* ============================================================
   Stage 7：@ 提及 — composer autocomplete + bubble 高亮
   ============================================================ */
let mentionPickerVisible = false;
let mentionFilterText = '';

function onComposerInput(textarea) {
  if (!textarea) return;
  const v = textarea.value;
  const pos = textarea.selectionStart ?? v.length;
  const before = v.slice(0, pos);
  const m = before.match(/@([^\s@]*)$/);
  if (m) {
    mentionPickerVisible = true;
    mentionFilterText = m[1].toLowerCase();
  } else {
    mentionPickerVisible = false;
    mentionFilterText = '';
  }
  renderMentionPicker();
}

function renderMentionPicker() {
  let picker = document.getElementById('mention-picker');
  if (!mentionPickerVisible) { picker?.remove(); return; }
  let candidates = allProfiles || [];
  // 群組模式：只顯示群組成員；DM 模式：除了自己以外所有人
  if (realChatKind === 'group' && realChatGroupMemberIds.length) {
    candidates = candidates.filter(p => realChatGroupMemberIds.includes(p.id));
  }
  candidates = candidates.filter(p => p.id !== realChatMe?.id);
  if (mentionFilterText) {
    candidates = candidates.filter(p =>
      (p.english_name || '').toLowerCase().includes(mentionFilterText) ||
      (p.name || '').toLowerCase().includes(mentionFilterText)
    );
  }
  candidates = candidates.slice(0, 6);
  if (!candidates.length) { picker?.remove(); return; }
  if (!picker) {
    picker = document.createElement('div');
    picker.id = 'mention-picker';
    picker.style.cssText = 'position:fixed;background:white;border:1px solid #e6dfd1;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.18);z-index:90;min-width:240px;max-width:320px;overflow:hidden;font-family:inherit;';
    document.body.appendChild(picker);
  }
  picker.innerHTML = `
    <div style="padding:6px 10px;font-size:10.5px;color:#7a6a52;background:#f9f4e8;border-bottom:1px solid #e6dfd1;">@ 提及 · ${mentionFilterText || '輸入名字篩選'}</div>
    ${candidates.map(p => `
      <button onclick="insertMention('${p.id}')" style="display:flex;align-items:center;gap:8px;padding:7px 10px;width:100%;text-align:left;background:transparent;border:none;cursor:pointer;font-family:inherit;font-size:12px;border-bottom:1px solid #f4ecd8;"
              onmouseover="this.style.background='#f9f4e8'" onmouseout="this.style.background='transparent'">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:${p.role==='admin'?'#7a5a1a':p.is_pm?'#c47a3a':'#2F5D50'};color:white;font-size:10px;font-weight:600;flex-shrink:0;">${(p.avatar && p.avatar.trim()) || (p.english_name||p.name||'?')[0]}</span>
        <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"><strong>${p.english_name || p.name}</strong> <span style="color:#7a6a52;font-size:11px;">${p.title || ''}</span></span>
      </button>
    `).join('')}
  `;
  // 位置：textarea 上方
  const ta = document.getElementById('real-chat-composer');
  if (ta) {
    const r = ta.getBoundingClientRect();
    picker.style.left = r.left + 'px';
    picker.style.top = (r.top - picker.offsetHeight - 6) + 'px';
  }
}

function insertMention(profileId) {
  const p = allProfiles?.find(x => x.id === profileId);
  if (!p) return;
  const ta = document.getElementById('real-chat-composer');
  if (!ta) return;
  const v = ta.value;
  const pos = ta.selectionStart ?? v.length;
  const before = v.slice(0, pos);
  const after = v.slice(pos);
  const m = before.match(/@([^\s@]*)$/);
  if (!m) return;
  const prefix = before.slice(0, m.index);
  const insertion = `@${p.english_name || p.name} `;
  ta.value = prefix + insertion + after;
  const newPos = (prefix + insertion).length;
  ta.focus();
  ta.setSelectionRange(newPos, newPos);
  mentionPickerVisible = false;
  document.getElementById('mention-picker')?.remove();
}

// 把 @英文名 / @中文名 轉成可點擊的 highlight span
function renderBodyWithMentions(text, escapeFn) {
  const esc = escapeFn || ((s) => (s || '').replace(/</g, '&lt;'));
  if (!text) return '';
  const escaped = esc(text);
  if (!allProfiles?.length) return escaped;
  // 排序 profile 名稱：長的先匹配（避免 "Brad" 被 "Brad Wang" 部分匹配）
  const names = allProfiles
    .flatMap(p => [{ name: p.english_name, p }, { name: p.name, p }])
    .filter(x => x.name)
    .sort((a, b) => b.name.length - a.name.length);
  let result = escaped;
  names.forEach(({ name, p }) => {
    const escapedName = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(`@${escapedName}`, 'g');
    const isMe = p.id === realChatMe?.id;
    result = result.replace(re, `<span class="rounded px-1 cursor-pointer" style="background:${isMe?'rgba(196,122,58,.35)':'rgba(196,122,58,.15)'};color:${isMe?'var(--caramel-hover)':'var(--ink)'};font-weight:600;" onclick="event.stopPropagation();openChatWithReal('${p.id}')" title="與 ${esc(name)} 開始對話">@${esc(name)}</span>`);
  });
  return result;
}

          <label data-pid="${p.id}" style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid #f0e8d8;cursor:pointer;font-family:inherit;">
            <input type="checkbox" value="${p.id}" style="width:14px;height:14px;cursor:pointer;">

async function loadReactions(messageIds) {
  if (!messageIds || !messageIds.length) { realChatReactions = []; return; }
  const { data, error } = await sb.from('chat_message_reactions')
    .select('message_id, user_id, emoji')
    .in('message_id', messageIds);
  if (error) console.warn('[chat] load reactions failed:', error);
  realChatReactions = data || [];
}

async function toggleReaction(messageId, emoji) {
  const me = realChatMe?.id;
  if (!me) return;
  realChatReactPickerFor = null;
  const existing = realChatReactions.find(r =>
    r.message_id === messageId && r.user_id === me && r.emoji === emoji
  );
  if (existing) {
    const { error } = await sb.from('chat_message_reactions')
      .delete()
      .eq('message_id', messageId).eq('user_id', me).eq('emoji', emoji);
    if (error) { alert('移除反應失敗：' + error.message); return; }
  } else {
    const { error } = await sb.from('chat_message_reactions')
      .insert({ message_id: messageId, user_id: me, emoji });
    if (error) { alert('新增反應失敗：' + error.message); return; }
  }
  // realtime 會推回更新；先樂觀重繪
  renderMessages();
}

function toggleReactPicker(messageId) {
  realChatReactPickerFor = (realChatReactPickerFor === messageId) ? null : messageId;
  renderMessages();
}

async function markChannelAsRead(channelId, userId) {
  if (!channelId || !userId) return;
  const { error } = await sb.from('chat_reads').upsert({
    channel_id: channelId,
    user_id: userId,
    last_read_at: new Date().toISOString()
  }, { onConflict: 'channel_id,user_id' });
  if (error) console.warn('[chat] mark read failed:', error);
}

async function loadPeerReadAt(channelId, peerId) {
  const { data } = await sb.from('chat_reads')
    .select('last_read_at')
    .eq('channel_id', channelId)
    .eq('user_id', peerId)
    .maybeSingle();
  return data?.last_read_at || null;
}

function setReply(messageId) {
  const m = realChatMessages.find(x => x.id === messageId);
  if (!m) return;
  realChatReplyingTo = m;
  renderMessages();
  setTimeout(() => { document.getElementById('real-chat-composer')?.focus(); }, 30);
}

function cancelReply() {
  realChatReplyingTo = null;
  renderMessages();
}

function getMyProfile() {
  if (currentProfile) return currentProfile;
  try {
    const id = localStorage.getItem('pmsys.myProfileId');
    if (id && allProfiles) return allProfiles.find(p => p.id === id) || null;
  } catch(e) {}
  return null;

    overlay.innerHTML = `
      <div style="background:#fffaf2;border:1px solid #e6dfd1;border-radius:14px;padding:22px 24px;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;font-family:inherit;">
        <h3 style="font-family:ui-serif,Georgia,serif;font-size:18px;font-weight:700;margin:0 0 4px;">以哪個身份發送訊息？</h3>
        <p style="font-size:12px;color:#7a6a52;margin:0 0 16px;line-height:1.5;">原型階段：選一個 ProjFlow 帳號作為「你」。會記在瀏覽器，下次自動套用；點對話頭頂的「換個身份」可重新選。</p>
        <div style="display:flex;flex-direction:column;gap:6px;">${list}</div>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.querySelectorAll('button[data-pid]').forEach(btn => {
      btn.onclick = () => {
        const pid = btn.dataset.pid;
        const p = allProfiles.find(x => x.id === pid);
        try { localStorage.setItem('pmsys.myProfileId', pid); } catch(e) {}
        document.body.removeChild(overlay);
        resolve(p || null);
      };
    });
    overlay.onclick = (e) => {
      if (e.target === overlay) { document.body.removeChild(overlay); resolve(null); }
    };
  });
}

function changeMyIdentity() {
  try { localStorage.removeItem('pmsys.myProfileId'); } catch(e) {}
  exitRealChat();
  // 立即重新觸發 picker 後續流程：交給 user 下次點對象時跳
}

async function findOrCreateDmChannel(meId, otherId) {
  // 找既有的 DM channel
  const { data: existing, error: e1 } = await sb.from('chat_channels')
    .select('id, user_a, user_b')
    .eq('kind', 'dm')
    .or(`and(user_a.eq.${meId},user_b.eq.${otherId}),and(user_a.eq.${otherId},user_b.eq.${meId})`);
  if (e1) { console.error('[chat] find channel error:', e1); }
  if (existing && existing.length > 0) return existing[0].id;
  // 沒有 → 建一個
  const { data: created, error: e2 } = await sb.from('chat_channels')
    .insert({ kind: 'dm', user_a: meId, user_b: otherId, created_by: meId })
    .select('id').single();
  if (e2) { alert('建立對話頻道失敗：' + e2.message); return null; }
  // 同時加 members（用 upsert 容忍重複錯誤）
  await sb.from('chat_channel_members').insert([
    { channel_id: created.id, user_id: meId,   role: 'member' },
    { channel_id: created.id, user_id: otherId, role: 'member' }
  ]);
  return created.id;
}

async function openChatWithReal(profileId) {
  const target = allProfiles?.find(x => x.id === profileId);
  if (!target) return;
  let me = getMyProfile();
  if (!me) me = await pickMyIdentity();
  if (!me) return;
  if (me.id === target.id) { alert('不能跟自己對話'); return; }

  const channelId = await findOrCreateDmChannel(me.id, target.id);
  if (!channelId) return;

  // 讀歷史訊息（含 reply_to_id 以支援引用顯示）
  const { data: msgs, error } = await sb.from('chat_messages')
    .select('id, channel_id, sender_id, body, created_at, reply_to_id')
    .eq('channel_id', channelId)
    .order('created_at', { ascending: true })
    .limit(200);
  if (error) { alert('讀取訊息失敗：' + error.message); return; }

  realChatActive = true;
  realChatKind = 'dm';
  realChatGroup = null;
  realChatGroupMemberIds = [];
  realChatMe = me;
  realChatTarget = target;
  realChatChannelId = channelId;
  realChatMessages = msgs || [];
  realChatReplyingTo = null;
  chatPartnerId = null;       // 關掉 mock 模式
  activeMessageId = null;

  // 標記我這邊為已讀 + 抓對方目前讀到哪
  await markChannelAsRead(channelId, me.id);
  realChatPeerReadAt = await loadPeerReadAt(channelId, target.id);

  // Realtime 訂閱新訊息
  if (realChatSub) { sb.removeChannel(realChatSub); realChatSub = null; }
  realChatSub = sb.channel(`ch-${channelId}`)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'chat_messages',
      filter: `channel_id=eq.${channelId}`
    }, (payload) => {
      if (!realChatMessages.find(m => m.id === payload.new.id)) {
        realChatMessages.push(payload.new);
        if (currentView === 'messages') renderMessages();
        // 對方傳來的新訊息 → 自動標記為已讀
        if (payload.new.sender_id !== realChatMe.id) {
          markChannelAsRead(channelId, realChatMe.id);
        }
      }
    })
    .subscribe(status => console.log('[chat] msgs realtime:', status));

  // Realtime 訂閱對方的已讀回執變更
  if (realChatReadsSub) { sb.removeChannel(realChatReadsSub); realChatReadsSub = null; }
  realChatReadsSub = sb.channel(`reads-${channelId}`)
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'chat_reads',
      filter: `channel_id=eq.${channelId}`
    }, (payload) => {
      const row = payload.new || payload.old;
      if (row?.user_id === realChatTarget.id) {
        realChatPeerReadAt = row.last_read_at;
        if (currentView === 'messages') renderMessages();
      }
    })
    .subscribe(status => console.log('[chat] reads realtime:', status));

  // 載入 + 訂閱訊息反應
  await loadReactions(realChatMessages.map(m => m.id));
  if (realChatReactSub) { sb.removeChannel(realChatReactSub); realChatReactSub = null; }
  realChatReactSub = sb.channel(`reacts-${channelId}`)
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'chat_message_reactions'
    }, (payload) => {
      const row = payload.new || payload.old;
      if (!row) return;
      // 過濾：只處理本頻道訊息的反應
      const inChannel = realChatMessages.find(m => m.id === row.message_id);
      if (!inChannel) return;
      if (payload.eventType === 'INSERT') {
        if (!realChatReactions.find(r => r.message_id === row.message_id && r.user_id === row.user_id && r.emoji === row.emoji)) {
          realChatReactions.push(row);
        }
      } else if (payload.eventType === 'DELETE') {
        realChatReactions = realChatReactions.filter(r =>
          !(r.message_id === row.message_id && r.user_id === row.user_id && r.emoji === row.emoji)
        );
      }
      if (currentView === 'messages') renderMessages();
    })
    .subscribe(status => console.log('[chat] reactions realtime:', status));

  renderMessages();
  setTimeout(() => {
    const sc = document.getElementById('real-chat-thread-scroll');
    if (sc) sc.scrollTop = sc.scrollHeight;
    const ta = document.getElementById('real-chat-composer');
    if (ta) ta.focus();
  }, 50);
}

function exitRealChat() {
  realChatActive = false;
  realChatKind = 'dm';
  realChatGroup = null;
  realChatGroupMemberIds = [];
  realChatReplyingTo = null;
  realChatReactPickerFor = null;
  if (realChatSub)      { sb.removeChannel(realChatSub);      realChatSub = null; }
  if (realChatReadsSub) { sb.removeChannel(realChatReadsSub); realChatReadsSub = null; }
  if (realChatReactSub) { sb.removeChannel(realChatReactSub); realChatReactSub = null; }
  renderMessages();
}

async function sendRealChat() {
  const ta = document.getElementById('real-chat-composer');
  const text = (ta?.value || '').trim();
  if (!text || !realChatMe || !realChatChannelId) return;
  const payload = {
    channel_id: realChatChannelId,
    sender_id: realChatMe.id,
    body: text,
    is_urgent: false
  };
  if (realChatReplyingTo) payload.reply_to_id = realChatReplyingTo.id;
  const { error } = await sb.from('chat_messages').insert(payload);
  if (error) { alert('送出失敗：' + error.message); return; }
  realChatReplyingTo = null;
  if (ta) { ta.value = ''; ta.focus(); }
  renderMessages(); // 立即重繪以清掉回覆 banner（realtime 也會推回新訊息）
}

function realChatPanel() {
  const me = realChatMe;
  const target = realChatTarget;
  const messages = realChatMessages;
  const peerReadAt = realChatPeerReadAt ? new Date(realChatPeerReadAt).getTime() : 0;
  const msgById = new Map(messages.map(m => [m.id, m]));

  const fmtTime = (iso) => {
    if (!iso) return '';
    try { return new Date(iso).toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }); } catch(e) { return ''; }
  };
  const escape = (s) => (s || '').replace(/</g, '&lt;');
  const displayOf = (p) => p ? (p.english_name || p.name) : '（未知）';

  const isGroupMode = realChatKind === 'group';
  const bubble = (m) => {
    const mine = m.sender_id === me.id;
    const msgTime = m.created_at ? new Date(m.created_at).getTime() : 0;
    // 群組不顯示已讀回執（複雜度太高，下版做）
    const read = mine && !isGroupMode && msgTime > 0 && peerReadAt >= msgTime;

    const sender = senderOf(m.sender_id);
    const senderNameBlock = (isGroupMode && !mine) ? `
      <div class="text-[10.5px] font-semibold mb-0.5" style="color: var(--caramel-hover);">${escape(displayOf(sender))}</div>
    ` : '';
    // 引用顯示
    let replyBlock = '';
    if (m.reply_to_id) {
      const parent = msgById.get(m.reply_to_id);
      if (parent) {
        const pSender = senderOf(parent.sender_id);
        const previewText = (parent.body || '').slice(0, 80);
        replyBlock = `
          <div class="text-[10.5px] mb-1.5 pl-2 border-l-2 ${mine ? 'opacity-80' : ''}"
               style="border-color: ${mine ? 'rgba(255,255,255,.4)' : 'var(--caramel)'}; ${mine ? 'color: rgba(255,255,255,.85);' : 'color: var(--text-3);'}">
            <div class="font-semibold">↩ ${escape(displayOf(pSender))}</div>
            <div style="white-space: pre-wrap; word-break: break-word;">${escape(previewText)}${parent.body && parent.body.length > 80 ? '…' : ''}</div>
          </div>
        `;
      } else {
        replyBlock = `<div class="text-[10.5px] mb-1.5 opacity-60 italic">↩ （引用訊息已不在範圍內）</div>`;
      }
    }
    // 反應彙整：emoji → [user_id...]
    const msgReactions = realChatReactions.filter(r => r.message_id === m.id);
    const grouped = {};
    msgReactions.forEach(r => {
      if (!grouped[r.emoji]) grouped[r.emoji] = [];
      grouped[r.emoji].push(r.user_id);
    });
    const reactionsRow = Object.entries(grouped).length === 0 ? '' : `
      <div class="flex flex-wrap gap-1 mt-1.5 ${mine ? 'justify-end' : 'justify-start'}">
        ${Object.entries(grouped).map(([emoji, userIds]) => {
          const reacted = userIds.includes(me.id);
          const names = userIds.map(uid => {
            const u = senderOf(uid);
            return u ? (u.english_name || u.name) : '？';
          }).join(', ');
          return `<button onclick="toggleReaction('${m.id}','${emoji}')"
                          class="px-1.5 py-0.5 rounded-full text-[11px] flex items-center gap-1 transition"
                          style="background: ${reacted ? 'var(--caramel-soft)' : 'var(--bg-subtle)'}; border: 1px solid ${reacted ? 'var(--caramel)' : 'var(--border)'};"
                          title="${escape(names)}">
                    <span>${emoji}</span><span class="mono text-[10px]" style="color: var(--text-2);">${userIds.length}</span>
                  </button>`;
        }).join('')}
      </div>
    `;
    // emoji picker（hover 才顯示，點 + 開啟）
    const pickerOpen = realChatReactPickerFor === m.id;
    const pickerPopup = pickerOpen ? `
      <div class="absolute z-10 ${mine ? 'right-0' : 'left-0'} -top-9 flex items-center gap-1 px-2 py-1 rounded-full shadow-md" style="background: white; border: 1px solid var(--border);">
        ${QUICK_EMOJIS.map(e => `<button onclick="toggleReaction('${m.id}','${e}')" class="text-[15px] hover:scale-125 transition px-1" title="加 ${e} 反應">${e}</button>`).join('')}

    ` : '';
    const actionBtns = `
      <div class="flex items-center gap-1 ${mine ? 'self-end mb-3 ml-1.5' : 'self-end mb-3 mr-1.5'} opacity-0 group-hover:opacity-100 transition">
        <button onclick="toggleReactPicker('${m.id}')" class="px-1.5 py-0.5 rounded text-[11px]" style="background: var(--bg-subtle); color: var(--text-3);" title="加反應">😀+</button>
        <button onclick="setReply('${m.id}')" class="px-1.5 py-0.5 rounded text-[10px]" style="background: var(--bg-subtle); color: var(--text-3);" title="回覆">↩</button>
      </div>
    `;
    return `
      <div class="flex ${mine ? 'justify-end' : 'justify-start'} group">
        ${mine ? '' : actionBtns}
        <div class="max-w-[75%] relative">
          ${pickerPopup}
          <div class="px-3 py-2 rounded-lg text-[12.5px] leading-snug"
               style="background: ${mine ? 'var(--ink)' : 'var(--ink-soft)'}; color: ${mine ? 'white' : 'var(--text)'};">
            ${senderNameBlock}
            ${replyBlock}
            <div style="white-space: pre-wrap; word-break: break-word;">${renderBodyWithMentions(m.body, escape)}</div>
            <div class="text-[9.5px] mt-1 flex items-center ${mine ? 'justify-end opacity-75' : ''}" style="${mine ? '' : 'color: var(--text-3);'}">
              <span>${fmtTime(m.created_at)}</span>${tick}

          </div>
          ${reactionsRow}
        </div>

      </div>

  const replyBanner = realChatReplyingTo ? (() => {
    const parent = realChatReplyingTo;
    const pSender = senderOf(parent.sender_id);
    return `
      <div class="px-4 py-2 flex items-start gap-2 border-t" style="border-color: var(--border-soft); background: var(--ink-soft);">

        <div class="flex-1 min-w-0">
          <div class="text-[10.5px] font-semibold" style="color: var(--ink);">回覆 ${escape(displayOf(pSender))}</div>

        <button onclick="cancelReply()" class="text-[14px] leading-none px-1" style="color: var(--text-3);" title="取消回覆">×</button>
      </div>

  })() : '';

  const isGroup = realChatKind === 'group';
  const meDisplay = displayOf(me);

        <button onclick="changeMyIdentity()" class="underline" style="color: var(--text-3);">換個身份</button>

                  class="flex-1 text-[12.5px] resize-none rounded-md px-3 py-2 border"

  if (!text || !currentUser) return;
  MESSAGES.push({
    id: 'msg-local-' + Date.now(),
    type: 'message',
    from: currentUser.id,
    to: toId,
    preview: text,
    subject: text.slice(0, 30),
    time: '剛剛',
    unread: false,
    source: 'pmsys',
    synced: false
  });
  if (ta) ta.value = '';
  renderMessages();
  setTimeout(() => {
    const sc = document.getElementById('chat-thread-scroll');
    if (sc) sc.scrollTop = sc.scrollHeight;
    const ta2 = document.getElementById('chat-composer');
    if (ta2) ta2.focus();
  }, 30);

  const t = TASKS.find(x => x.id === taskId);
  if (!t) return;
  if (t.status === newStatus) return;
  // 切到「卡住」要填原因
  if (newStatus === 'blocked' && !t.blockReason) {
    const reason = prompt('請填寫「卡住」原因（會同步寫回 ProjFlow tasks.block_reason）：', '');
    if (!reason) return;
    t.blockReason = reason.trim();
  }
  // 切離「卡住」就清掉原因
  if (newStatus !== 'blocked') {
    delete t.blockReason;
  }
  t.status = newStatus;
  // 重整當下 view（更新狀態總覽計數），再重開 modal
  showView(currentView);
  openTaskModal(taskId);
}

/* ============================================================
   跨系統契約 — ProjFlow 必須鏡像實作以下規格，避免資料同步混亂
   ------------------------------------------------------------
   1. profiles 表新增 en_name 欄；UI 稱呼一律 en_name 優先、無則 name
   2. PMSYS 與 ProjFlow 登入閘允許清單須一致：role ∈ ['pm','pmo','admin']
   3. 閒置 60 分鐘自動登出，55 分鐘出 5 分鐘預告；雙系統 session 同步失效
   4. 首次登入強制走教學引導；已學過旗標跨系統共用（SSO URL 帶 tutorialDone）
   5. SSO URL 契約：
      PMSYS → ProjFlow: ?from=pmsys&u=&email=&name=&enName=&tutorialDone=
      ProjFlow → PMSYS: ?from=projflow&u=&email=&tutorialDone=
   6. 正式版改用 Supabase JWT；URL 明碼參數僅原型階段使用
   ============================================================ */

/* ============================================================
   閒置 60 分鐘自動登出（55 分鐘預告）
   ============================================================ */
const IDLE_LOGOUT_MS = 60 * 60 * 1000;
const IDLE_WARN_MS   = 55 * 60 * 1000;
const idleManager = (() => {
  let warnT = null, logoutT = null, mounted = false, warnEl = null;
  const events = ['mousemove','keydown','click','scroll','touchstart','wheel'];
  function showWarn() {
    if (warnEl) return;
    warnEl = document.createElement('div');
    warnEl.style.cssText = 'position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:90;background:#a04a2a;color:#fffaf2;padding:10px 18px;border-radius:8px;font-size:13px;box-shadow:0 6px 18px rgba(0,0,0,.2);';
    warnEl.textContent = '已閒置 55 分鐘，5 分鐘後將自動登出。動一下滑鼠或鍵盤即可繼續。';
    document.body.appendChild(warnEl);
  }
  function hideWarn() { if (warnEl) { warnEl.remove(); warnEl = null; } }
  function reset() {
    if (warnT) clearTimeout(warnT);
    if (logoutT) clearTimeout(logoutT);
    warnT   = setTimeout(showWarn, IDLE_WARN_MS);
    logoutT = setTimeout(() => logout('idle'), IDLE_LOGOUT_MS);
  }
  function onActivity() { if (!mounted) return; hideWarn(); reset(); }
  function start() {
    if (mounted) return;
    mounted = true;
    events.forEach(ev => window.addEventListener(ev, onActivity, { passive: true }));
    reset();
  }
  function stop() {
    if (!mounted) return;
    mounted = false;
    events.forEach(ev => window.removeEventListener(ev, onActivity));
    if (warnT) clearTimeout(warnT);
    if (logoutT) clearTimeout(logoutT);
    hideWarn();
  }
  return { start, stop };
})();

    body: '每筆資料都有來源標記：<strong>PMSYS</strong>（你手寫）、<strong>RTM</strong>（製造端）、<strong>ProjFlow</strong>（公司主系統）。三個來源在這裡聚合，不必到各系統各看一次。' },
  { title: () => '行事曆與會議',
    body: '「行程」可切週 / 月視圖。客戶會議與內部會議自動標色，便於一眼分辨。' },
  { title: () => 'A4 報告',
    body: '「報告」頁可生成 A4 版面的期中 / 結案報告。報告會記錄 lastEdit，PMO 可知道誰改了什麼。' },
  { title: () => '翻書頁 → ProjFlow',
    body: '需要走完整 ProjFlow 功能時，點右上「同步更新到 ProjFlow」或畫面內的翻頁鈕，會以 180° 翻書頁過去。這邊登入過，那邊不會再要求登入（SSO）。' },
];
function tutorialKey(uid) { return `pmsys.tutorial.done.${uid}`; }
function hasSeenTutorial(uid) { try { return localStorage.getItem(tutorialKey(uid)) === '1'; } catch { return false; } }
function markTutorialSeen(uid) { try { localStorage.setItem(tutorialKey(uid), '1'); } catch {} }

let _tutStep = 0;
function startTutorial() {
  _tutStep = 0;
  renderTutorial();
  document.getElementById('tutorial-overlay').classList.add('show');
}
function closeTutorial() { document.getElementById('tutorial-overlay').classList.remove('show'); }
function renderTutorial() {
  const step = TUTORIAL_STEPS[_tutStep];
  const total = TUTORIAL_STEPS.length;
  document.getElementById('tutorial-step-label').textContent = `第 ${_tutStep + 1} / ${total} 步`;
  document.getElementById('tutorial-title').textContent = typeof step.title === 'function' ? step.title(currentUser) : step.title;
  document.getElementById('tutorial-body').innerHTML = step.body;
  document.getElementById('tutorial-dots').innerHTML =
    TUTORIAL_STEPS.map((_, i) => `<span class="${i === _tutStep ? 'active' : ''}"></span>`).join('');
  document.getElementById('tutorial-prev').disabled = _tutStep === 0;
  document.getElementById('tutorial-next').textContent = _tutStep === total - 1 ? '完成' : '下一步';
}
function tutorialPrev() { if (_tutStep > 0) { _tutStep--; renderTutorial(); } }
function tutorialNext() {
  if (_tutStep < TUTORIAL_STEPS.length - 1) { _tutStep++; renderTutorial(); return; }
  if (currentUser) markTutorialSeen(currentUser.id);
  closeTutorial();
}


// SSO 交握（反向）：從 ProjFlow 翻頁回來時，若已帶身份就直接進工作檯，不再走 OTP
// ProjFlow 端跳轉網址需帶：?from=projflow&u=<id>（或 &email=<email>）；帶 tutorialDone=1 表示已學過引導
function ssoLoginFromUrl() {
  const qp = new URLSearchParams(location.search);
  if (qp.get('from') !== 'projflow') return false;
  const byId = qp.get('u');
  const byEmail = (qp.get('email') || '').toLowerCase();
  const u = USERS.find(x => x.id === byId)
         || USERS.find(x => x.email && x.email.toLowerCase() === byEmail);
  if (!u) return false;
  if (qp.get('tutorialDone') === '1') markTutorialSeen(u.id); // 跨系統共用「已學過」旗標
  history.replaceState(null, '', location.pathname);
  login(u.id);
  return true;
}

// 初始化
document.addEventListener('DOMContentLoaded', () => {
  try { initLogin(); } catch(e) { console.error('[init] initLogin failed:', e); }
  // 已在 ProjFlow 登入並翻頁回來 → 帶身份直接進
  try { if (ssoLoginFromUrl()) return; } catch(e) { console.error('[init] ssoLoginFromUrl failed:', e); }
  // 強制一鍵進總經理視角
  try {
    login('u1');
  } catch(e) {
    console.error('[init] auto-login failed:', e);
    // fallback：登入頁總會至少看得到一鍵進入鈕
  }
});

// 原型階段快速切換視角（王耀裕 ↔ 總經理）
function quickSwitch() {
  const nextId = currentUser?.id === 'u100' ? 'u1' : 'u100';
  login(nextId);
}

/* 翻書頁跳轉到 ProjFlow（同窗、不另開分頁，真正的 180° 翻頁動畫） */
function flipToProjFlow() {
  if (document.getElementById('flip-running')) return;
  const overlay = document.createElement('div');
  overlay.id = 'flip-running';
  overlay.className = 'flip-overlay';
  overlay.innerHTML = `
    <div class="flip-overlay-shadow"></div>
    <div class="flip-overlay-page">
      <!-- 正面：翻起時看到的「離開 PMSYS」 -->
      <div class="flip-overlay-front">
        <div class="flip-overlay-leaving">
          <div class="lv-chip">
            <div class="lv-tei">TEi</div>
            <div class="lv-name">PMSYS</div>
          </div>
          <div class="lv-sub">正在翻頁前往 ProjFlow…</div>
        </div>
      </div>
      <!-- 反面：翻過後落地的 ProjFlow -->
      <div class="flip-overlay-back">
        <div>
          <div class="flip-overlay-brand">
            <div class="brand-mark"><span class="brand-dot"></span>ProjFlow</div>
            <div class="brand-sub">公司主系統</div>
          </div>
          <div class="flip-overlay-runner-wrap">
            <span class="flip-overlay-runner">🏃</span>
            <div>
              <div class="flip-overlay-runner-text">正在連接 ProjFlow</div>
              <div class="flip-overlay-runner-track"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  // 動畫總長 2500ms，1000ms 觸發 navigation：靠 head 的 preconnect 預熱，
  // 跳轉啟動瞬間網路已就緒，剩餘 1500ms 動畫期間 ProjFlow 通常已接手，過渡幾乎無斷層。
  setTimeout(() => {
    const base = 'https://pm-system-mauve.vercel.app/dashboard';
    // SSO 交握（正向）：帶完整身份 + 教學狀態過去，ProjFlow 認得就免再登入、不必再學一次教學
    const u = currentUser || USERS.find(x => x.id === 'u100');
    const qs = new URLSearchParams({
      from: 'pmsys',
      u: u?.id || '',
      email: u?.email || '',
      name: u?.name || '',
      enName: u?.enName || '',
      tutorialDone: (u && hasSeenTutorial(u.id)) ? '1' : '0'
    });
    window.location.href = `${base}?${qs.toString()}`;
  }, 1000);
}
