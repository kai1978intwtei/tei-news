<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>我的電腦健檢報告</title>
<style>
  :root { --bg:#0f1420; --card:#182031; --line:#26324a; --tx:#dce6f5; --dim:#8fa3c0;
          --ok:#3fd68f; --warn:#ffc24d; --bad:#ff6b6b; --accent:#5aa9ff; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--tx); font:15px/1.6 "Segoe UI","Microsoft JhengHei",sans-serif; padding:24px; }
  h1 { font-size:22px; margin-bottom:4px; }
  .sub { color:var(--dim); font-size:13px; margin-bottom:20px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; margin-bottom:20px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px 16px; }
  .card .k { color:var(--dim); font-size:12px; }
  .card .v { font-size:24px; font-weight:700; margin-top:2px; }
  .card .n { font-size:12px; color:var(--warn); margin-top:4px; }
  section { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:16px; margin-bottom:16px; }
  section h2 { font-size:16px; margin-bottom:10px; color:var(--accent); }
  .tw { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13.5px; }
  th { text-align:left; color:var(--dim); font-weight:600; border-bottom:1px solid var(--line); padding:6px 8px; white-space:nowrap; }
  td { border-bottom:1px solid var(--line); padding:6px 8px; vertical-align:top; }
  td.num { text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .tag { display:inline-block; font-size:11.5px; border-radius:99px; padding:1px 9px; }
  .tag.ok { background:rgba(63,214,143,.15); color:var(--ok); }
  .tag.warn { background:rgba(255,194,77,.15); color:var(--warn); }
  .tag.bad { background:rgba(255,107,107,.15); color:var(--bad); }
  .hint { border-left:3px solid var(--warn); background:rgba(255,194,77,.07); padding:8px 12px; border-radius:0 8px 8px 0; margin-bottom:8px; font-size:13.5px; }
  .hint b { color:var(--warn); }
  .dim { color:var(--dim); }
  .path { color:var(--dim); font-size:12px; word-break:break-all; }
  .bar { height:6px; background:var(--line); border-radius:99px; overflow:hidden; margin-top:6px; }
  .bar i { display:block; height:100%; background:var(--accent); }
  .bar.hot i { background:var(--bad); }
  footer { color:var(--dim); font-size:12px; margin-top:8px; }
  @media (max-width:640px){ body{padding:12px;} .card .v{font-size:20px;} }
</style>
</head>
<body>
<h1>🧹 我的電腦健檢報告</h1>
<div class="sub" id="meta"></div>
<div class="cards" id="cards"></div>
<div id="sections"></div>
<footer>本報告由 sysclean/scan.ps1 產生（唯讀掃描）。清理請經 AI Agent 產生 plan.json 並確認後執行 clean.ps1 -Apply。</footer>

<script id="data" type="application/json">__SYSCLEAN_DATA__</script>
<script>
const D = JSON.parse(document.getElementById('data').textContent);
const $ = (h) => { const d = document.createElement('div'); d.innerHTML = h; return d.firstElementChild; };
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const num = (v) => (v === null || v === undefined) ? '—' : Number(v).toLocaleString();
const arr = (v) => Array.isArray(v) ? v : (v ? [v] : []);

document.getElementById('meta').textContent =
  `${D.system.computerName} · ${D.system.osName} · 產生時間 ${D.generatedAt}` +
  ` · 開機已 ${D.system.uptimeHours} 小時`;

/* ---- 總覽卡片 ---- */
const memPct = D.system.memoryUsedPct, cpuPct = D.system.cpuSampledPct;
const cards = document.getElementById('cards');
cards.append(
  $(`<div class="card"><div class="k">記憶體使用</div><div class="v">${memPct}%</div>
     <div class="bar ${memPct>85?'hot':''}"><i style="width:${Math.min(memPct,100)}%"></i></div>
     <div class="n">${num(D.system.memoryUsedMB)} / ${num(D.system.memoryTotalMB)} MB${memPct>85?' · 偏高':''}</div></div>`),
  $(`<div class="card"><div class="k">CPU（取樣）</div><div class="v">${cpuPct??'—'}%</div>
     <div class="bar ${cpuPct>70?'hot':''}"><i style="width:${Math.min(cpuPct||0,100)}%"></i></div>
     <div class="n">${D.system.cpuCores} 核心${cpuPct>70?' · 持續偏高會發熱':''}</div></div>`),
  $(`<div class="card"><div class="k">可清理垃圾</div><div class="v">${(D.junkTotalMB/1024).toFixed(2)} GB</div>
     <div class="n">共 ${arr(D.junk).length} 個位置</div></div>`),
  $(`<div class="card"><div class="k">知識庫建議</div><div class="v">${arr(D.hints).length} 筆</div>
     <div class="n">${D.system.uptimeNote ? esc(D.system.uptimeNote) : '開機自啟 ' + arr(D.startupItems).filter(s=>s.state==='enabled').length + ' 個'}</div></div>`)
);
arr(D.disks).forEach(d => cards.append(
  $(`<div class="card"><div class="k">磁碟 ${esc(d.drive)}</div><div class="v">${d.freeGB} GB 可用</div>
     <div class="bar ${d.freePct<15?'hot':''}"><i style="width:${100-d.freePct}%"></i></div>
     <div class="n">共 ${d.totalGB} GB${d.warning ? ' · ' + esc(d.warning) : ''}</div></div>`)
));

/* ---- 區塊 ---- */
const S = document.getElementById('sections');
function section(title, inner) { S.append($(`<section><h2>${title}</h2>${inner}</section>`)); }
function table(heads, rows) {
  return `<div class="tw"><table><tr>${heads.map(h=>`<th>${h}</th>`).join('')}</tr>` +
         rows.join('') + `</table></div>`;
}

if (arr(D.hints).length) {
  section('💡 AI 知識庫建議（僅供參考，實際清理由你核准的 plan.json 決定）',
    arr(D.hints).map(h =>
      `<div class="hint"><b>${esc(h.target)}</b>（${esc(h.where)} · ${esc(h.category)}）— ${esc(h.note)}
       <span class="dim">建議動作：${esc(h.suggest)}</span></div>`).join(''));
}

section('🗑️ 垃圾檔案（可安全清理的暫存與快取）',
  table(['位置','路徑','大小 (MB)','建議動作'],
    arr(D.junk).sort((a,b)=>(b.sizeMB||0)-(a.sizeMB||0)).map(j =>
      `<tr><td>${esc(j.name)}</td><td class="path">${esc(j.path)}</td>
       <td class="num">${num(j.sizeMB)}</td>
       <td>${j.suggestedAction==='manual' ? '<span class="tag warn">需手動處理</span>' : '<span class="tag ok">'+esc(j.suggestedAction)+'</span>'}</td></tr>`)));

section('🔥 CPU 佔用排行（發熱元兇，取樣期間）',
  table(['程序','PID','CPU %','記憶體 (MB)'],
    arr(D.topCpu).map(p =>
      `<tr><td>${esc(p.name)}</td><td class="num">${p.pid}</td>
       <td class="num">${p.cpuPct>20?'<span class="tag bad">':'<span>'}${p.cpuPct}%</span></td>
       <td class="num">${num(p.memoryMB)}</td></tr>`)));

section('🧠 記憶體佔用排行（同名程序合併）',
  table(['程序','程序數','記憶體合計 (MB)','CPU %'],
    arr(D.topMemory).map(p =>
      `<tr><td>${esc(p.name)}</td><td class="num">${p.count}</td>
       <td class="num">${p.memoryMB>800?'<span class="tag warn">':'<span>'}${num(p.memoryMB)}</span></td>
       <td class="num">${p.cpuPct??'—'}</td></tr>`)));

section('🚀 開機自啟項',
  table(['名稱','來源','狀態','指令／路徑'],
    arr(D.startupItems).map(s =>
      `<tr><td>${esc(s.name)}</td><td class="dim">${esc(s.source)}${s.hive?' · '+esc(s.hive):''}</td>
       <td>${s.state==='enabled'?'<span class="tag warn">啟用中</span>':'<span class="tag ok">已停用</span>'}</td>
       <td class="path">${esc(s.command)}</td></tr>`)));

if (arr(D.scheduledTasks).length) {
  section('⏰ 第三方排程任務（非 Microsoft）',
    table(['任務','狀態','上次執行','執行檔'],
      arr(D.scheduledTasks).map(t =>
        `<tr><td>${esc(t.taskPath)}${esc(t.taskName)}</td>
         <td>${t.state==='Disabled'?'<span class="tag ok">已停用</span>':'<span class="tag warn">'+esc(t.state)+'</span>'}</td>
         <td class="dim">${esc(t.lastRunTime||'—')}</td><td class="path">${esc(t.action||'')}</td></tr>`)));
}

const svc = arr(D.autoServices).sort((a,b)=>(b.thirdParty?1:0)-(a.thirdParty?1:0));
section('⚙️ 自動啟動服務（第三方排前面）',
  table(['服務','顯示名稱','狀態','類型'],
    svc.map(s =>
      `<tr><td>${esc(s.name)}</td><td>${esc(s.displayName)}</td>
       <td class="dim">${esc(s.state)}</td>
       <td>${s.thirdParty?'<span class="tag warn">第三方</span>':'<span class="tag ok">系統</span>'}</td></tr>`)));

section('📦 已安裝軟體（依大小，找出暫時用不到的大型軟體）',
  table(['軟體','版本','大小 (MB)','安裝日期','發行者'],
    arr(D.installedApps).map(a =>
      `<tr><td>${esc(a.name)}</td><td class="dim">${esc(a.version||'')}</td>
       <td class="num">${num(a.sizeMB)}</td><td class="dim">${esc(a.installDate||'')}</td>
       <td class="dim">${esc(a.publisher||'')}</td></tr>`)));

if (arr(D.largeFiles).length) {
  section('🐘 使用者資料夾大檔案（> 200MB，-DeepDisk 深掃結果）',
    table(['路徑','大小 (MB)','最後修改'],
      arr(D.largeFiles).map(f =>
        `<tr><td class="path">${esc(f.path)}</td><td class="num">${num(f.sizeMB)}</td>
         <td class="dim">${esc(f.lastWrite)}</td></tr>`)));
}
</script>
</body>
</html>
