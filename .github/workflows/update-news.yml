name: Auto Update TEi News

on:
  schedule:
    # 每 10 分鐘一次（GitHub Actions 雲端排程實際會略有延遲，通常 5-15 分內觸發）
    - cron: '*/10 * * * *'
  workflow_dispatch:  # 允許手動觸發（Actions 頁面按「Run workflow」）

permissions:
  contents: write

# 同一時間只允許一個 run，避免和前一次未完的 run 衝突
concurrency:
  group: auto-update-tei-news
  cancel-in-progress: false

jobs:
  update:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore translate cache
        uses: actions/cache@v4
        with:
          path: .translate_cache.json
          key: translate-cache-${{ github.run_id }}
          restore-keys: |
            translate-cache-

      - name: Write DeepL key from secret
        shell: pwsh
        run: |
          "${{ secrets.DEEPL_API_KEY }}" | Out-File -FilePath .deepl_key -Encoding ASCII -NoNewline

      - name: Run fetch_news.ps1
        shell: pwsh
        run: ./fetch_news.ps1

      - name: Copy latest.html to repo root as index.html
        shell: pwsh
        run: Copy-Item output/latest.html -Destination index.html -Force

      - name: Commit & push (reset-on-conflict pattern)
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 把我們剛產生的最新 index.html / cache 暫存到 /tmp，避免 reset 時被覆蓋
          mkdir -p /tmp/ours
          cp -f index.html /tmp/ours/ 2>/dev/null || true
          cp -f .translate_cache.json /tmp/ours/ 2>/dev/null || true

          # 嘗試最多 8 次：每次都 reset 到 origin/main 最新狀態 → 還原我們的檔案 → push
          for i in 1 2 3 4 5 6 7 8; do
            echo "=== Attempt $i ==="
            git fetch origin main
            git reset --hard origin/main

            # 把暫存的我方最新檔案還原回工作目錄
            cp -f /tmp/ours/index.html . 2>/dev/null || true
            cp -f /tmp/ours/.translate_cache.json . 2>/dev/null || true

            git add index.html .translate_cache.json
            if git diff --cached --quiet; then
              echo "Remote already up-to-date with our content. No commit needed."
              exit 0
            fi
            git commit -m "auto-update $(date -u +'%Y-%m-%d %H:%M UTC')"

            if git push origin HEAD:main; then
              echo "Pushed successfully on attempt $i"
              exit 0
            fi

            echo "push failed on attempt $i, will retry after 4s..."
            sleep 4
          done

          echo "All retries exhausted."
          exit 1
