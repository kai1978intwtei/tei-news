name: Auto Update TEi News

on:
  schedule:
    # 每 10 分鐘一次（GitHub Actions 雲端排程實際會略有延遲，通常 5-15 分內觸發）
    - cron: '*/10 * * * *'
  workflow_dispatch:  # 允許手動觸發（Actions 頁面按「Run workflow」）

permissions:
  contents: write

# 同一時間只允許一個 run，避免和本機推送或前一次未完的 run 衝突
concurrency:
  group: auto-update-tei-news
  cancel-in-progress: false

jobs:
  update:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 完整歷史，pull --rebase 才能正常運作

      - name: Restore translate cache
        uses: actions/cache@v4
        with:
          path: .translate_cache.json
          key: translate-cache-${{ github.run_id }}
          restore-keys: |
            translate-cache-

      - name: Write DeepL key from secret
        shell: pwsh
        run: |
          "${{ secrets.DEEPL_API_KEY }}" | Out-File -FilePath .deepl_key -Encoding ASCII -NoNewline

      - name: Run fetch_news.ps1
        shell: pwsh
        run: ./fetch_news.ps1

      - name: Copy latest.html to repo root as index.html
        shell: pwsh
        run: Copy-Item output/latest.html -Destination index.html -Force

      - name: Commit & push changes (with rebase + retry)
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .translate_cache.json
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "auto-update $(date -u +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git pull --rebase origin main || git rebase --abort || true
            if git push origin HEAD:main; then
              echo "pushed on try $i"
              exit 0
            fi
            echo "push failed (attempt $i), waiting 5s..."
            sleep 5
          done
          echo "all retries failed"
          exit 1
