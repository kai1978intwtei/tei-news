name: Auto Update TEi News

on:
  schedule:
    # 每 10 分鐘一次（GitHub Actions 雲端排程實際會略有延遲，通常 5-15 分內觸發）
    - cron: '*/10 * * * *'
  workflow_dispatch:  # 允許手動觸發（Actions 頁面按「Run workflow」）

permissions:
  contents: write

jobs:
  update:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Restore translate cache
        uses: actions/cache@v4
        with:
          path: .translate_cache.json
          key: translate-cache-${{ github.run_id }}
          restore-keys: |
            translate-cache-

      - name: Write DeepL key from secret
        shell: pwsh
        run: |
          "${{ secrets.DEEPL_API_KEY }}" | Out-File -FilePath .deepl_key -Encoding ASCII -NoNewline

      - name: Run fetch_news.ps1
        shell: pwsh
        run: ./fetch_news.ps1

      - name: Copy latest.html to repo root as index.html
        shell: pwsh
        run: Copy-Item output/latest.html -Destination index.html -Force

      - name: Commit & push changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .translate_cache.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "auto-update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
