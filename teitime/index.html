<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>TEiTime ‧ 共享行事曆</title>
<meta name="theme-color" content="#E8740C" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="TEiTime" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="apple-touch-icon" href="icon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="preconnect" href="https://pm-system-mauve.vercel.app" />
<link rel="preconnect" href="https://kai1978intwtei.github.io" />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg-0:#FBFBFD; --bg-1:#F2F4F8; --surface:#FFFFFF; --surface-soft:#F8FAFC;
    --border:#E6E9F0; --border-strong:#CBD3DE;
    --text:#0F172A; --text-sub:#475569; --text-muted:#94A3B8; --text-dim:#CBD5E1;
    --accent:#E8740C; --accent-soft:#FFF7ED; --accent-border:#FED7AA; --accent-dark:#C2410C;
    --ok:#10B981; --warning:#F59E0B; --danger:#DC2626;
    --font-sans:"Inter Tight","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    --shadow-sm:0 1px 2px rgba(15,23,42,0.04);
    --shadow-md:0 1px 3px rgba(15,23,42,0.04), 0 4px 12px rgba(15,23,42,0.05);
    --shadow-lg:0 4px 6px rgba(15,23,42,0.03), 0 12px 24px rgba(15,23,42,0.08);
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:var(--font-sans); color:var(--text);
    background:var(--bg-1); min-height:100vh; letter-spacing:0.005em;
    -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,select,textarea{font-family:inherit;font-size:16px;}

  /* ===== App shell ===== */
  .app{max-width:560px;margin:0 auto;min-height:100vh;background:var(--bg-0);
    display:flex;flex-direction:column;box-shadow:var(--shadow-lg);position:relative;}

  /* ===== Top bar ===== */
  .topbar{position:sticky;top:0;z-index:30;background:rgba(251,251,253,0.88);
    backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--border);
    padding:calc(var(--safe-top) + 10px) 14px 10px;}
  .topbar-row{display:flex;align-items:center;gap:10px;}
  .brand{display:flex;align-items:center;gap:9px;flex:1;min-width:0;}
  .brand img{width:30px;height:30px;border-radius:8px;}
  .brand-name{font-weight:700;font-size:16px;letter-spacing:-0.01em;}
  .brand-name span{color:var(--accent);}
  .icon-btn{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;
    color:var(--text-sub);background:var(--surface);border:1px solid var(--border);
    box-shadow:var(--shadow-sm);transition:.15s;font-size:18px;}
  .icon-btn:active{transform:scale(.94);}
  .icon-btn.has-dot{position:relative;}
  .icon-btn .dot{position:absolute;top:7px;right:8px;width:8px;height:8px;border-radius:50%;
    background:var(--accent);border:2px solid var(--surface);}
  .avatar{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-size:20px;
    background:var(--accent-soft);border:1px solid var(--accent-border);}

  /* ===== Month nav ===== */
  .monthnav{display:flex;align-items:center;gap:6px;margin-top:12px;}
  .monthnav .title{font-size:21px;font-weight:700;letter-spacing:-0.02em;flex:1;}
  .monthnav .title b{color:var(--accent);font-weight:700;}
  .nav-pill{display:flex;background:var(--surface);border:1px solid var(--border);
    border-radius:10px;box-shadow:var(--shadow-sm);overflow:hidden;}
  .nav-pill button{width:34px;height:34px;display:grid;place-items:center;color:var(--text-sub);font-size:16px;}
  .nav-pill button:active{background:var(--bg-1);}
  .today-btn{padding:0 13px;height:34px;border-radius:10px;background:var(--surface);
    border:1px solid var(--border);box-shadow:var(--shadow-sm);font-size:13px;font-weight:600;color:var(--text-sub);}

  /* ===== View switch ===== */
  .viewswitch{display:flex;gap:4px;margin-top:12px;background:var(--bg-1);
    border:1px solid var(--border);border-radius:11px;padding:4px;}
  .viewswitch button{flex:1;height:32px;border-radius:8px;font-size:13px;font-weight:600;color:var(--text-muted);transition:.15s;}
  .viewswitch button.on{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm);}

  /* ===== Body ===== */
  .body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

  /* ===== Month grid ===== */
  .weekhead{display:grid;grid-template-columns:repeat(7,1fr);padding:8px 6px 4px;}
  .weekhead div{text-align:center;font-size:11px;font-weight:600;color:var(--text-muted);}
  .weekhead div.we{color:#C2410C;}
  .month{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);
    border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
  .day{background:var(--surface);min-height:74px;padding:4px 3px;display:flex;flex-direction:column;gap:2px;position:relative;}
  .day.out{background:var(--surface-soft);}
  .day .dnum{font-size:12px;font-weight:600;color:var(--text-sub);text-align:center;
    width:22px;height:22px;line-height:22px;margin:0 auto;border-radius:50%;}
  .day.out .dnum{color:var(--text-dim);}
  .day.today .dnum{background:var(--accent);color:#fff;}
  .day.we .dnum{color:#C2410C;}
  .day.sel{box-shadow:inset 0 0 0 2px var(--accent);z-index:1;}
  .chip{font-size:10.5px;line-height:1.3;font-weight:600;color:#fff;border-radius:4px;
    padding:1px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .chip.dot-style{background:transparent!important;color:var(--text-sub);padding-left:0;display:flex;align-items:center;gap:3px;}
  .chip.dot-style i{width:6px;height:6px;border-radius:50%;flex:none;}
  .more{font-size:10px;color:var(--text-muted);font-weight:600;text-align:center;}

  /* ===== Agenda (day/week list) ===== */
  .agenda{padding:10px 14px 120px;}
  .agenda-day{margin-bottom:6px;}
  .agenda-date{display:flex;align-items:baseline;gap:8px;padding:12px 2px 6px;position:sticky;top:0;background:var(--bg-0);}
  .agenda-date .d{font-size:22px;font-weight:700;letter-spacing:-0.02em;}
  .agenda-date .wd{font-size:12px;font-weight:600;color:var(--text-muted);}
  .agenda-date.today .d{color:var(--accent);}
  .ev{display:flex;gap:11px;padding:11px 12px;background:var(--surface);border:1px solid var(--border);
    border-radius:13px;box-shadow:var(--shadow-sm);margin-bottom:8px;transition:.15s;}
  .ev:active{transform:scale(.99);background:var(--surface-soft);}
  .ev .bar{width:4px;border-radius:3px;flex:none;}
  .ev .ev-main{flex:1;min-width:0;}
  .ev .ev-title{font-size:15px;font-weight:600;}
  .ev .ev-meta{font-size:12.5px;color:var(--text-muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .ev .ev-meta .cal{display:inline-flex;align-items:center;gap:4px;}
  .ev .ev-meta .cal i{width:7px;height:7px;border-radius:50%;}
  .ev .ev-time{font-size:12.5px;font-weight:600;color:var(--text-sub);text-align:right;flex:none;}
  .empty{text-align:center;color:var(--text-muted);padding:60px 20px;}
  .empty .big{font-size:34px;margin-bottom:8px;}

  /* ===== FAB ===== */
  .fab{position:fixed;left:50%;transform:translateX(calc(-50% + 220px));bottom:calc(22px + var(--safe-bottom));
    width:58px;height:58px;border-radius:18px;background:var(--accent);color:#fff;font-size:28px;
    display:grid;place-items:center;box-shadow:0 8px 20px rgba(232,116,12,.42);z-index:25;transition:.15s;}
  .fab:active{transform:translateX(calc(-50% + 220px)) scale(.92);}
  @media(max-width:560px){.fab{left:auto;right:18px;transform:none;}.fab:active{transform:scale(.92);}}

  /* ===== Sheet / modal ===== */
  .scrim{position:fixed;inset:0;background:rgba(15,23,42,.42);backdrop-filter:blur(2px);
    z-index:40;opacity:0;pointer-events:none;transition:.2s;}
  .scrim.on{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:50%;transform:translateX(-50%) translateY(100%);bottom:0;width:100%;max-width:560px;
    background:var(--surface);border-radius:22px 22px 0 0;z-index:41;transition:transform .26s cubic-bezier(.32,.72,0,1);
    max-height:92vh;display:flex;flex-direction:column;padding-bottom:var(--safe-bottom);}
  .sheet.on{transform:translateX(-50%) translateY(0);}
  .sheet .grab{width:38px;height:4px;border-radius:3px;background:var(--border-strong);margin:9px auto 2px;}
  .sheet-head{display:flex;align-items:center;gap:10px;padding:8px 16px 12px;border-bottom:1px solid var(--border);}
  .sheet-head .h-title{flex:1;font-size:17px;font-weight:700;}
  .sheet-head button.txt{font-size:14px;font-weight:600;color:var(--accent);padding:6px 4px;}
  .sheet-head button.txt.muted{color:var(--text-muted);}
  .sheet-body{overflow-y:auto;padding:14px 16px 24px;-webkit-overflow-scrolling:touch;}

  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px;}
  .field input[type=text],.field textarea,.field input[type=date],.field input[type=time],.field input[type=email]{
    width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:11px;background:var(--surface-soft);
    color:var(--text);transition:.15s;}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px var(--accent-soft);}
  .field textarea{resize:none;min-height:64px;line-height:1.5;}
  .row2{display:flex;gap:10px;}.row2>*{flex:1;}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;}
  .toggle-row .lab{font-size:14px;font-weight:600;}
  .sw{width:46px;height:28px;border-radius:16px;background:var(--border-strong);position:relative;transition:.2s;flex:none;}
  .sw.on{background:var(--accent);}
  .sw::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.2s;box-shadow:var(--shadow-sm);}
  .sw.on::after{left:21px;}

  /* calendar picker chips */
  .calpick{display:flex;gap:8px;flex-wrap:wrap;}
  .calchip{display:inline-flex;align-items:center;gap:7px;padding:8px 13px;border-radius:11px;
    border:1.5px solid var(--border);background:var(--surface-soft);font-size:13px;font-weight:600;color:var(--text-sub);}
  .calchip i{width:11px;height:11px;border-radius:50%;}
  .calchip.on{border-color:currentColor;background:#fff;}
  .calchip.locked{opacity:.45;}

  .primary{width:100%;padding:14px;border-radius:13px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;
    box-shadow:0 4px 12px rgba(232,116,12,.3);transition:.15s;margin-top:6px;}
  .primary:active{transform:scale(.99);}
  .ghost-danger{width:100%;padding:13px;border-radius:12px;color:var(--danger);font-weight:600;font-size:14px;margin-top:10px;border:1px solid #FECACA;}

  /* ===== Calendar list (manage) ===== */
  .cal-item{display:flex;align-items:center;gap:12px;padding:13px 4px;border-bottom:1px solid var(--border);}
  .cal-item .swatch{width:16px;height:16px;border-radius:5px;flex:none;}
  .cal-item .ci-main{flex:1;min-width:0;}
  .cal-item .ci-name{font-size:15px;font-weight:600;}
  .cal-item .ci-sub{font-size:12px;color:var(--text-muted);margin-top:1px;}
  .cal-item .eye{font-size:18px;color:var(--text-muted);width:34px;height:34px;display:grid;place-items:center;}
  .cal-item .eye.off{opacity:.3;}
  .role-tag{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px;text-transform:uppercase;letter-spacing:.04em;}
  .role-owner{background:#FEF3C7;color:#B45309;}
  .role-editor{background:#DBEAFE;color:#1D4ED8;}
  .role-viewer{background:#F1F5F9;color:#64748B;}

  /* member rows */
  .member{display:flex;align-items:center;gap:11px;padding:11px 2px;border-bottom:1px solid var(--border);}
  .member .m-av{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-size:19px;background:var(--accent-soft);border:1px solid var(--accent-border);flex:none;}
  .member .m-main{flex:1;min-width:0;}
  .member .m-name{font-size:14px;font-weight:600;}
  .member .m-sub{font-size:12px;color:var(--text-muted);}
  .member select{padding:7px 9px;border:1px solid var(--border);border-radius:9px;background:var(--surface-soft);font-size:13px;font-weight:600;color:var(--text-sub);}

  /* ===== Event detail ===== */
  .det-head{padding:4px 0 14px;border-bottom:1px solid var(--border);margin-bottom:14px;}
  .det-cal{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--text-sub);margin-bottom:8px;}
  .det-cal i{width:9px;height:9px;border-radius:50%;}
  .det-title{font-size:21px;font-weight:700;letter-spacing:-0.01em;line-height:1.25;}
  .det-line{display:flex;gap:11px;align-items:flex-start;padding:9px 0;font-size:14px;}
  .det-line .ic{width:20px;text-align:center;color:var(--text-muted);flex:none;}
  .det-line .dl-sub{font-size:12px;color:var(--text-muted);}
  .attendees{display:flex;gap:-6px;margin-top:2px;}
  .att-av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:15px;background:var(--accent-soft);border:2px solid var(--surface);margin-left:-7px;}
  .att-av:first-child{margin-left:0;}

  /* ===== Comments ===== */
  .comments{margin-top:16px;border-top:1px solid var(--border);padding-top:14px;}
  .comments h4{font-size:13px;font-weight:700;color:var(--text-sub);margin-bottom:12px;}
  .cmt{display:flex;gap:9px;margin-bottom:13px;}
  .cmt .c-av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:15px;background:var(--accent-soft);border:1px solid var(--accent-border);flex:none;}
  .cmt .c-body{flex:1;min-width:0;}
  .cmt .c-top{display:flex;align-items:baseline;gap:7px;}
  .cmt .c-name{font-size:13px;font-weight:700;}
  .cmt .c-time{font-size:11px;color:var(--text-muted);}
  .cmt .c-text{font-size:14px;line-height:1.45;margin-top:2px;color:var(--text-sub);white-space:pre-wrap;word-break:break-word;}
  .cmt-input{display:flex;gap:8px;margin-top:6px;}
  .cmt-input input{flex:1;padding:11px 13px;border:1px solid var(--border);border-radius:20px;background:var(--surface-soft);}
  .cmt-input button{width:42px;height:42px;border-radius:50%;background:var(--accent);color:#fff;font-size:18px;flex:none;display:grid;place-items:center;}
  .cmt-input button:disabled{opacity:.4;}

  /* ===== Feed ===== */
  .feed-item{display:flex;gap:11px;padding:13px 2px;border-bottom:1px solid var(--border);}
  .feed-item .f-ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:16px;flex:none;background:var(--bg-1);}
  .feed-item .f-main{flex:1;min-width:0;}
  .feed-item .f-text{font-size:13.5px;line-height:1.45;}
  .feed-item .f-text b{font-weight:700;}
  .feed-item .f-time{font-size:11.5px;color:var(--text-muted);margin-top:3px;}

  /* ===== Settings / profile ===== */
  .prof-card{display:flex;align-items:center;gap:13px;padding:16px;background:var(--surface-soft);border:1px solid var(--border);border-radius:15px;margin-bottom:16px;}
  .prof-card .p-av{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;font-size:28px;background:var(--accent-soft);border:1px solid var(--accent-border);}
  .prof-card .p-name{font-size:17px;font-weight:700;}
  .prof-card .p-sub{font-size:13px;color:var(--text-muted);margin-top:2px;}
  .set-row{display:flex;align-items:center;gap:12px;padding:14px 4px;border-bottom:1px solid var(--border);font-size:15px;font-weight:500;}
  .set-row .s-ic{width:22px;text-align:center;color:var(--text-muted);}
  .set-row .s-arrow{margin-left:auto;color:var(--text-dim);}
  .who{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
  .who button{padding:10px;border:1px solid var(--border);border-radius:11px;background:var(--surface-soft);font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;}
  .who button.on{border-color:var(--accent);background:#fff;color:var(--accent);}

  .flipbtn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:14px;border-radius:13px;
    background:var(--surface-soft);border:1px solid var(--border);font-size:14px;font-weight:600;margin-top:10px;color:var(--text-sub);}
  .flipbtn:active{background:var(--bg-1);}
  .flipbtn .arr{color:var(--accent);font-weight:700;}

  /* toast */
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(96px + var(--safe-bottom));z-index:60;
    background:#0F172A;color:#fff;padding:11px 18px;border-radius:12px;font-size:13.5px;font-weight:600;
    box-shadow:var(--shadow-lg);opacity:0;transition:.25s;pointer-events:none;max-width:90%;text-align:center;}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(-4px);}

  .badge-soft{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--accent-soft);color:var(--accent-dark);border:1px solid var(--accent-border);}
  .hint{font-size:12px;color:var(--text-muted);line-height:1.5;background:var(--surface-soft);border:1px solid var(--border);border-radius:11px;padding:11px 12px;margin-top:8px;}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-row">
      <div class="brand">
        <img src="icon.svg" alt="" />
        <div class="brand-name">TEi<span>Time</span></div>
      </div>
      <button class="icon-btn has-dot" id="btnFeed" title="動態消息">🔔<span class="dot" id="feedDot" style="display:none"></span></button>
      <button class="icon-btn" id="btnCals" title="日曆與成員">📚</button>
      <button class="avatar" id="btnProfile" title="我的">🦁</button>
    </div>

    <div class="monthnav">
      <div class="title" id="navTitle">2026 年 <b>6 月</b></div>
      <button class="today-btn" id="btnToday">今天</button>
      <div class="nav-pill">
        <button id="navPrev">‹</button>
        <button id="navNext">›</button>
      </div>
    </div>

    <div class="viewswitch" id="viewSwitch">
      <button data-v="month" class="on">月</button>
      <button data-v="week">週</button>
      <button data-v="day">日</button>
    </div>
  </header>

  <!-- BODY -->
  <main class="body" id="bodyView"></main>

  <!-- FAB -->
  <button class="fab" id="fab" title="新增行程">＋</button>
</div>

<!-- SHEETS -->
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <div class="sheet-head">
    <button class="txt muted" id="sheetLeft">取消</button>
    <div class="h-title" id="sheetTitle"></div>
    <button class="txt" id="sheetRight"></button>
  </div>
  <div class="sheet-body" id="sheetBody"></div>
</div>

<div class="toast" id="toast"></div>

<!-- Supabase JS (loaded; activates only if keys are configured below) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
/* =========================================================================
   TEiTime ‧ 共享行事曆  —  TEi Composites 內部姊妹系統（PMSYS / ProjFlow / RTM）
   單檔 PWA。資料層：有填 Supabase 金鑰 → 雲端同步；留空 → 本機 localStorage 原型。
   ========================================================================= */

/* ---- 1. Supabase 設定（正式版填入即啟用雲端同步；schema 見 migrations/）---- */
const SUPABASE_URL = '';          // 例：https://xxxx.supabase.co
const SUPABASE_ANON_KEY = '';     // 例：anon public key
const SB = (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  : null;

function loadData(){

}
function persist(d){ try{ localStorage.setItem(LS_KEY, JSON.stringify(d||DATA)); }catch(_){} }

/* Supabase 寫入鉤子（雲端模式自動同步；原型模式為 no-op）。
   正式版：把 events/calendars/comments upsert 到對應表並訂閱 realtime。 */
async function sbSync(table, row){
  if(!SB) return;
  try{ await SB.from(table).upsert(row); }catch(e){ console.warn('sbSync', table, e.message); }
}

/* ---- 5. 狀態 ---- */
const state = {
  view: 'month',
  cursor: new Date(),
  selDate: ymd(new Date()),
  me: PROFILES[0].id,
  hidden: new Set(),         // 隱藏的日曆 id
};

/* ---- 6. 工具 ---- */
function ymd(d){ const x=new Date(d); return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`; }
function sameYmd(a,b){ return ymd(a)===ymd(b); }
function fmtTime(iso){ const d=new Date(iso); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function fmtRange(ev){ if(ev.allDay) return '整天'; return `${fmtTime(ev.start)} – ${fmtTime(ev.end)}`; }
function calById(id){ return DATA.cals.find(c=>c.id===id); }
function myRole(cal){ const m=cal.members.find(x=>x.userId===state.me); return m?m.role:null; }
function canEdit(cal){ const r=myRole(cal); return r==='owner'||r==='editor'; }
function visibleCals(){ return DATA.cals.filter(c=>c.members.some(m=>m.userId===state.me) && !state.hidden.has(c.id)); }
function myCals(){ return DATA.cals.filter(c=>c.members.some(m=>m.userId===state.me)); }
function eventsOn(dateStr){
  const vis = new Set(visibleCals().map(c=>c.id));
  return DATA.events.filter(e=>vis.has(e.calendarId) && overlapsDay(e, dateStr))
    .sort((a,b)=> (a.allDay?0:1)-(b.allDay?0:1) || new Date(a.start)-new Date(b.start));
}
function overlapsDay(ev, dateStr){
  const s=ymd(ev.start), e=ymd(ev.end); return dateStr>=s && dateStr<=e;
}
function relTime(ts){ const s=Math.floor((Date.now()-ts)/1000);
  if(s<60)return '剛剛'; if(s<3600)return Math.floor(s/60)+' 分鐘前';
  if(s<86400)return Math.floor(s/3600)+' 小時前'; return Math.floor(s/86400)+' 天前'; }
const WD = ['日','一','二','三','四','五','六'];

/* ---- 7. 渲染：頂部 ---- */

/* ---- 8. 渲染：月檢視 ---- */
function weekStart(d){ const x=new Date(d); x.setDate(x.getDate()-x.getDay()); x.setHours(0,0,0,0); return x; }
function renderMonth(){
  const c=state.cursor, y=c.getFullYear(), m=c.getMonth();
  const first=new Date(y,m,1); const start=new Date(first); start.setDate(1-first.getDay());
  let html='<div class="weekhead">'+WD.map((w,i)=>`<div class="${i===0||i===6?'we':''}">${w}</div>`).join('')+'</div><div class="month">';
  for(let i=0;i<42;i++){
    const d=new Date(start); d.setDate(start.getDate()+i); const ds=ymd(d);
    const out=d.getMonth()!==m, today=sameYmd(d,new Date()), we=d.getDay()===0||d.getDay()===6, sel=ds===state.selDate;
    const evs=eventsOn(ds);
    let chips='';
    evs.slice(0,3).forEach(e=>{ const cal=calById(e.calendarId);
      chips += `<div class="chip" style="background:${cal.color}">${esc(e.title)}</div>`; });
    if(evs.length>3) chips+=`<div class="more">+${evs.length-3}</div>`;
    html+=`<div class="day ${out?'out':''} ${today?'today':''} ${we?'we':''} ${sel?'sel':''}" data-d="${ds}">
      <div class="dnum">${d.getDate()}</div>${chips}</div>`;
  }
  html+='</div>';
  // selected-day agenda underneath
  html+=renderDayList(state.selDate, true);
  return html;
}

/* ---- 9. 渲染：日 / 週 列表 ---- */
function renderDayList(dateStr, compact){
  const evs=eventsOn(dateStr); const d=new Date(dateStr+'T00:00:00'); const today=dateStr===ymd(new Date());
  let h=`<div class="agenda" ${compact?'style="padding-top:4px;padding-bottom:120px"':''}>`;
  h+=`<div class="agenda-date ${today?'today':''}"><span class="d">${d.getDate()}</span><span class="wd">${d.getMonth()+1}月 ‧ 週${WD[d.getDay()]}${today?' ‧ 今天':''}</span></div>`;
  if(!evs.length) h+=`<div class="empty"><div class="big">🗓️</div>這天沒有行程<br><span style="font-size:12px">點右下 ＋ 新增</span></div>`;
  evs.forEach(e=>h+=evCard(e));
  h+='</div>';
  return h;
}
function renderWeek(){
  const ws=weekStart(state.cursor); let h='<div class="agenda">';
  for(let i=0;i<7;i++){ const d=new Date(ws); d.setDate(ws.getDate()+i); const ds=ymd(d);
    const evs=eventsOn(ds); const today=ds===ymd(new Date());
    h+=`<div class="agenda-day"><div class="agenda-date ${today?'today':''}"><span class="d">${d.getDate()}</span><span class="wd">週${WD[d.getDay()]}${today?' ‧ 今天':''}</span></div>`;
    if(!evs.length) h+=`<div style="font-size:13px;color:var(--text-dim);padding:2px 2px 10px">—</div>`;
    evs.forEach(e=>h+=evCard(e)); h+='</div>'; }
  h+='</div>'; return h;
}
function evCard(e){ const cal=calById(e.calendarId);
  return `<div class="ev" data-ev="${e.id}">
    <div class="bar" style="background:${cal.color}"></div>
    <div class="ev-main">
      <div class="ev-title">${esc(e.title)}</div>
      <div class="ev-meta">
        <span class="cal"><i style="background:${cal.color}"></i>${esc(cal.name)}</span>
        ${e.location?`<span>📍 ${esc(e.location)}</span>`:''}
        ${cmtCount(e.id)?`<span>💬 ${cmtCount(e.id)}</span>`:''}
      </div>
    </div>
    <div class="ev-time">${e.allDay?'整天':fmtTime(e.start)+'<br>'+fmtTime(e.end)}</div>
  </div>`;
}
function cmtCount(eid){ return DATA.comments.filter(c=>c.eventId===eid).length; }

function renderBody(){
  const el=document.getElementById('bodyView');
  if(state.view==='month') el.innerHTML=renderMonth();
  else if(state.view==='week') el.innerHTML=renderWeek();
  else el.innerHTML=renderDayList(state.selDate,false);
  // bind day cells
  el.querySelectorAll('.day').forEach(d=>d.addEventListener('click',()=>{ state.selDate=d.dataset.d; render(); }));
  el.querySelectorAll('.ev').forEach(c=>c.addEventListener('click',()=>openEventDetail(c.dataset.ev)));
}
function render(){ renderTop(); renderBody(); }

  let body=`
    <div class="det-head">
      <div class="det-cal"><i style="background:${cal.color}"></i>${esc(cal.name)}</div>
      <div class="det-title">${esc(e.title)}</div>
    </div>
    <div class="det-line"><span class="ic">🕑</span><div><div>${d.getMonth()+1} 月 ${d.getDate()} 日（週${WD[d.getDay()]}）</div><div class="dl-sub">${fmtRange(e)}${e.reminderMin!=null?` ‧ 提前 ${e.reminderMin} 分提醒`:''}</div></div></div>
    ${e.location?`<div class="det-line"><span class="ic">📍</span><div>${esc(e.location)}</div></div>`:''}
    ${e.notes?`<div class="det-line"><span class="ic">📝</span><div>${esc(e.notes)}</div></div>`:''}
    ${att?`<div class="det-line"><span class="ic">👥</span><div class="attendees">${att}</div></div>`:''}
    <div class="comments">
      <h4>💬 留言（${cmtCount(e.id)}）</h4>
      <div id="cmtList"></div>
      <div class="cmt-input">
        <input id="cmtInput" placeholder="新增留言…" maxlength="500" />
        <button id="cmtSend" disabled>↑</button>
      </div>
    </div>`;
  setBody(body);
  renderComments(e.id);
  const inp=document.getElementById('cmtInput'), snd=document.getElementById('cmtSend');
  inp.addEventListener('input',()=>snd.disabled=!inp.value.trim());
  const send=()=>{ const t=inp.value.trim(); if(!t)return; addComment(e.id,t); inp.value=''; snd.disabled=true; renderComments(e.id); };
  snd.addEventListener('click',send);
  inp.addEventListener('keydown',ev=>{ if(ev.key==='Enter') send(); });
  openSheet();
}
function renderComments(eid){
  const list=document.getElementById('cmtList'); if(!list)return;
  const cs=DATA.comments.filter(c=>c.eventId===eid).sort((a,b)=>a.ts-b.ts);
  list.innerHTML = cs.length ? cs.map(c=>{const p=profById(c.userId);
    return `<div class="cmt"><div class="c-av">${p.emoji}</div><div class="c-body">
      <div class="c-top"><span class="c-name">${esc(dispName(p))}</span><span class="c-time">${relTime(c.ts)}</span></div>
      <div class="c-text">${esc(c.text)}</div></div></div>`;}).join('')
    : `<div style="font-size:13px;color:var(--text-muted);padding:4px 0 8px">還沒有留言，留下第一則吧。</div>`;
}
function addComment(eid,text){
  const ev=DATA.events.find(x=>x.id===eid);
  const c={ id:'c'+Date.now(), eventId:eid, userId:state.me, text, ts:Date.now(), crossId:'x-'+Math.random().toString(36).slice(2,10) };
  DATA.comments.push(c);
  pushFeed('comment', ev?ev.title:'', `在「${ev?ev.title:''}」留言`);
  persist(); sbSync('comments', c);
}

/* ---- 11. 新增 / 編輯行程 ---- */
function openEventEdit(eid){
  const editing = eid ? DATA.events.find(x=>x.id===eid) : null;
  const editable = myCals().filter(c=>canEdit(c));
  if(!editable.length){ toast('你沒有可編輯的日曆'); return; }
  const e = editing ? {...editing} : {
    id:null, calendarId:(visibleCals().find(c=>canEdit(c))||editable[0]).id,
    title:'', start:state.selDate+'T09:00', end:state.selDate+'T10:00', allDay:false,
    location:'', notes:'', reminderMin:30, attendees:[state.me]
  };
  const draft = { ...e,
    sDate: ymd(e.start), sTime: e.allDay?'09:00':fmtTime(toLocalInput(e.start)),
    eDate: ymd(e.end),   eTime: e.allDay?'10:00':fmtTime(toLocalInput(e.end)) };

  setSheet(editing?'編輯行程':'新增行程','儲存',()=>saveEvent(editing,draft));
  document.getElementById('sheetLeft').textContent='取消';
  let calOpts = editable.map(c=>`<button type="button" class="calchip ${c.id===draft.calendarId?'on':''}" style="color:${c.color}" data-cal="${c.id}"><i style="background:${c.color}"></i>${esc(c.name)}</button>`).join('');
  let remOpts = [0,5,15,30,60,120,1440].map(v=>`<option value="${v}" ${v===draft.reminderMin?'selected':''}>${v===0?'準時':v<60?v+' 分鐘前':v<1440?(v/60)+' 小時前':'1 天前'}</option>`).join('');
  setBody(`
    <div class="field"><label>標題</label><input type="text" id="fTitle" value="${esc(draft.title)}" placeholder="行程標題" /></div>
    <div class="field"><label>日曆</label><div class="calpick" id="fCalPick">${calOpts}</div></div>
    <div class="toggle-row"><span class="lab">整天</span><div class="sw ${draft.allDay?'on':''}" id="fAllDay"></div></div>
    <div class="row2">
      <div class="field"><label>開始</label><input type="date" id="fSDate" value="${draft.sDate}" /></div>
      <div class="field" id="fSTimeWrap"><label>&nbsp;</label><input type="time" id="fSTime" value="${draft.sTime}" /></div>
    </div>
    <div class="row2">
      <div class="field"><label>結束</label><input type="date" id="fEDate" value="${draft.eDate}" /></div>
      <div class="field" id="fETimeWrap"><label>&nbsp;</label><input type="time" id="fETime" value="${draft.eTime}" /></div>
    </div>
    <div class="field"><label>地點</label><input type="text" id="fLoc" value="${esc(draft.location)}" placeholder="會議室 / 地址 / 線上連結" /></div>
    <div class="field"><label>提醒</label><select id="fRem" style="width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:11px;background:var(--surface-soft)">${remOpts}</select></div>
    <div class="field"><label>備註</label><textarea id="fNotes" placeholder="補充說明…">${esc(draft.notes)}</textarea></div>
    ${editing?'<button class="ghost-danger" id="fDelete">刪除此行程</button>':''}
  `);
  // bind
  document.getElementById('fCalPick').querySelectorAll('.calchip').forEach(b=>b.addEventListener('click',()=>{
    document.getElementById('fCalPick').querySelectorAll('.calchip').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); draft.calendarId=b.dataset.cal; }));
  const allDaySw=document.getElementById('fAllDay');
  const syncAllDay=()=>{ const on=allDaySw.classList.contains('on');
    document.getElementById('fSTimeWrap').style.display=on?'none':'';
    document.getElementById('fETimeWrap').style.display=on?'none':''; };
  allDaySw.addEventListener('click',()=>{ allDaySw.classList.toggle('on'); syncAllDay(); }); syncAllDay();
  if(editing) document.getElementById('fDelete').addEventListener('click',()=>{ deleteEvent(editing.id); closeSheet(); render(); toast('已刪除'); });
  openSheet();
}
function toLocalInput(iso){ return iso; }
function saveEvent(editing, draft){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){ toast('請輸入標題'); return; }
  const allDay=document.getElementById('fAllDay').classList.contains('on');
  const sDate=document.getElementById('fSDate').value, eDate=document.getElementById('fEDate').value;
  const sTime=allDay?'00:00':document.getElementById('fSTime').value;
  const eTime=allDay?'23:59':document.getElementById('fETime').value;
  const start=new Date(`${sDate}T${sTime}`).toISOString();
  let end=new Date(`${eDate}T${eTime}`).toISOString();
  if(new Date(end)<new Date(start)) end=start;
  const calendarId=draft.calendarId;
  const reminderMin=parseInt(document.getElementById('fRem').value,10);
  const obj={ id: editing?editing.id:'e'+Date.now(), calendarId, title, start, end, allDay,
    location:document.getElementById('fLoc').value.trim(), notes:document.getElementById('fNotes').value.trim(),
    reminderMin: isNaN(reminderMin)?null:reminderMin, createdBy: editing?editing.createdBy:state.me,
    attendees: editing?editing.attendees:[state.me] };
  if(editing){ const i=DATA.events.findIndex(x=>x.id===editing.id); DATA.events[i]=obj; pushFeed('edit',title,`更新了行程「${title}」`); }
  else { DATA.events.push(obj); pushFeed('create',title,`新增了行程「${title}」`); }
  persist(); sbSync('events', obj);
  scheduleReminder(obj);
  closeSheet(); state.selDate=ymd(start); render(); toast(editing?'已更新':'已新增 ✓');
}
function deleteEvent(id){ DATA.events=DATA.events.filter(e=>e.id!==id); DATA.comments=DATA.comments.filter(c=>c.eventId!==id); persist(); if(SB) SB.from('events').delete().eq('id',id); }

    const role=myRole(c); const hidden=state.hidden.has(c.id);
    h+=`<div class="cal-item">
      <div class="swatch" style="background:${c.color}"></div>
      <div class="ci-main" data-edit="${c.id}"><div class="ci-name">${esc(c.name)}</div><div class="ci-sub">${c.members.length} 位成員 ‧ <span class="role-tag role-${role}">${roleLabel(role)}</span></div></div>
      <div class="eye ${hidden?'off':''}" data-eye="${c.id}">${hidden?'🚫':'👁️'}</div>
    </div>`;
  });
  setBody(h);
  document.getElementById('sheetBody').querySelectorAll('[data-eye]').forEach(el=>el.addEventListener('click',()=>{
    const id=el.dataset.eye; if(state.hidden.has(id)) state.hidden.delete(id); else state.hidden.add(id);
    openCalendars(); render(); }));
  document.getElementById('sheetBody').querySelectorAll('[data-edit]').forEach(el=>el.addEventListener('click',()=>openCalEdit(el.dataset.edit)));
  openSheet();
}
function roleLabel(r){ return r==='owner'?'擁有者':r==='editor'?'可編輯':'僅檢視'; }

function openCalEdit(cid){
  const editing=cid?calById(cid):null;
  const cal=editing||{ id:'cal'+Date.now(), name:'', color:PAL[DATA.cals.length%PAL.length], ownerId:state.me, members:[{userId:state.me,role:'owner'}] };
  const isOwner = !editing || myRole(cal)==='owner';
  setSheet(editing?'日曆設定':'新增日曆', isOwner?'儲存':'', ()=>{ if(isOwner) saveCal(editing,cal); });
  document.getElementById('sheetLeft').textContent=editing?'返回':'取消';
  document.getElementById('sheetLeft').onclick = editing?()=>openCalendars():closeSheet;
  let swatches=PAL.map(c=>`<button type="button" class="swatch-pick" data-c="${c}" style="width:30px;height:30px;border-radius:9px;background:${c};border:3px solid ${c===cal.color?'#0F172A':'transparent'}"></button>`).join('');
  let mem = cal.members.map(m=>{ const p=profById(m.userId); const owner=m.role==='owner';
    return `<div class="member"><div class="m-av">${p.emoji}</div><div class="m-main"><div class="m-name">${esc(dispName(p))}</div><div class="m-sub">${esc(p.title)} ‧ ${esc(p.unit)}</div></div>
      ${owner?'<span class="role-tag role-owner">擁有者</span>':
        (isOwner?`<select data-mem="${m.userId}"><option value="editor" ${m.role==='editor'?'selected':''}>可編輯</option><option value="viewer" ${m.role==='viewer'?'selected':''}>僅檢視</option><option value="__remove">移除</option></select>`
               :`<span class="role-tag role-${m.role}">${roleLabel(m.role)}</span>`)}
    </div>`; }).join('');
  const candidates = PROFILES.filter(p=>!cal.members.some(m=>m.userId===p.id));
  setBody(`
    <div class="field"><label>名稱</label><input type="text" id="cName" value="${esc(cal.name)}" placeholder="例：研發部行事曆" ${isOwner?'':'disabled'} /></div>
    <div class="field"><label>顏色</label><div style="display:flex;gap:8px;flex-wrap:wrap" id="cSwatch">${swatches}</div></div>
    <div class="field"><label>成員與權限</label>${mem}</div>
    ${isOwner&&candidates.length?`<div class="field"><label>邀請成員</label>
      <div style="display:flex;gap:8px"><select id="cInvite" style="flex:1;padding:11px;border:1px solid var(--border);border-radius:11px;background:var(--surface-soft)">
        <option value="">選擇同事…</option>${candidates.map(p=>`<option value="${p.id}">${esc(dispName(p))} ‧ ${esc(p.title)}</option>`).join('')}</select>
        <button class="primary" style="width:auto;padding:0 18px;margin:0" id="cInviteBtn">邀請</button></div></div>`:''}
    ${editing&&isOwner&&cal.id!=='cal_company'?'<button class="ghost-danger" id="cDelete">刪除此日曆</button>':''}
  `);
  let pickColor=cal.color;
  document.getElementById('cSwatch').querySelectorAll('.swatch-pick').forEach(b=>b.addEventListener('click',()=>{
    pickColor=b.dataset.c; cal.color=pickColor;
    document.getElementById('cSwatch').querySelectorAll('.swatch-pick').forEach(x=>x.style.border='3px solid transparent');
    b.style.border='3px solid #0F172A'; }));
  document.getElementById('sheetBody').querySelectorAll('[data-mem]').forEach(s=>s.addEventListener('change',()=>{
    const uid=s.dataset.mem;
    if(s.value==='__remove') cal.members=cal.members.filter(m=>m.userId!==uid);
    else { const m=cal.members.find(x=>x.userId===uid); m.role=s.value; }
    persist(); openCalEdit(cal.id===cid?cid:cal.id); }));
  const invBtn=document.getElementById('cInviteBtn');
  if(invBtn) invBtn.addEventListener('click',()=>{ const sel=document.getElementById('cInvite'); const uid=sel.value;
    if(!uid)return; cal.members.push({userId:uid, role:'editor'});
    if(!editing){ DATA.cals.push(cal); } persist(); pushFeed('invite',cal.name,`邀請 ${dispName(profById(uid))} 加入「${cal.name}」`);
    toast('已邀請 '+dispName(profById(uid))); openCalEdit(cal.id); });
  const del=document.getElementById('cDelete');
  if(del) del.addEventListener('click',()=>{ DATA.cals=DATA.cals.filter(c=>c.id!==cal.id); DATA.events=DATA.events.filter(e=>e.calendarId!==cal.id); persist(); openCalendars(); render(); toast('已刪除日曆'); });
  openSheet();
}
function saveCal(editing,cal){
  const name=document.getElementById('cName').value.trim();
  if(!name){ toast('請輸入名稱'); return; }
  cal.name=name;
  if(editing){ const i=DATA.cals.findIndex(c=>c.id===editing.id); DATA.cals[i]=cal; }
  else if(!DATA.cals.some(c=>c.id===cal.id)) DATA.cals.push(cal);
  persist(); sbSync('calendars', {id:cal.id,name:cal.name,color:cal.color,ownerId:cal.ownerId});
  closeSheet(); render(); toast(editing?'已更新':'已建立日曆 ✓');
}

/* ---- 13. 動態消息 (Feed) ---- */
function pushFeed(action,target,text){
  DATA.feed.unshift({ id:'f'+Date.now(), ts:Date.now(), userId:state.me, action, target, text });
  if(DATA.feed.length>100) DATA.feed.length=100; persist();
}
function openFeed(){
  setSheet('動態消息','',null);
  document.getElementById('sheetLeft').textContent='關閉';
  const ic={create:'🆕',edit:'✏️',comment:'💬',invite:'➕'};
  let h = DATA.feed.length ? DATA.feed.map(f=>{const p=profById(f.userId);
    return `<div class="feed-item"><div class="f-ic">${ic[f.action]||'🔔'}</div><div class="f-main">
      <div class="f-text"><b>${esc(dispName(p))}</b> ${esc(f.text)}</div><div class="f-time">${relTime(f.ts)}</div></div></div>`;}).join('')
    : '<div class="empty"><div class="big">🔕</div>目前沒有動態</div>';
  setBody(h);
  DATA.seenFeed=DATA.feed.length; persist(); renderTop();
  openSheet();
}

/* ---- 14. 個人 / 設定 ---- */
function openProfile(){
  const me=profById(state.me);
  setSheet('我的','',null);
  document.getElementById('sheetLeft').textContent='關閉';
  const notifState = ('Notification' in window) ? Notification.permission : 'unsupported';
  setBody(`
    <div class="prof-card"><div class="p-av">${me.emoji}</div><div><div class="p-name">${esc(me.name)}（${esc(me.en)}）</div><div class="p-sub">${esc(me.title)} ‧ ${esc(me.unit)}</div></div></div>

    <div class="set-row" id="setNotif"><span class="s-ic">🔔</span>推播提醒
      <span class="s-arrow">${notifState==='granted'?'<span class="badge-soft">已開啟</span>':notifState==='denied'?'已封鎖':'點此開啟 ›'}</span></div>
    <div class="set-row" id="setInstall"><span class="s-ic">📲</span>加入主畫面（安裝 App）<span class="s-arrow">›</span></div>

    <div style="font-size:12px;font-weight:700;color:var(--text-muted);margin:18px 0 6px">切換系統（同身份免登入）</div>
    <button class="flipbtn" data-flip="projflow"><span>🔁 翻頁去 ProjFlow</span><span class="arr">›</span></button>
    <button class="flipbtn" data-flip="pmsys"><span>🔁 翻頁去 PMSYS</span><span class="arr">›</span></button>
    <button class="flipbtn" data-flip="rtm"><span>🔁 翻頁去 RTM</span><span class="arr">›</span></button>

    <div style="font-size:12px;font-weight:700;color:var(--text-muted);margin:18px 0 6px">試用：切換身份（demo）</div>
    <div class="who" id="whoSwitch">${PROFILES.map(p=>`<button class="${p.id===state.me?'on':''}" data-uid="${p.id}">${p.emoji} ${esc(dispName(p))}</button>`).join('')}</div>

    <div class="hint" style="margin-top:18px">資料模式：${SB?'☁️ Supabase 雲端同步':'💾 本機原型（localStorage）'}。<br>正式上線請於 index.html 頂端填入 Supabase 金鑰，並套用 migrations 內的 schema。</div>
  `);
  document.getElementById('setNotif').addEventListener('click',enableNotifications);
  document.getElementById('setInstall').addEventListener('click',promptInstall);
  document.getElementById('sheetBody').querySelectorAll('[data-flip]').forEach(b=>b.addEventListener('click',()=>flipTo(b.dataset.flip)));
  document.getElementById('whoSwitch').querySelectorAll('[data-uid]').forEach(b=>b.addEventListener('click',()=>{
    state.me=b.dataset.uid; closeSheet(); render(); toast('已切換為 '+dispName(profById(state.me))); }));
  openSheet();
}

/* ---- 15. 跨系統翻頁（SSO，與 handoff 契約一致）---- */
function flipTo(sys){
  const u=profById(state.me);
  const qs=new URLSearchParams({ from:'teitime', u:u.id, email:(u.email||(u.en.toLowerCase().replace(/\s/g,'')+'@tei.com.tw')),
    name:u.name, enName:u.en, tutorialDone:'1' });
  location.href = `${SYS[sys]}?${qs.toString()}`;
}
/* 接收他系統翻頁進來：?from=projflow&u=&email=&tutorialDone= */
function handleSSO(){
  const qp=new URLSearchParams(location.search); const from=qp.get('from');
  if(from && ['projflow','pmsys','rtm'].includes(from)){
    const u=qp.get('u'), email=qp.get('email');
    const p=PROFILES.find(x=>x.id===u) || PROFILES.find(x=>email && (x.email===email));
    if(p){ state.me=p.id; toast(`歡迎，${dispName(p)}（來自 ${from}）`); }
    history.replaceState(null,'',location.pathname);
  }
}

/* ---- 16. 推播提醒 ---- */
async function enableNotifications(){
  if(!('Notification' in window)){ toast('此裝置不支援通知'); return; }
  if(Notification.permission==='granted'){ toast('通知已開啟'); rescheduleAll(); return; }
  const r=await Notification.requestPermission();
  if(r==='granted'){ toast('已開啟推播提醒 ✓'); rescheduleAll(); openProfile(); }
  else toast('未授權通知');
}
const timers=[];
function rescheduleAll(){ timers.forEach(t=>clearTimeout(t)); timers.length=0; DATA.events.forEach(scheduleReminder); }
function scheduleReminder(ev){
  if(ev.reminderMin==null || !('Notification' in window) || Notification.permission!=='granted') return;
  if(!ev.attendees || !ev.attendees.includes(state.me)) { if(ev.calendarId!=='cal_company') return; }
  const fireAt=new Date(ev.start).getTime() - ev.reminderMin*60000;
  const delay=fireAt-Date.now();
  if(delay>0 && delay < 24*3600*1000){ // 只排 24h 內的（在 session/SW 存活期間）
    timers.push(setTimeout(()=>notify(ev), delay));
  }
}
function notify(ev){
  const cal=calById(ev.calendarId);
  const body=`${fmtRange(ev)}${ev.location?' ‧ '+ev.location:''}（${cal?cal.name:''}）`;
  navigator.serviceWorker?.ready.then(reg=>{
    reg.active?.postMessage({ type:'reminder', title:'⏰ '+ev.title, body, tag:ev.id, url:location.pathname });
  }).catch(()=>{ try{ new Notification('⏰ '+ev.title,{body,icon:'icon.svg'}); }catch(_){} });
}

/* ---- 17. 安裝（A2HS）---- */
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferredPrompt=e; });
async function promptInstall(){
  if(deferredPrompt){ deferredPrompt.prompt(); const r=await deferredPrompt.userChoice; deferredPrompt=null;
    toast(r.outcome==='accepted'?'安裝中…':'已取消'); }
  else toast('iPhone：Safari 分享 → 加入主畫面；Android：選單 → 安裝應用程式');
}

/* ---- 18. Sheet 控制 ---- */
function setSheet(title,rightLabel,onRight){
  document.getElementById('sheetTitle').textContent=title;
  const r=document.getElementById('sheetRight'); r.textContent=rightLabel||''; r.style.display=rightLabel?'':'none'; r.onclick=onRight||null;
  document.getElementById('sheetLeft').onclick=closeSheet;
}
function setBody(html){ document.getElementById('sheetBody').innerHTML=html; document.getElementById('sheetBody').scrollTop=0; }
function openSheet(){ document.getElementById('scrim').classList.add('on'); document.getElementById('sheet').classList.add('on'); }
function closeSheet(){ document.getElementById('scrim').classList.remove('on'); document.getElementById('sheet').classList.remove('on'); }

/* ---- 19. toast ---- */
let toastT=null;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('on'),2200); }

/* ---- 20. esc ---- */
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

/* ---- 21. 事件綁定 ---- */
document.getElementById('viewSwitch').querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
  document.getElementById('viewSwitch').querySelectorAll('button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); state.view=b.dataset.v; render(); }));
document.getElementById('navPrev').addEventListener('click',()=>moveCursor(-1));
document.getElementById('navNext').addEventListener('click',()=>moveCursor(1));
document.getElementById('btnToday').addEventListener('click',()=>{ state.cursor=new Date(); state.selDate=ymd(new Date()); render(); });
document.getElementById('fab').addEventListener('click',()=>openEventEdit(null));
document.getElementById('btnFeed').addEventListener('click',openFeed);
document.getElementById('btnCals').addEventListener('click',openCalendars);
document.getElementById('btnProfile').addEventListener('click',openProfile);
document.getElementById('scrim').addEventListener('click',closeSheet);
function moveCursor(dir){ const c=state.cursor;
  if(state.view==='month') c.setMonth(c.getMonth()+dir);
  else if(state.view==='week') c.setDate(c.getDate()+7*dir);
  else { c.setDate(c.getDate()+dir); state.selDate=ymd(c); }
  render(); }

/* swipe nav on body */
let tx=0,ty=0;
const bodyEl=document.getElementById('bodyView');
bodyEl.addEventListener('touchstart',e=>{ tx=e.touches[0].clientX; ty=e.touches[0].clientY; },{passive:true});
bodyEl.addEventListener('touchend',e=>{ const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>70 && Math.abs(dx)>Math.abs(dy)*1.8) moveCursor(dx<0?1:-1); },{passive:true});

/* ---- 22. 啟動 ---- */
handleSSO();
render();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
if('Notification' in window && Notification.permission==='granted') rescheduleAll();
/* deep-link shortcuts */
(()=>{ const a=new URLSearchParams(location.search).get('action');
  if(a==='new-event') setTimeout(()=>openEventEdit(null),300);
  if(a==='feed') setTimeout(openFeed,300); })();
</script>
</body>
